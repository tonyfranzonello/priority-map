// ── Date Range Picker (inline calendar, click start then end) ────────────────
function DateRangePicker({startDate,endDate,onChangeStart,onChangeEnd}){
  const today=new Date();
  const parseD=s=>{if(!s)return null;const d=new Date(s+"T12:00:00");return isNaN(d)?null:d;};
  const fmtISO=d=>d.toISOString().slice(0,10);
  const fmtShort=s=>{if(!s)return"None";const d=new Date(s+"T12:00:00");return d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});};

  const initMonth=parseD(startDate)||parseD(endDate)||today;
  const [viewYear,setViewYear]=useState(initMonth.getFullYear());
  const [viewMonth,setViewMonth]=useState(initMonth.getMonth());
  const [picking,setPicking]=useState(null); // null | "start" | "end"
  const [open,setOpen]=useState(false);

  const daysInMonth=(y,m)=>new Date(y,m+1,0).getDate();
  const firstDow=(y,m)=>new Date(y,m,1).getDay();

  const prevMonth=()=>{if(viewMonth===0){setViewYear(y=>y-1);setViewMonth(11);}else setViewMonth(m=>m-1);};
  const nextMonth=()=>{if(viewMonth===11){setViewYear(y=>y+1);setViewMonth(0);}else setViewMonth(m=>m+1);};

  const sd=parseD(startDate), ed=parseD(endDate);

  const handleClick=day=>{
    const clicked=fmtISO(new Date(viewYear,viewMonth,day));
    if(picking==="start"){
      onChangeStart(clicked);
      setPicking("end");
    } else if(picking==="end"){
      // Ensure end >= start
      if(startDate && clicked < startDate){
        onChangeEnd(startDate);
        onChangeStart(clicked);
      } else {
        onChangeEnd(clicked);
      }
      setPicking(null);
    } else {
      // No active pick — start a new range
      onChangeStart(clicked);
      onChangeEnd("");
      setPicking("end");
    }
  };

  const isInRange=(y,m,day)=>{
    if(!sd||!ed) return false;
    const d=new Date(y,m,day);
    return d>sd&&d<ed;
  };
  const isStart=(y,m,day)=>sd&&fmtISO(new Date(y,m,day))===startDate;
  const isEnd=(y,m,day)=>ed&&fmtISO(new Date(y,m,day))===endDate;
  const isToday=(y,m,day)=>day===today.getDate()&&m===today.getMonth()&&y===today.getFullYear();

  const days=daysInMonth(viewYear,viewMonth);
  const startDow=firstDow(viewYear,viewMonth);
  const weeks=[];
  let week=Array(startDow).fill(null);
  for(let d=1;d<=days;d++){
    week.push(d);
    if(week.length===7){weeks.push(week);week=[];}
  }
  if(week.length>0){while(week.length<7)week.push(null);weeks.push(week);}

  const monthLabel=new Date(viewYear,viewMonth,1).toLocaleDateString("en-US",{month:"long",year:"numeric"});

  return (
    <div className="field">
      <label>Dates <span style={{fontWeight:400,textTransform:"none",letterSpacing:0,color:"#475569",fontSize:10}}>(optional)</span></label>
      <div onClick={()=>setOpen(o=>!o)} style={{background:"#0F172A",border:"1px solid #334155",borderRadius:8,padding:"9px 12px",color:"#E2E8F0",fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",gap:8}}>
        <span style={{color:startDate?"#E2E8F0":"#475569"}}>{startDate?fmtShort(startDate):"Start"}</span>
        <span style={{color:"#334155"}}>→</span>
        <span style={{color:endDate?"#E2E8F0":"#475569"}}>{endDate?fmtShort(endDate):"End"}</span>
        {(startDate||endDate)&&<span onClick={e=>{e.stopPropagation();onChangeStart("");onChangeEnd("");setPicking(null);}} style={{marginLeft:"auto",color:"#475569",fontSize:10,cursor:"pointer"}}>✕ clear</span>}
      </div>
      {open&&(
        <div style={{background:"#0F172A",border:"1px solid #334155",borderRadius:10,padding:"12px",marginTop:4,userSelect:"none"}}>
          {/* Month nav */}
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
            <button onClick={prevMonth} style={{background:"none",border:"none",color:"#94A3B8",cursor:"pointer",fontSize:14,padding:"2px 6px"}}>◀</button>
            <span style={{fontSize:12,fontWeight:700,color:"#E2E8F0"}}>{monthLabel}</span>
            <button onClick={nextMonth} style={{background:"none",border:"none",color:"#94A3B8",cursor:"pointer",fontSize:14,padding:"2px 6px"}}>▶</button>
          </div>
          {/* Picking hint */}
          <div style={{fontSize:10,color:picking?"#3B82F6":"#475569",textAlign:"center",marginBottom:6,fontWeight:600}}>
            {picking==="start"?"Click a start date":picking==="end"?"Now click an end date":"Click any date to set range"}
          </div>
          {/* Day headers */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:1,textAlign:"center",marginBottom:4}}>
            {["Su","Mo","Tu","We","Th","Fr","Sa"].map(d=>(
              <div key={d} style={{fontSize:9,color:"#475569",fontWeight:700,padding:"2px 0"}}>{d}</div>
            ))}
          </div>
          {/* Day grid */}
          {weeks.map((w,wi)=>(
            <div key={wi} style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:1}}>
              {w.map((day,di)=>{
                if(!day) return <div key={di}/>;
                const isSt=isStart(viewYear,viewMonth,day);
                const isEn=isEnd(viewYear,viewMonth,day);
                const inR=isInRange(viewYear,viewMonth,day);
                const isTd=isToday(viewYear,viewMonth,day);
                let bg="transparent",fg="#CBD5E1",border="1px solid transparent";
                if(isSt||isEn){bg="#3B82F6";fg="white";border="1px solid #3B82F6";}
                else if(inR){bg="rgba(59,130,246,0.15)";fg="#93C5FD";border="1px solid rgba(59,130,246,0.2)";}
                else if(isTd){border="1px solid #475569";}
                return (
                  <div key={di} onClick={()=>handleClick(day)}
                    style={{textAlign:"center",padding:"5px 0",fontSize:11,fontWeight:isSt||isEn?700:400,
                      color:fg,background:bg,border,borderRadius:isSt?'6px 0 0 6px':isEn?'0 6px 6px 0':inR?0:6,
                      cursor:"pointer",transition:"all 0.1s"}}
                    onMouseEnter={e=>{if(!isSt&&!isEn)e.currentTarget.style.background="rgba(59,130,246,0.1)";}}
                    onMouseLeave={e=>{if(!isSt&&!isEn&&!inR)e.currentTarget.style.background="transparent";}}>
                    {day}
                  </div>
                );
              })}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── Labeled Range Slider ─────────────────────────────────────────────────────
function LabeledRange({min,max,value,onChange,color}){
  const pct=((value-min)/(max-min))*100;
  const sliderRef=useRef(null);
  // Track width for accurate thumb positioning (account for thumb radius)
  const [trackW,setTrackW]=useState(100);
  useEffect(()=>{
    if(sliderRef.current) setTrackW(sliderRef.current.offsetWidth);
  },[]);
  const thumbR=12; // half of 24px thumb
  const usable=trackW-thumbR*2;
  const left=thumbR+(pct/100)*usable;
  return (
    <div className="range-slider-wrap">
      <span style={{fontSize:10,color:"#475569",minWidth:14,flexShrink:0}}>{min}</span>
      <div style={{position:"relative",flex:1,display:"flex",alignItems:"center",minWidth:0}}>
        <input ref={sliderRef} type="range" min={min} max={max} step={1} value={value} onChange={onChange}
          style={{background:`linear-gradient(to right, ${color} ${pct}%, #334155 ${pct}%)`}}/>
        <div className="range-thumb-label" style={{left:`${left}px`,background:color}}>{value}</div>
      </div>
      <span style={{fontSize:10,color:"#475569",minWidth:14,flexShrink:0}}>{max}</span>
    </div>
  );
}

// ── Voice-to-Text Button Component ──
function VoiceBtn({onResult}){
  const [listening,setListening]=useState(false);
  const recRef=useRef(null);
  const supported=typeof window!=="undefined"&&("SpeechRecognition" in window||"webkitSpeechRecognition" in window);
  const toggle=()=>{
    if(listening&&recRef.current){recRef.current.stop();return;}
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR) return;
    const rec=new SR();
    rec.continuous=false;
    rec.interimResults=false;
    rec.lang="en-US";
    rec.onresult=(ev)=>{
      const text=ev.results[0][0].transcript;
      if(text&&onResult) onResult(text);
    };
    rec.onend=()=>setListening(false);
    rec.onerror=()=>setListening(false);
    recRef.current=rec;
    rec.start();
    setListening(true);
  };
  if(!supported) return null;
  return (
    <button onClick={toggle} title={listening?"Stop listening":"Voice input"}
      style={{background:listening?"rgba(239,68,68,0.15)":"rgba(59,130,246,0.1)",
        border:`1px solid ${listening?"#EF4444":"#334155"}`,borderRadius:6,
        color:listening?"#EF4444":"#64748B",cursor:"pointer",fontSize:14,
        padding:"3px 7px",lineHeight:1,flexShrink:0,transition:"all 0.15s",
        animation:listening?"pulse 1.2s infinite":"none"}}>
      {listening?"⏹":"🎤"}
    </button>
  );
}

        {/* CENTER: SVG diamond + Value Prop callout floating over the center diamond */}

              {/* Light source: top-left. Top kite = brightest, bottom-right = most shadow */}
              <linearGradient id="gTop" x1="350" y1="130" x2="350" y2="350" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stopColor="#FFFFFF"/>
                <stop offset="100%" stopColor="#C8CDD9"/>

              <linearGradient id="gLeft" x1="130" y1="350" x2="350" y2="350" gradientUnits="userSpaceOnUse">

                <stop offset="100%" stopColor="#C2C8D4"/>

                <stop offset="100%" stopColor="#080C14"/>

}

const SB_URL_KEY="pm_sb_url", SB_KEY_KEY="pm_sb_key";
const toApp=row=>({
  id:row.id, name:row.name, importance:row.importance, urgency:row.urgency,
  value:row.value||2, effort:row.effort||2,
  type:row.type, timeline:row.timeline, category:row.category,
  ownerPrimary:row.owner_primary||"None", ownerSecondary:row.owner_secondary||"None",
  startDate:row.start_date||"", dueDate:row.due_date||"", notes:row.notes||"",
  loeHours:row.loe_hours||""
});
const toRow=t=>({
  name:t.name, importance:t.importance, urgency:t.urgency,
  value:t.value||2, effort:t.effort||2,
  type:t.type, timeline:t.timeline, category:t.category,
  owner_primary:t.ownerPrimary||"None", owner_secondary:t.ownerSecondary||"None",
  start_date:t.startDate||"", due_date:t.dueDate||"", notes:t.notes||"",
  loe_hours:t.loeHours||""
});
// Save a snapshot of all current tasks to Supabase
async function saveSnapshot(client, tasks, userEmail) {
  if (!client) return;
  const snapshot = tasks.map(t => toRow(t));
  await client.from("task_snapshots").insert({ snapshot, created_by: userEmail || "unknown" });
}
function makeSbClient(url,key){
  if(!url||!key) return null;
  try{ return supabase.createClient(url.trim(),key.trim()); }catch(e){ return null; }
}

const LS_BUZZ_SOURCES="pm_buzz_sources", LS_BUZZ_THEMES="pm_buzz_themes", LS_BUZZ_CACHE="pm_buzz_cache_v3";

function loadLocal(){
  try{
    const t=localStorage.getItem(LS_TASKS);
    const m=localStorage.getItem(LS_TEAM);
    const n=localStorage.getItem(LS_NEXTID);
    return{
      tasks: t?JSON.parse(t):TASKS_INIT,
      team:  m?JSON.parse(m):DEFAULT_TEAM,
      nextId:n?+n:200
    };
  }catch(e){return{tasks:TASKS_INIT,team:DEFAULT_TEAM,nextId:200};}
}
function saveLocal(tasks,team,nextId){
  try{
    localStorage.setItem(LS_TASKS,JSON.stringify(tasks));

    localStorage.setItem(LS_NEXTID,String(nextId));

}

// ── Daily Log ─────────────────────────────────────────────────────────────────
function getMeetings(){
  try{const o=JSON.parse(localStorage.getItem("pm_meeting_edits")||"{}");
    const merged={};
    for(const d of Object.keys(PLAUD_MEETINGS)){
      merged[d]=PLAUD_MEETINGS[d].map((m,i)=>{
        const key=d+"__"+i;
        return o[key]?{t:o[key].t??m.t,b:o[key].b??m.b}:{...m};
      });
    }
    return merged;
  }catch(e){return PLAUD_MEETINGS;}
}

function DailyLogView({jumpDate,clearJump,sbClient,sbStatus}){
  const todayStr=new Date().toISOString().slice(0,10);
  const [log,setLog]=useState(()=>{try{return JSON.parse(localStorage.getItem(LS_LOG)||"{}");}catch(e){return {};}});
  const [selDate,setSelDate]=useState(jumpDate||todayStr);
  useEffect(()=>{if(jumpDate){setSelDate(jumpDate);if(clearJump)clearJump();}},[jumpDate]);
  const [draft,setDraft]=useState(()=>{try{const l=JSON.parse(localStorage.getItem(LS_LOG)||"{}");return l[todayStr]||"";}catch(e){return "";}});
  const [saved,setSaved]=useState(true);
  const prevDate=useRef(selDate);
  const [meetings,setMeetings]=useState(getMeetings);
  const [editingMtg,setEditingMtg]=useState(null); // {date,idx,dbId} or null
  const [mtgTitleDraft,setMtgTitleDraft]=useState("");
  const [mtgBulletsDraft,setMtgBulletsDraft]=useState("");
  const [mtgDbIds,setMtgDbIds]=useState({}); // "date__idx" -> supabase row id

  // Load meetings from Supabase on connect (merge with hardcoded fallback)
  useEffect(()=>{
    if(sbStatus!=="connected"||!sbClient) return;
    sbClient.from("meetings").select("*").order("meeting_date").order("sort_order").then(({data,error})=>{
      if(error||!data) return;
      if(data.length>0){
        // Build meetings map from Supabase data
        const cloudMtgs={};
        const idMap={};
        data.forEach((row,i)=>{
          const d=row.meeting_date;
          if(!cloudMtgs[d]) cloudMtgs[d]=[];
          const idx=cloudMtgs[d].length;
          cloudMtgs[d].push({t:row.title,b:Array.isArray(row.bullets)?row.bullets:[]});
          idMap[d+"__"+idx]=row.id;
        });
        setMeetings(cloudMtgs);
        setMtgDbIds(idMap);
      } else {
        // Seed Supabase with hardcoded PLAUD_MEETINGS
        const rows=[];
        for(const d of Object.keys(PLAUD_MEETINGS)){
          PLAUD_MEETINGS[d].forEach((m,i)=>{
            rows.push({meeting_date:d,title:m.t,bullets:m.b,sort_order:i});
          });
        }
        // Also include localStorage edits
        try{
          const edits=JSON.parse(localStorage.getItem("pm_meeting_edits")||"{}");
          rows.forEach(r=>{
            const key=r.meeting_date+"__"+r.sort_order;
            if(edits[key]){
              r.title=edits[key].t||r.title;
              r.bullets=edits[key].b||r.bullets;
            }
          });
        }catch(e){}
        if(rows.length>0){
          sbClient.from("meetings").insert(rows).select().then(({data:inserted,error:err})=>{
            if(err||!inserted) return;
            const cloudMtgs={};
            const idMap={};
            inserted.forEach(row=>{
              const d=row.meeting_date;
              if(!cloudMtgs[d]) cloudMtgs[d]=[];
              const idx=cloudMtgs[d].length;
              cloudMtgs[d].push({t:row.title,b:Array.isArray(row.bullets)?row.bullets:[]});
              idMap[d+"__"+idx]=row.id;
            });
            setMeetings(cloudMtgs);
            setMtgDbIds(idMap);
          });
        }
      }
    });
  },[sbStatus,sbClient]);

  const startEdit=(date,idx,m)=>{
    setEditingMtg({date,idx,dbId:mtgDbIds[date+"__"+idx]||null});
    setMtgTitleDraft(m.t);
    setMtgBulletsDraft(m.b.join("\n"));
  };
  const cancelEdit=()=>{setEditingMtg(null);};
  const saveEdit=()=>{
    if(!editingMtg) return;
    const newBullets=mtgBulletsDraft.split("\n").map(s=>s.replace(/^[\s•●\-]+/,"").trim()).filter(Boolean);
    const newTitle=mtgTitleDraft.trim();
    if(!newTitle) return;
    const {date,idx,dbId}=editingMtg;
    // Update in-memory state
    setMeetings(prev=>{
      const next={...prev};
      next[date]=[...(next[date]||[])];
      next[date][idx]={t:newTitle,b:newBullets};
      return next;
    });
    // Persist to Supabase if connected
    if(sbClient&&sbStatus==="connected"&&dbId){
      sbClient.from("meetings").update({title:newTitle,bullets:newBullets,updated_at:new Date().toISOString()}).eq("id",dbId).then(()=>{});
    }
    // Always keep localStorage as fallback
    try{
      const edits=JSON.parse(localStorage.getItem("pm_meeting_edits")||"{}");
      edits[date+"__"+idx]={t:newTitle,b:newBullets};
      localStorage.setItem("pm_meeting_edits",JSON.stringify(edits));
    }catch(e){}
    setEditingMtg(null);
  };

  useEffect(()=>{
    if(prevDate.current!==selDate){
      setDraft(log[selDate]||"");
      setSaved(true);
      prevDate.current=selDate;
    }
  },[selDate]);

  const saveEntry=useCallback(()=>{
    setLog(prev=>{
      const next={...prev};
      if(draft.trim()) next[selDate]=draft; else delete next[selDate];
      try{localStorage.setItem(LS_LOG,JSON.stringify(next));}catch(e){}
      return next;
    });
    setSaved(true);
  },[draft,selDate]);

  const allDatesSet=new Set([...Object.keys(log).filter(d=>log[d]),...Object.keys(meetings)]);
  const dates=[...allDatesSet].sort().reverse();
  const fmtD=s=>{const d=new Date(s+"T12:00:00");return d.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric",year:"numeric"});};
  const wordCount=draft.trim()?draft.trim().split(/\s+/).length:0;
  const plaudForDate=meetings[selDate]||[];

  // ── Plaud sync status ──────────────────────────────────────────────────────
  const [syncStatus,setSyncStatus]=useState(()=>{
    try{const s=localStorage.getItem("pm_plaud_sync_"+todayStr);return s?JSON.parse(s):null;}catch(e){return null;}
  });
  const [syncPulse,setSyncPulse]=useState(false);
  const nowH=new Date().getHours(), nowM=new Date().getMinutes();
  const isPast545=nowH>17||(nowH===17&&nowM>=45);
  const todayMeetings=meetings[todayStr]||[];
  const hasTodaySync=todayMeetings.length>0;
  const syncLit=hasTodaySync||(syncStatus&&syncStatus.ok);
  const syncLabel=syncLit?"Synced":(isPast545?"No sync today":"Awaiting sync");

  const triggerSync=()=>{
    setSyncPulse(true);
    setTimeout(()=>setSyncPulse(false),2000);
    // Mark a manual sync attempt in localStorage
    const attempt={ts:new Date().toISOString(),ok:false,manual:true};
    try{localStorage.setItem("pm_plaud_sync_"+todayStr,JSON.stringify(attempt));}catch(e){}
    setSyncStatus(attempt);
  };

  return (
    <div style={{display:"flex",flex:1,minHeight:0,overflow:"hidden"}}>
      <div style={{width:215,background:"#0F172A",borderRight:"1px solid #1E293B",overflowY:"auto",flexShrink:0,paddingTop:6}}>
        {/* Plaud sync indicator */}
        <div style={{padding:"10px 14px 8px",display:"flex",alignItems:"center",gap:8}}>
          <div onClick={!syncLit?triggerSync:undefined}
            style={{width:12,height:12,borderRadius:"50%",
              background:syncLit?"#A78BFA":"#3B2F5E",
              boxShadow:syncLit?"0 0 8px rgba(167,139,250,0.6), 0 0 2px rgba(167,139,250,0.9)":"0 0 3px rgba(59,45,93,0.4)",
              border:syncLit?"1.5px solid #C4B5FD":"1.5px solid #4C3D6E",
              cursor:syncLit?"default":"pointer",
              transition:"all 0.3s",
              animation:syncPulse?"plaud-pulse 1s ease-in-out 2":"none",
              flexShrink:0}}
            title={syncLit?"Meeting summaries synced for today":"Click to attempt sync"}/>
          <span style={{fontSize:10,color:syncLit?"#A78BFA":"#4C3D6E",fontWeight:600,letterSpacing:0.3}}>{syncLabel}</span>
          {!syncLit&&<button onClick={triggerSync}
            style={{marginLeft:"auto",padding:"3px 8px",borderRadius:5,border:"1px solid #4C3D6E",background:"transparent",color:"#7C6BAF",fontSize:9,fontWeight:700,cursor:"pointer",fontFamily:"inherit",letterSpacing:0.5,transition:"all 0.15s"}}
            onMouseEnter={e=>{e.currentTarget.style.background="#2D2250";e.currentTarget.style.borderColor="#A78BFA";e.currentTarget.style.color="#A78BFA";}}
            onMouseLeave={e=>{e.currentTarget.style.background="transparent";e.currentTarget.style.borderColor="#4C3D6E";e.currentTarget.style.color="#7C6BAF";}}>
            Sync
          </button>}
        </div>
        <button onClick={()=>setSelDate(todayStr)} style={{display:"block",width:"calc(100% - 20px)",margin:"8px 10px",padding:"8px 12px",background:"#1E293B",border:"1px solid #334155",borderRadius:8,color:"#94A3B8",cursor:"pointer",fontSize:11,fontWeight:700,textAlign:"left",fontFamily:"inherit"}}>+ Today's Entry</button>
        <div style={{padding:"8px 14px 4px",fontSize:9,color:"#334155",fontWeight:700,letterSpacing:1.2}}>PAST ENTRIES</div>
        {dates.length===0&&<div style={{padding:"6px 14px",fontSize:11,color:"#334155",fontStyle:"italic"}}>No entries yet.</div>}
        {dates.map(d=>{
          const hasMtg=!!(meetings[d]&&meetings[d].length);
          const hasLog=!!log[d];
          const preview=hasLog?log[d].slice(0,50):(hasMtg?meetings[d].map(m=>m.t).join(", ").slice(0,50):"");
          return (
            <div key={d} onClick={()=>setSelDate(d)} style={{padding:"9px 14px",cursor:"pointer",borderLeft:`3px solid ${d===selDate?"#3B82F6":"transparent"}`,background:d===selDate?"rgba(59,130,246,0.07)":"transparent",transition:"all 0.12s"}}>
              <div style={{fontSize:11,fontWeight:700,color:d===selDate?"#93C5FD":"#94A3B8"}}>{fmtD(d)}</div>
              <div style={{fontSize:10,color:"#475569",marginTop:2,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{preview}</div>
            </div>
          );
        })}
      </div>
      <div style={{flex:1,display:"flex",flexDirection:"column",minHeight:0,padding:"20px 28px"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14,flexShrink:0}}>
          <input type="date" value={selDate} max={todayStr} onChange={e=>setSelDate(e.target.value)} style={{background:"#1E293B",border:"1px solid #334155",borderRadius:8,padding:"7px 11px",color:"#E2E8F0",fontSize:13,outline:"none",colorScheme:"dark"}}/>
          <div style={{fontSize:15,fontWeight:700,color:"#F8FAFC"}}>{fmtD(selDate)}</div>
          <div style={{flex:1}}/>
          <span style={{fontSize:10,color:"#475569"}}>{wordCount} words</span>
          {!saved&&<span style={{fontSize:11,color:"#F59E0B"}}>● Unsaved</span>}
          <button onClick={saveEntry} style={{padding:"7px 18px",borderRadius:8,border:"none",background:saved?"#1E293B":"#3B82F6",color:saved?"#64748B":"white",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit",border:`1px solid ${saved?"#334155":"#3B82F6"}`}}>{saved?"Saved ✓":"Save"}</button>
        </div>
        <div style={{flex:1,overflowY:"auto",minHeight:0}}>
          {plaudForDate.length>0&&(
            <div style={{marginBottom:18}}>
              {plaudForDate.map((m,mi)=>{
                const key=selDate+"__"+mi;
                const isEditing=editingMtg&&editingMtg.date===selDate&&editingMtg.idx===mi;
                return (
                  <div key={mi} style={{background:"#0F172A",border:`1px solid ${isEditing?"#A78BFA":"#1E293B"}`,borderRadius:10,padding:"14px 18px",marginBottom:10,transition:"border-color 0.15s"}}>
                    {isEditing?(
                      <div>
                        <input value={mtgTitleDraft} onChange={e=>setMtgTitleDraft(e.target.value)}
                          style={{width:"100%",background:"#1E293B",border:"1px solid #334155",borderRadius:6,padding:"8px 10px",color:"#A78BFA",fontSize:13,fontWeight:700,outline:"none",fontFamily:"inherit",boxSizing:"border-box",marginBottom:8}}/>
                        <textarea value={mtgBulletsDraft} onChange={e=>setMtgBulletsDraft(e.target.value)} rows={Math.max(mtgBulletsDraft.split("\n").length+1,3)}
                          style={{width:"100%",background:"#1E293B",border:"1px solid #334155",borderRadius:6,padding:"8px 10px",color:"#E2E8F0",fontSize:12,lineHeight:1.6,outline:"none",resize:"vertical",fontFamily:"inherit",boxSizing:"border-box"}}
                          placeholder="One bullet per line"/>
                        <div style={{display:"flex",gap:6,marginTop:8,justifyContent:"flex-end"}}>
                          <button onClick={cancelEdit} style={{padding:"5px 12px",borderRadius:6,border:"1px solid #334155",background:"transparent",color:"#94A3B8",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>Cancel</button>
                          <button onClick={saveEdit} style={{padding:"5px 12px",borderRadius:6,border:"none",background:"#A78BFA",color:"white",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>Save</button>
                        </div>
                      </div>
                    ):(
                      <div>
                        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                          <div style={{fontSize:13,fontWeight:700,color:"#A78BFA",flex:1}}>{m.t}</div>
                          <button onClick={()=>startEdit(selDate,mi,m)} title="Edit summary"
                            style={{background:"transparent",border:"none",cursor:"pointer",padding:"2px 6px",opacity:0.4,transition:"opacity 0.15s"}}
                            onMouseEnter={e=>e.currentTarget.style.opacity=0.9}
                            onMouseLeave={e=>e.currentTarget.style.opacity=0.4}>
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#A78BFA" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                          </button>
                        </div>
                        <div style={{display:"flex",flexDirection:"column",gap:5}}>
                          {m.b.map((bullet,bi)=>(
                            <div key={bi} style={{display:"flex",gap:8,alignItems:"flex-start"}}>
                              <span style={{color:"#475569",fontSize:8,marginTop:5,flexShrink:0}}>●</span>
                              <span style={{fontSize:12,color:"#E2E8F0",lineHeight:1.5}}>{bullet}</span>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#64748B" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            <span style={{fontSize:11,fontWeight:700,color:"#64748B",letterSpacing:0.5}}>NOTES</span>
          </div>
          <textarea value={draft} onChange={e=>{setDraft(e.target.value);setSaved(false);}} onBlur={saveEntry}
            placeholder={"What happened today worth remembering?\n\nKey meetings, decisions made, pipeline movement, competitive intel, follow-ups..."}
            style={{width:"100%",minHeight:plaudForDate.length>0?150:300,background:"#0F172A",border:"1px solid #1E293B",borderRadius:12,padding:"18px 22px",color:"#CBD5E1",fontSize:14,lineHeight:1.8,outline:"none",resize:"vertical",fontFamily:"inherit",boxSizing:"border-box"}}/>
        </div>
      </div>
    </div>
  );
}

  const [noteEditing,setNoteEditing]=useState(null); // article id being edited
  const [noteDraft,setNoteDraft]=useState("");
  const [shareMenu,setShareMenu]=useState(null); // article id with open share menu

  // ── Load stars & notes from Supabase on mount ──
  useEffect(()=>{
    if(sbStatus!=="connected"||!sbClient) return;
    (async()=>{
      try{
        const{data,error}=await sbClient.from("buzz_bookmarks").select("*");
        if(!error&&data&&data.length>0){
          const sObj={}, nObj={};
          data.forEach(row=>{
            if(row.starred) sObj[row.article_id]={at:new Date(row.starred_at||row.created_at).getTime(),dbId:row.id};
            if(row.note) nObj[row.article_id]={text:row.note,at:new Date(row.updated_at||row.created_at).getTime(),dbId:row.id};
            // Store dbId on both for updates
            if(!sObj[row.article_id]) sObj[row.article_id]={dbId:row.id};
            if(sObj[row.article_id]&&!sObj[row.article_id].at&&!row.starred) delete sObj[row.article_id];
          });
          // Merge with localStorage (Supabase wins)
          setStars(prev=>{const merged={...prev,...sObj};try{localStorage.setItem(LS_BUZZ_STARS,JSON.stringify(merged));}catch(e){}return merged;});
          setNotes(prev=>{const merged={...prev,...nObj};try{localStorage.setItem(LS_BUZZ_NOTES,JSON.stringify(merged));}catch(e){}return merged;});
        }
      }catch(e){console.log("buzz_bookmarks load error:",e);}
    })();
  },[sbClient,sbStatus]);

  // ── Helper: upsert a bookmark to Supabase ──
  const upsertBookmark=async(articleId,fields)=>{
    if(sbStatus!=="connected"||!sbClient) return;
    try{
      // Check if row exists
      const{data:existing}=await sbClient.from("buzz_bookmarks").select("id").eq("article_id",articleId).limit(1);
      if(existing&&existing.length>0){
        await sbClient.from("buzz_bookmarks").update({...fields,updated_at:new Date().toISOString()}).eq("id",existing[0].id);
      }else{
        // Find article info for context
        const art=articles.find(a=>a.id===articleId);
        await sbClient.from("buzz_bookmarks").insert({
          article_id:articleId,
          title:art?.title||"",
          link:art?.link||"",
          source:art?.source||"",
          ...fields
        });
      }
    }catch(e){console.log("buzz bookmark upsert error:",e);}
  };

  // ── Helper: delete a bookmark from Supabase ──
  const deleteBookmark=async(articleId)=>{
    if(sbStatus!=="connected"||!sbClient) return;
    try{await sbClient.from("buzz_bookmarks").delete().eq("article_id",articleId);}catch(e){}
  };

  const toggleStar=(aid,e)=>{
    e.preventDefault();e.stopPropagation();
    setStars(prev=>{
      const next={...prev};
      if(next[aid]&&next[aid].at){
        delete next[aid];
        // If no note either, delete the row
        if(!notes[aid]) deleteBookmark(aid);
        else upsertBookmark(aid,{starred:false,starred_at:null});
      }else{
        next[aid]={at:Date.now()};
        upsertBookmark(aid,{starred:true,starred_at:new Date().toISOString()});
      }
      try{localStorage.setItem(LS_BUZZ_STARS,JSON.stringify(next));}catch(e){}
      return next;
    });
  };
  const saveNote=(aid)=>{
    const text=noteDraft.trim();
    setNotes(prev=>{
      const next={...prev};
      if(text){
        next[aid]={text,at:Date.now()};
        upsertBookmark(aid,{note:text});
      }else{
        delete next[aid];
        // If not starred either, delete the row
        if(!stars[aid]||!stars[aid].at) deleteBookmark(aid);
        else upsertBookmark(aid,{note:null});
      }
      try{localStorage.setItem(LS_BUZZ_NOTES,JSON.stringify(next));}catch(e){}
      return next;
    });
    setNoteEditing(null);setNoteDraft("");
  };
  const openNote=(aid,e)=>{
    e.preventDefault();e.stopPropagation();
    setNoteEditing(aid);setNoteDraft(notes[aid]?.text||"");setShareMenu(null);
  };
  const openShare=(aid,e)=>{
    e.preventDefault();e.stopPropagation();
    setShareMenu(prev=>prev===aid?null:aid);setNoteEditing(null);
  };
  const shareViaEmail=(a,e)=>{
    e.preventDefault();e.stopPropagation();
    const subj=encodeURIComponent(a.title);
    const noteText=notes[a.id]?.text?"\n\nMy notes: "+notes[a.id].text:"";
    const body=encodeURIComponent(`Check out this article:\n\n${a.title}\n${a.link}${noteText}`);
    window.open(`mailto:?subject=${subj}&body=${body}`,"_blank");
    setShareMenu(null);
  };
  const shareViaSMS=(a,e)=>{
    e.preventDefault();e.stopPropagation();
    const noteText=notes[a.id]?.text?" - "+notes[a.id].text:"";
    const body=encodeURIComponent(`${a.title}\n${a.link}${noteText}`);
    window.open(`sms:?body=${body}`,"_blank");
    setShareMenu(null);
  };
  const copyLink=(a,e)=>{
    e.preventDefault();e.stopPropagation();
    navigator.clipboard.writeText(a.link).catch(()=>{});
    setShareMenu(null);
  };

  useEffect(()=>{
    try{
      const c=JSON.parse(localStorage.getItem(LS_BUZZ_CACHE)||"null");
      if(c&&c.articles){setArticles(c.articles);setLastDate(c.date||"");}
      if(!c||c.date!==todayStr) doFetch(sources,searches,newsApiKey);
    }catch(e){doFetch(sources,searches,newsApiKey);}
  },[]);

  useEffect(()=>{try{localStorage.setItem(LS_BUZZ_SOURCES,JSON.stringify(sources));}catch(e){};},[sources]);
  useEffect(()=>{try{localStorage.setItem(LS_BUZZ_SEARCHES,JSON.stringify(searches));}catch(e){};},[searches]);
  useEffect(()=>{try{localStorage.setItem(LS_BUZZ_THEMES,JSON.stringify(themes));}catch(e){};},[themes]);

  const saveKey=()=>{
    const k=keyDraft.trim();
    setNewsApiKey(k);
    try{if(k)localStorage.setItem(LS_NEWS_API_KEY,k);else localStorage.removeItem(LS_NEWS_API_KEY);}catch(e){}
  };

  const doFetch=async(srcs,sqrs,apiKey)=>{
    setLoading(true);setFetchErrs([]);
    const fetched=[];
    const errs=[];

    // ── RSS feeds ──────────────────────────────────────────────────────────────
    await Promise.all((srcs||sources).filter(s=>s.on).map(async src=>{
      try{
        const res=await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(src.url)}`);
        const data=await res.json();
        if(data.items){
          data.items.forEach(item=>{
            fetched.push({
              id:item.guid||item.link||Math.random().toString(),
              title:(item.title||"").trim(),
              link:item.link||"#",
              pub:item.pubDate||"",
              source:src.label,
              srcId:src.id,
              cat:src.cat,
              desc:(item.description||"").replace(/<[^>]+>/g,"").replace(/\s+/g," ").trim().slice(0,200),
              searchLabel:null,
            });
          });
        }else if(data.status==="error"){errs.push(`${src.label}: ${data.message||"fetch error"}`);}
      }catch(e){errs.push(`${src.label}: network error`);}
    }));

    // ── NewsAPI keyword searches ───────────────────────────────────────────────
    const key=apiKey||newsApiKey;
    if(key){
      await Promise.all((sqrs||searches).filter(q=>q.on).map(async q=>{
        try{
          const url=`https://newsapi.org/v2/everything?q=${encodeURIComponent(q.query)}&apiKey=${key}&sortBy=publishedAt&pageSize=15&language=en`;
          const res=await fetch(url);
          const data=await res.json();
          if(data.articles){
            data.articles.forEach(a=>{
              const aid=a.url||Math.random().toString();
              if(!fetched.find(x=>x.link===a.url)){
                fetched.push({
                  id:aid,
                  title:(a.title||"").trim(),
                  link:a.url||"#",
                  pub:a.publishedAt||"",
                  source:a.source?.name||"News",
                  srcId:"search",
                  cat:"Search",
                  desc:(a.description||"").replace(/<[^>]+>/g,"").replace(/\s+/g," ").trim().slice(0,200),
                  searchLabel:q.label,
                });
              }
            });
          }else if(data.status==="error"){errs.push(`Search "${q.label}": ${data.message||"error"}`);}
        }catch(e){errs.push(`Search "${q.label}": network error`);}
      }));
    }

    fetched.sort((a,b)=>new Date(b.pub)-new Date(a.pub));
    // Deduplicate by title similarity
    const seen=new Set();
    const deduped=fetched.filter(a=>{const k=a.title.slice(0,60).toLowerCase();if(seen.has(k))return false;seen.add(k);return true;});
    // Apply 2-week expiry: keep starred articles forever, drop unstarred older than 14 days
    const expiryCutoff=Date.now()-BUZZ_EXPIRY_DAYS*86400000;
    const filtered=deduped.filter(a=>{
      if(stars[a.id]) return true;
      try{const pubTime=new Date(a.pub).getTime();return pubTime>expiryCutoff;}catch(e){return true;}
    });
    setArticles(filtered);setLastDate(todayStr);setFetchErrs(errs);
    try{localStorage.setItem(LS_BUZZ_CACHE,JSON.stringify({date:todayStr,articles:filtered}));}catch(e){}
    setLoading(false);
  };

  const matchT=(a,t)=>(a.title+" "+a.desc).toLowerCase().includes(t.toLowerCase());
  const activeSrcIds=new Set(["All","search",...sources.filter(s=>s.on).map(s=>s.id)]);
  const starredCount=articles.filter(a=>stars[a.id]).length;
  const baseFiltered=articles.filter(a=>{
    if(showStarred) return !!stars[a.id];
    return (filterSrc==="All"||(filterSrc==="search"&&a.srcId==="search")||a.srcId===filterSrc)&&(filterTheme==="All"||matchT(a,filterTheme));
  });
  const visible=baseFiltered;
  const searchCount=articles.filter(a=>a.srcId==="search").length;
  const fmtPub=s=>{try{const d=new Date(s);const diff=(Date.now()-d)/1000;if(diff<3600)return`${Math.round(diff/60)}m ago`;if(diff<86400)return`${Math.round(diff/3600)}h ago`;return d.toLocaleDateString("en-US",{month:"short",day:"numeric"});}catch(e){return "";}};
  const STab=({id,label})=><button onClick={()=>setSettingsTab(id)} style={{flex:1,padding:"5px 0",fontSize:11,fontWeight:700,border:"none",borderRadius:5,cursor:"pointer",fontFamily:"inherit",background:settingsTab===id?"#3B82F6":"transparent",color:settingsTab===id?"white":"#64748B"}}>{label}</button>;

  return (
    <div style={{display:"flex",flex:1,minHeight:0,overflow:"hidden",flexDirection:"column"}}>
      {/* Filter bar */}
      <div style={{background:"#0F172A",borderBottom:"1px solid #1E293B",padding:"7px 16px",display:"flex",gap:6,alignItems:"center",flexWrap:"wrap",flexShrink:0}}>
        <button onClick={()=>{setShowStarred(false);setFilterSrc("All");}} style={{...BUZZ_CHIP,background:!showStarred&&filterSrc==="All"?"#3B82F6":"#1E293B",color:!showStarred&&filterSrc==="All"?"white":"#64748B"}}>All</button>
        <button onClick={()=>setShowStarred(v=>!v)} style={{...BUZZ_CHIP,background:showStarred?"#F59E0B":"#1E293B",color:showStarred?"#0F172A":"#64748B",fontWeight:700}}>
          {showStarred?"★":"☆"} Starred{starredCount>0?` (${starredCount})`:""}
        </button>
        <div style={{width:1,height:14,background:"#334155",margin:"0 3px"}}/>
        <span style={{fontSize:9,color:"#334155",fontWeight:700,letterSpacing:1}}>SOURCE</span>
        {sources.filter(s=>s.on).map(s=>(
          <button key={s.id} onClick={()=>{setShowStarred(false);setFilterSrc(p=>p===s.id?"All":s.id);}} style={{...BUZZ_CHIP,background:!showStarred&&filterSrc===s.id?"#3B82F6":"#1E293B",color:!showStarred&&filterSrc===s.id?"white":"#64748B"}}>{s.label}</button>
        ))}
        {searchCount>0&&<button onClick={()=>{setShowStarred(false);setFilterSrc(p=>p==="search"?"All":"search");}} style={{...BUZZ_CHIP,background:!showStarred&&filterSrc==="search"?"#06B6D4":"#1E293B",color:!showStarred&&filterSrc==="search"?"white":"#64748B"}}>🔍 Search ({searchCount})</button>}
        <div style={{width:1,height:14,background:"#334155",margin:"0 3px"}}/>
        <span style={{fontSize:9,color:"#334155",fontWeight:700,letterSpacing:1}}>THEME</span>
        <button onClick={()=>setFilterTheme("All")} style={{...BUZZ_CHIP,background:filterTheme==="All"?"#8B5CF6":"#1E293B",color:filterTheme==="All"?"white":"#64748B"}}>All</button>
        {themes.map(t=>(
          <button key={t} onClick={()=>setFilterTheme(p=>p===t?"All":t)} style={{...BUZZ_CHIP,background:filterTheme===t?"#8B5CF6":"#1E293B",color:filterTheme===t?"white":"#64748B"}}>{t}</button>
        ))}
        <div style={{flex:1}}/>
        {lastDate&&<span style={{fontSize:10,color:"#475569",whiteSpace:"nowrap"}}>Updated {lastDate===todayStr?"today":lastDate}</span>}
        <button onClick={()=>doFetch(sources,searches,newsApiKey)} disabled={loading} style={{padding:"4px 12px",borderRadius:6,border:"1px solid #334155",background:"#1E293B",color:"#94A3B8",fontSize:11,fontWeight:600,cursor:loading?"default":"pointer",fontFamily:"inherit",opacity:loading?0.5:1}}>{loading?"Fetching…":"↻ Refresh"}</button>
        <button onClick={()=>setShowSettings(v=>!v)} style={{padding:"4px 10px",borderRadius:6,border:`1px solid ${showSettings?"#475569":"#334155"}`,background:showSettings?"#334155":"#1E293B",color:"#94A3B8",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>⚙ Configure</button>
      </div>

      <div style={{display:"flex",flex:1,minHeight:0,overflow:"hidden"}}>
        {/* Article grid */}
        <div style={{flex:1,overflowY:"auto",padding:"14px 18px"}}>
          {loading&&<div style={{color:"#475569",fontSize:13,padding:"30px 0",textAlign:"center"}}>Fetching the latest news…</div>}
          {!loading&&fetchErrs.length>0&&<div style={{color:"#FCA5A5",fontSize:11,padding:"8px 12px",background:"rgba(239,68,68,0.07)",border:"1px solid rgba(239,68,68,0.18)",borderRadius:8,marginBottom:12}}>{fetchErrs.map((e,i)=><div key={i}>⚠ {e}</div>)}</div>}
          {!loading&&visible.length===0&&<div style={{color:"#475569",fontSize:13,padding:20}}>{showStarred?"No starred articles yet. Click the star on any article to save it here.":"No articles match your current filters."}{!newsApiKey&&searches.some(q=>q.on)?" Add your NewsAPI key in Configure → Search to enable topic searches.":""}</div>}
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(310px,1fr))",gap:12}}>
            {visible.map(a=>{
              const hits=themes.filter(t=>matchT(a,t));
              const isSearch=a.srcId==="search";
              const isStarred=!!stars[a.id];
              const hasNote=!!notes[a.id];
              const isEditingNote=noteEditing===a.id;
              const isShareOpen=shareMenu===a.id;
              return (
                <div key={a.id} style={{background:"#1E293B",border:`1px solid ${isStarred?"rgba(245,158,11,0.4)":isSearch?"rgba(6,182,212,0.25)":"#2D3748"}`,borderRadius:10,padding:"13px 15px",display:"flex",flexDirection:"column",gap:7,transition:"border-color 0.15s",position:"relative"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                    <div style={{flex:1,minWidth:0}}>
                      <span style={{fontSize:10,fontWeight:700,color:BUZZ_CAT_COLORS[a.cat]||"#64748B",letterSpacing:0.4}}>{a.source}</span>
                      {a.searchLabel&&<span style={{marginLeft:6,fontSize:9,color:"#06B6D4",background:"rgba(6,182,212,0.1)",borderRadius:3,padding:"1px 5px"}}>🔍 {a.searchLabel}</span>}
                    </div>
                    <div style={{display:"flex",gap:2,alignItems:"center",flexShrink:0}}>
                      <span style={{fontSize:10,color:"#475569",marginRight:4}}>{fmtPub(a.pub)}</span>
                      <button onClick={e=>toggleStar(a.id,e)} title={isStarred?"Unstar":"Star"} style={{background:"none",border:"none",cursor:"pointer",fontSize:16,padding:"0 2px",lineHeight:1,color:isStarred?"#F59E0B":"#334155",transition:"color 0.15s"}}>{isStarred?"★":"☆"}</button>
                      <button onClick={e=>openNote(a.id,e)} title="Add note" style={{background:"none",border:"none",cursor:"pointer",fontSize:13,padding:"0 2px",lineHeight:1,color:hasNote?"#3B82F6":"#334155",transition:"color 0.15s"}}>📝</button>
                      <button onClick={e=>openShare(a.id,e)} title="Share" style={{background:"none",border:"none",cursor:"pointer",fontSize:13,padding:"0 2px",lineHeight:1,color:isShareOpen?"#10B981":"#334155",transition:"color 0.15s"}}>↗</button>
                    </div>
                  </div>
                  <a href={a.link} target="_blank" rel="noopener noreferrer" style={{textDecoration:"none"}}>
                    <div style={{fontSize:13,fontWeight:700,color:"#E2E8F0",lineHeight:1.4}}>{a.title}</div>
                  </a>
                  {a.desc&&<div style={{fontSize:11,color:"#64748B",lineHeight:1.55}}>{a.desc}{a.desc.length>=200?"…":""}</div>}
                  {hits.length>0&&<div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:2}}>{hits.map(t=>(
                    <span key={t} style={{background:"rgba(139,92,246,0.15)",border:"1px solid rgba(139,92,246,0.28)",borderRadius:4,padding:"1px 6px",fontSize:9,color:"#C4B5FD",fontWeight:600}}>{t}</span>
                  ))}</div>}
                  {/* Note display */}
                  {hasNote&&!isEditingNote&&(
                    <div style={{background:"rgba(59,130,246,0.08)",border:"1px solid rgba(59,130,246,0.2)",borderRadius:6,padding:"6px 9px",marginTop:2,cursor:"pointer"}} onClick={e=>openNote(a.id,e)}>
                      <div style={{fontSize:9,color:"#3B82F6",fontWeight:700,letterSpacing:0.5,marginBottom:2}}>MY NOTE</div>
                      <div style={{fontSize:11,color:"#94A3B8",lineHeight:1.4}}>{notes[a.id].text}</div>
                    </div>
                  )}
                  {/* Note editor */}
                  {isEditingNote&&(
                    <div style={{background:"#0F172A",border:"1px solid #334155",borderRadius:8,padding:10,marginTop:2}} onClick={e=>e.stopPropagation()}>
                      <textarea value={noteDraft} onChange={e=>setNoteDraft(e.target.value)} placeholder="Add your note..." autoFocus
                        style={{width:"100%",minHeight:60,background:"#1E293B",border:"1px solid #334155",borderRadius:6,padding:8,color:"#E2E8F0",fontSize:11,outline:"none",resize:"vertical",fontFamily:"inherit",lineHeight:1.5}}/>
                      <div style={{display:"flex",gap:6,marginTop:6,justifyContent:"flex-end"}}>
                        {notes[a.id]&&<button onClick={e=>{e.stopPropagation();setNotes(prev=>{const n={...prev};delete n[a.id];try{localStorage.setItem(LS_BUZZ_NOTES,JSON.stringify(n));}catch(e){}return n;});if(!stars[a.id]||!stars[a.id].at)deleteBookmark(a.id);else upsertBookmark(a.id,{note:null});setNoteEditing(null);}}
                          style={{background:"none",border:"1px solid rgba(239,68,68,0.3)",borderRadius:5,color:"#EF4444",cursor:"pointer",fontSize:10,fontWeight:600,padding:"3px 10px",fontFamily:"inherit"}}>Delete</button>}
                        <button onClick={e=>{e.stopPropagation();setNoteEditing(null);}} style={{background:"none",border:"1px solid #334155",borderRadius:5,color:"#64748B",cursor:"pointer",fontSize:10,fontWeight:600,padding:"3px 10px",fontFamily:"inherit"}}>Cancel</button>
                        <button onClick={e=>{e.stopPropagation();saveNote(a.id);}} style={{background:"#3B82F6",border:"none",borderRadius:5,color:"white",cursor:"pointer",fontSize:10,fontWeight:700,padding:"3px 12px",fontFamily:"inherit"}}>Save</button>
                      </div>
                    </div>
                  )}
                  {/* Share dropdown */}
                  {isShareOpen&&(
                    <div style={{background:"#0F172A",border:"1px solid #334155",borderRadius:8,padding:6,marginTop:2,display:"flex",gap:4}} onClick={e=>e.stopPropagation()}>
                      <button onClick={e=>shareViaEmail(a,e)} style={{flex:1,background:"#1E293B",border:"1px solid #334155",borderRadius:6,color:"#E2E8F0",cursor:"pointer",fontSize:11,fontWeight:600,padding:"7px 8px",fontFamily:"inherit"}}>✉ Email</button>
                      <button onClick={e=>shareViaSMS(a,e)} style={{flex:1,background:"#1E293B",border:"1px solid #334155",borderRadius:6,color:"#E2E8F0",cursor:"pointer",fontSize:11,fontWeight:600,padding:"7px 8px",fontFamily:"inherit"}}>💬 Text</button>
                      <button onClick={e=>copyLink(a,e)} style={{flex:1,background:"#1E293B",border:"1px solid #334155",borderRadius:6,color:"#E2E8F0",cursor:"pointer",fontSize:11,fontWeight:600,padding:"7px 8px",fontFamily:"inherit"}}>🔗 Copy</button>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>

        {/* Settings panel */}
        {showSettings&&(
          <div style={{width:285,background:"#0F172A",borderLeft:"1px solid #1E293B",display:"flex",flexDirection:"column",flexShrink:0}}>
            {/* Tab switcher */}
            <div style={{display:"flex",gap:3,padding:"10px 12px 6px",borderBottom:"1px solid #1E293B",flexShrink:0}}>
              <STab id="rss" label="RSS Feeds"/>
              <STab id="search" label="Searches"/>
              <STab id="themes" label="Themes"/>
            </div>
            <div style={{flex:1,overflowY:"auto",padding:14}}>

              {/* ── RSS Feeds tab ── */}
              {settingsTab==="rss"&&<>
                <div style={{fontSize:10,color:"#475569",lineHeight:1.5,marginBottom:10}}>Check/uncheck feeds. For paywalled newsletters (Stratechery, Substack paid), paste your personal subscriber RSS URL.</div>
                {sources.map(s=>(
                  <div key={s.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:7,padding:"6px 8px",background:"#1E293B",borderRadius:7}}>
                    <input type="checkbox" checked={s.on} onChange={()=>setSources(ss=>ss.map(x=>x.id===s.id?{...x,on:!x.on}:x))} style={{accentColor:"#3B82F6",cursor:"pointer",flexShrink:0}}/>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:12,color:"#E2E8F0",fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{s.label}</div>
                      <div style={{fontSize:9,color:BUZZ_CAT_COLORS[s.cat]||"#64748B"}}>{s.cat}</div>
                    </div>
                    <button onClick={()=>setSources(ss=>ss.filter(x=>x.id!==s.id))} style={{background:"none",border:"none",color:"#475569",cursor:"pointer",fontSize:16,padding:"0 3px",lineHeight:1,flexShrink:0}}>×</button>
                  </div>
                ))}
                <div style={{marginTop:10,display:"flex",flexDirection:"column",gap:5}}>
                  <input value={newLabel} onChange={e=>setNewLabel(e.target.value)} placeholder="Label (e.g. Stratechery)" style={{background:"#1E293B",border:"1px solid #334155",borderRadius:6,padding:"5px 9px",color:"#E2E8F0",fontSize:11,outline:"none"}}/>
                  <input value={newUrl} onChange={e=>setNewUrl(e.target.value)} placeholder="RSS feed URL" style={{background:"#1E293B",border:"1px solid #334155",borderRadius:6,padding:"5px 9px",color:"#E2E8F0",fontSize:11,outline:"none"}}/>

                  <input value={newQuery} onChange={e=>setNewQuery(e.target.value)} placeholder='Search terms (e.g. "CMMC" compliance DoD)' style={{background:"#1E293B",border:"1px solid #334155",borderRadius:6,padding:"5px 9px",color:"#E2E8F0",fontSize:11,outline:"none"}}/>
                  <button onClick={()=>{if(!newQLabel.trim()||!newQuery.trim())return;setSearches(ss=>[...ss,{id:Date.now().toString(),label:newQLabel.trim(),query:newQuery.trim(),on:true}]);setNewQLabel("");setNewQuery("");}}
                    style={{background:"#06B6D4",border:"none",borderRadius:6,color:"white",cursor:"pointer",fontSize:11,fontWeight:700,padding:6,fontFamily:"inherit"}}>+ Add Search Topic</button>

                <div style={{fontSize:10,color:"#475569",lineHeight:1.5,marginBottom:10}}>Theme keywords highlight and tag matching articles. Use them to spot the topics that matter most at a glance.</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:12}}>

                    <span key={t} style={{display:"flex",alignItems:"center",gap:4,background:"rgba(139,92,246,0.12)",border:"1px solid rgba(139,92,246,0.25)",borderRadius:5,padding:"3px 8px",fontSize:11,color:"#C4B5FD"}}>

                  <input value={newTheme} onChange={e=>setNewTheme(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&newTheme.trim()){setThemes(ts=>[...ts,newTheme.trim()]);setNewTheme("");}}} placeholder="Add keyword…" style={{flex:1,background:"#1E293B",border:"1px solid #334155",borderRadius:6,padding:"5px 9px",color:"#E2E8F0",fontSize:11,outline:"none"}}/>
                  <button onClick={()=>{if(newTheme.trim()){setThemes(ts=>[...ts,newTheme.trim()]);setNewTheme("");}}} style={{background:"#8B5CF6",border:"none",borderRadius:6,color:"white",cursor:"pointer",fontSize:11,fontWeight:700,padding:"5px 10px",fontFamily:"inherit"}}>+</button>
