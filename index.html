// ── Owner Select ──────────────────────────────────────────────────────────────
function OwnerSelect({value,onChange,team,onAddPerson,label}) {
  const [adding,setAdding]=useState(false), [newName,setNewName]=useState("");
  const handleAdd=()=>{ const n=newName.trim(); if(n){onAddPerson(n);onChange(n);} setNewName(""); setAdding(false); };
  return (
    <div className="field">
      <label>{label}</label>
      <select value={value||"None"} onChange={e=>{ if(e.target.value==="__add__") setAdding(true); else onChange(e.target.value); }}>
        <option value="None">None</option>

        <option value="__add__">＋ Add person…</option>
      </select>
      {adding&&<div className="add-person-row">

        <button onClick={()=>setAdding(false)}>✕</button>

// ── Concentric Circles ────────────────────────────────────────────────────────
function Circles({tasks,colorBy,onSelect,selectedId,showAll,hovId,onHover,onDotPositions,onTaskUpdate}) {
  const hov=hovId!=null?hovId:null;
  const setHov=id=>{if(onHover)onHover(id);};
  const [hovGroup,setHovGroup]=useState(null);
  const containerRef=useRef(null);
  const svgRef=useRef(null);
  const cardRefs=useRef({});
  const [connLines,setConnLines]=useState([]);
  const [ringLines,setRingLines]=useState([]);
  const headerRefs=useRef({});
  const [pendingDrop,setPendingDrop]=useState(null);
  const dragRef=useRef({task:null,startClient:null,active:false,pos:null});
  const [dragRender,setDragRender]=useState(null); // {task,x,y} for rendering ghost
  const onSelectRef=useRef(onSelect);
  onSelectRef.current=onSelect;

  // ── Voice command system ──
  const [voiceActive,setVoiceActive]=useState(false);
  const [voiceMsg,setVoiceMsg]=useState(null); // {text,type:"success"|"error"|"listening"|"heard"}
  const voiceRecRef=useRef(null);
  const voiceMsgTimer=useRef(null);
  const voiceSupported=typeof window!=="undefined"&&("SpeechRecognition" in window||"webkitSpeechRecognition" in window);

  const showVoiceMsg=(text,type,duration=4000)=>{
    clearTimeout(voiceMsgTimer.current);
    setVoiceMsg({text,type});
    if(duration>0) voiceMsgTimer.current=setTimeout(()=>setVoiceMsg(null),duration);
  };

  // Fuzzy match task name from spoken text
  const fuzzyMatchTask=(spoken)=>{
    const s=spoken.toLowerCase();
    let best=null,bestScore=-1;
    tasks.forEach(t=>{
      const name=t.name.toLowerCase();
      // Exact substring match is best
      if(s.includes(name)||name.includes(s)){best=t;bestScore=999;return;}
      // Word overlap scoring
      const sWords=s.split(/\s+/);
      const nWords=name.split(/\s+/);
      let score=0;
      nWords.forEach(nw=>{
        sWords.forEach(sw=>{
          if(nw===sw) score+=3;
          else if(nw.startsWith(sw)||sw.startsWith(nw)) score+=2;
          else if(nw.includes(sw)||sw.includes(nw)) score+=1;
        });
      });
      // Normalize by name length
      const norm=score/Math.max(nWords.length,1);
      if(norm>bestScore&&norm>=1.5){bestScore=norm;best=t;}
    });
    return best;
  };

  // Parse ring target from spoken text
  const parseRingTarget=(spoken)=>{
    const s=spoken.toLowerCase();
    if(/must\s*do/i.test(s)||/ring\s*(one|1)/i.test(s)||/critical/i.test(s)||/top\s*priority/i.test(s)) return {ring:0,importance:3,label:"Must Do"};
    if(/important/i.test(s)||/ring\s*(two|2)/i.test(s)||/middle/i.test(s)) return {ring:1,importance:2,label:"Important"};
    if(/nice\s*to\s*have/i.test(s)||/ring\s*(three|3)/i.test(s)||/outer/i.test(s)||/back\s*burner/i.test(s)) return {ring:2,importance:1,label:"Nice to Have"};
    return null;
  };

  const processVoiceCommand=(transcript)=>{
    showVoiceMsg(`Heard: "${transcript}"`, "heard", 2000);
    // Try to parse: "move [task] to [ring]"
    const moveMatch=transcript.match(/move\s+(.+?)\s+(?:to|into|in)\s+(?:the\s+)?(.+)/i);
    if(moveMatch){
      const taskPart=moveMatch[1].replace(/^the\s+/i,"").replace(/\s+task$/i,"");
      const ringPart=moveMatch[2];
      const task=fuzzyMatchTask(taskPart);
      const target=parseRingTarget(ringPart);
      if(!task){showVoiceMsg(`Couldn't find a task matching "${taskPart}"`, "error");return;}
      if(!target){showVoiceMsg(`Couldn't understand ring "${ringPart}". Try "Must Do", "Important", or "Nice to Have"`, "error");return;}
      const currentRing=getRing(task.importance);
      if(currentRing===target.ring){showVoiceMsg(`"${task.name}" is already in ${target.label}`, "error");return;}
      // Execute the move
      if(onTaskUpdateRef.current){
        onTaskUpdateRef.current(task.id,{importance:target.importance});
        showVoiceMsg(`Moved "${task.name}" → ${target.label} (importance: ${target.importance})`, "success", 5000);
      }
      return;
    }
    // Fallback: try to detect task name and ring without "move...to" structure
    const target=parseRingTarget(transcript);
    if(target){
      const cleaned=transcript.toLowerCase().replace(/must\s*do|important|nice\s*to\s*have|ring\s*(one|two|three|1|2|3)|critical|outer|back\s*burner|top\s*priority|middle/gi,"").replace(/move|put|set|change|to|the|into|in/gi,"").trim();
      if(cleaned){
        const task=fuzzyMatchTask(cleaned);
        if(task){
          const currentRing=getRing(task.importance);
          if(currentRing===target.ring){showVoiceMsg(`"${task.name}" is already in ${target.label}`, "error");return;}
          if(onTaskUpdateRef.current){
            onTaskUpdateRef.current(task.id,{importance:target.importance});
            showVoiceMsg(`Moved "${task.name}" → ${target.label} (importance: ${target.importance})`, "success", 5000);
          }
          return;
        }
      }
    }
    showVoiceMsg(`Try: "Move [task name] to [Must Do / Important / Nice to Have]"`, "error", 6000);
  };

  const toggleVoice=()=>{
    if(voiceActive&&voiceRecRef.current){voiceRecRef.current.stop();return;}
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR) return;
    const rec=new SR();
    rec.continuous=false;rec.interimResults=false;rec.lang="en-US";
    rec.onresult=(ev)=>{
      const text=ev.results[0][0].transcript;
      if(text) processVoiceCommand(text);
    };
    rec.onend=()=>setVoiceActive(false);
    rec.onerror=(e)=>{setVoiceActive(false);showVoiceMsg("Voice error: "+e.error,"error");};
    voiceRecRef.current=rec;rec.start();setVoiceActive(true);
    showVoiceMsg('Listening... say "Move [task] to [ring]"',"listening",0);
  };
  const onTaskUpdateRef=useRef(onTaskUpdate);
  onTaskUpdateRef.current=onTaskUpdate;
  const CX=320,CY=320;
  const rings=[
    {mid:60,  r1:0,  r2:121, label:"MUST DO",      lColor:"#EF4444",fill:"rgba(239,68,68,0.12)", stroke:"rgba(239,68,68,0.55)"},
    {mid:186, r1:121,r2:251, label:"IMPORTANT",    lColor:"#F59E0B",fill:"rgba(245,158,11,0.06)",stroke:"rgba(245,158,11,0.40)"},
    {mid:286, r1:251,r2:320, label:"NICE TO HAVE", lColor:"#475569",fill:"rgba(71,85,105,0.05)", stroke:"rgba(71,85,105,0.30)"},
  ];
  const getColor=t=>colorBy==="type"?typeColor(t):colorBy==="timeline"?TIME_COLORS[t.timeline]:CAT_COLORS[t.category];
  const grouped=rings.map((ring,ri)=>({...ring,tasks:tasks.filter(t=>getRing(t.importance)===ri)}));

  // ── Collision-avoidance: compute resolved positions for all dots ──
  const dotPositions=useMemo(()=>{
    const DOT_R=9, MIN_GAP=3;
    // Build flat list of dots with initial angular placement
    const pts=[];
    grouped.forEach((ring)=>{
      const n=Math.max(ring.tasks.length,1);
      ring.tasks.forEach((task,i)=>{
        const angle=(i/n)*2*Math.PI-Math.PI/2;
        const nx=CX+ring.mid*Math.cos(angle), ny=CY+ring.mid*Math.sin(angle);
        pts.push({id:task.id, x:nx, y:ny, nx, ny, r:DOT_R, r1:ring.r1, r2:ring.r2});
      });
    });
    // Iterative force-based push
    for(let iter=0;iter<300;iter++){
      let anyMove=false;
      // Dot–dot repulsion
      for(let a=0;a<pts.length;a++){
        for(let b=a+1;b<pts.length;b++){
          const dx=pts[b].x-pts[a].x, dy=pts[b].y-pts[a].y;
          const dist=Math.sqrt(dx*dx+dy*dy);
          const minD=pts[a].r+pts[b].r+MIN_GAP;
          if(dist<minD&&dist>0.01){
            const push=(minD-dist)/2, ux=dx/dist, uy=dy/dist;
            pts[a].x-=ux*push; pts[a].y-=uy*push;
            pts[b].x+=ux*push; pts[b].y+=uy*push;
            anyMove=true;
          }
        }
      }
      // Clamp dots inside their ring boundaries
      for(const p of pts){
        const dx=p.x-CX, dy=p.y-CY;
        const dist=Math.sqrt(dx*dx+dy*dy);
        const innerLim=p.r1+p.r+2;
        const outerLim=p.r2-p.r-2;
        if(dist>0.01){
          if(dist<innerLim){ p.x=CX+dx/dist*innerLim; p.y=CY+dy/dist*innerLim; anyMove=true; }
          else if(dist>outerLim){ p.x=CX+dx/dist*outerLim; p.y=CY+dy/dist*outerLim; anyMove=true; }
        }
      }
      // Gentle pull back toward original angle (keep dots spread)
      for(const p of pts){
        p.x+=(p.nx-p.x)*0.03;
        p.y+=(p.ny-p.y)*0.03;
      }
      if(!anyMove) break;
    }
    const map={};
    pts.forEach(p=>map[p.id]={x:p.x,y:p.y});
    if(onDotPositions) onDotPositions(map);
    return map;
  },[grouped]);

  // ── Task label positions with collision avoidance ────────────────────────
  const dotLabelPos=useMemo(()=>{
    const DOT_R=9, LH=18, LPAD=6, CHAR_W=5.5, FS=10;
    const allTasks=grouped.flatMap(g=>g.tasks);
    const placedLabels=[];
    const result={};

    // Sort tasks by angle from center for consistent placement
    const sorted=[...allTasks].sort((a,b)=>{
      const pa=dotPositions[a.id], pb=dotPositions[b.id];
      if(!pa||!pb) return 0;
      const angA=Math.atan2(pa.y-CY,pa.x-CX);
      const angB=Math.atan2(pb.y-CY,pb.x-CX);
      return angA-angB;
    });

    const checkCollision=(lx,ly,lw)=>{
      let score=0;
      // Vs other placed labels
      for(const q of placedLabels){
        if(lx<q.x+q.w+LPAD && lx+lw>q.x-LPAD && ly<q.y+q.h+LPAD && ly+LH>q.y-LPAD) score++;
      }
      // Vs all dots
      for(const t of allTasks){
        const dp=dotPositions[t.id]; if(!dp) continue;
        const cr=DOT_R+3;
        const clX=Math.max(lx,Math.min(dp.x,lx+lw));
        const clY=Math.max(ly,Math.min(dp.y,ly+LH));
        const dx=dp.x-clX, dy=dp.y-clY;
        if(dx*dx+dy*dy<cr*cr) score+=1.5;
      }
      // Penalize if outside SVG bounds
      if(lx<4||lx+lw>636||ly<4||ly+LH>636) score+=3;
      return score;
    };

    for(const t of sorted){
      const dp=dotPositions[t.id];
      if(!dp) continue;
      const title=t.name.length>18?t.name.slice(0,18)+"…":t.name;
      const lw=title.length*CHAR_W+6;
      const gap=DOT_R+12;
      // Direction from center determines preferred label side
      const ang=Math.atan2(dp.y-CY,dp.x-CX);
      const cos=Math.cos(ang), sin=Math.sin(ang);

      // Generate candidates: outward from dot, and several offset angles
      const candidates=[];
      const offsets=[0, -0.4, 0.4, -0.8, 0.8, Math.PI, Math.PI-0.4, Math.PI+0.4];
      for(const off of offsets){
        const a=ang+off;
        const cx=dp.x+Math.cos(a)*gap;
        const cy=dp.y+Math.sin(a)*gap;
        // Anchor label: center vertically, align based on direction
        const lx=Math.cos(a)>=0 ? cx : cx-lw;
        const ly=cy-LH/2;
        candidates.push({x:lx,y:ly});
      }
      // Also try further out
      for(const off of [0, -0.3, 0.3, -0.6, 0.6]){
        const a=ang+off;
        const cx=dp.x+Math.cos(a)*(gap+24);
        const cy=dp.y+Math.sin(a)*(gap+24);
        const lx=Math.cos(a)>=0 ? cx : cx-lw;
        const ly=cy-LH/2;
        candidates.push({x:lx,y:ly});
      }

      let best=candidates[0];
      let bestScore=Infinity;
      for(const c of candidates){
        const s=checkCollision(c.x,c.y,lw);
        if(s<bestScore){bestScore=s;best=c;}
        if(s===0) break; // Perfect placement found
      }

      result[t.id]={x:best.x,y:best.y,w:lw,h:LH,title};
      placedLabels.push({x:best.x,y:best.y,w:lw,h:LH});
    }

    // Force-push pass to resolve remaining overlaps
    const labs=Object.keys(result).map(id=>({id:+id,r:result[id]}));
    for(let iter=0;iter<25;iter++){
      let moved=false;
      for(let i=0;i<labs.length;i++){
        for(let j=i+1;j<labs.length;j++){
          const a=labs[i].r, b=labs[j].r;
          const ox=Math.min(a.x+a.w+LPAD,b.x+b.w+LPAD)-Math.max(a.x-LPAD,b.x-LPAD);
          const oy=Math.min(a.y+a.h+LPAD,b.y+b.h+LPAD)-Math.max(a.y-LPAD,b.y-LPAD);
          if(ox>0&&oy>0){
            if(oy<ox){
              const push=oy/2+0.5;
              if(a.y<b.y){a.y-=push;b.y+=push;}else{a.y+=push;b.y-=push;}
            }else{
              const push=ox/2+0.5;
              if(a.x<b.x){a.x-=push;b.x+=push;}else{a.x+=push;b.x-=push;}
            }
            a.y=Math.max(2,Math.min(634,a.y));
            b.y=Math.max(2,Math.min(634,b.y));
            a.x=Math.max(2,Math.min(636-a.w,a.x));
            b.x=Math.max(2,Math.min(636-b.w,b.x));
            moved=true;
          }
        }
      }
      if(!moved) break;
    }
    const final={};
    for(const l of labs) final[l.id]=l.r;
    return final;
  },[dotPositions,grouped]);

  useEffect(()=>{
    if(!showAll||!svgRef.current||!containerRef.current){setConnLines([]);return;}
    let toConnect=[];
    if(hov) toConnect=tasks.filter(t=>t.id===hov);
    else if(hovGroup!==null) toConnect=tasks.filter(t=>getRing(t.importance)===hovGroup);
    if(!toConnect.length){setConnLines([]);return;}
    const svgEl=svgRef.current, contEl=containerRef.current;
    const contRect=contEl.getBoundingClientRect();
    const ctm=svgEl.getScreenCTM(); if(!ctm){setConnLines([]);return;}
    const lines=toConnect.map(task=>{
      const pos=dotPositions[task.id]; if(!pos) return null;
      const pt=svgEl.createSVGPoint();
      pt.x=pos.x; pt.y=pos.y;
      const sp=pt.matrixTransform(ctm);
      const cardEl=cardRefs.current[task.id]; if(!cardEl) return null;
      const cr=cardEl.getBoundingClientRect();
      return {x1:sp.x-contRect.left,y1:sp.y-contRect.top,x2:cr.left-contRect.left,y2:cr.top+cr.height/2-contRect.top,color:getColor(task)};
    }).filter(Boolean);
    setConnLines(lines);
  },[hov,hovGroup,showAll,dotPositions]);

  // Ring header → ring boundary connector line
  useEffect(()=>{
    if(hovGroup===null||!showAll||!svgRef.current||!containerRef.current){setRingLines([]);return;}
    const ring=rings[hovGroup];
    const headerEl=headerRefs.current[hovGroup];
    if(!headerEl){setRingLines([]);return;}
    const svgEl=svgRef.current, contEl=containerRef.current;
    const contRect=contEl.getBoundingClientRect();
    const ctm=svgEl.getScreenCTM(); if(!ctm){setRingLines([]);return;}
    // Rightmost point of the ring circle (the edge closest to the detail panel)
    const pt=svgEl.createSVGPoint(); pt.x=CX+ring.r2; pt.y=CY;
    const sp=pt.matrixTransform(ctm);
    const hr=headerEl.getBoundingClientRect();
    setRingLines([{
      x1:sp.x-contRect.left, y1:sp.y-contRect.top,
      x2:hr.left-contRect.left, y2:hr.top+hr.height/2-contRect.top,
      color:ring.lColor
    }]);
  },[hovGroup,showAll]);

  // Drag tracking — uses native DOM listeners for maximum reliability
  const tasksRef=useRef(tasks);
  tasksRef.current=tasks;
  const toSvgCoords=(clientX,clientY)=>{
    const svg=svgRef.current;if(!svg)return null;
    const pt=svg.createSVGPoint();pt.x=clientX;pt.y=clientY;
    const ctm=svg.getScreenCTM();if(!ctm)return null;
    const s=pt.matrixTransform(ctm.inverse());
    return{x:Math.max(0,Math.min(640,s.x)),y:Math.max(0,Math.min(640,s.y))};
  };
  // Attach native mousedown on the SVG element, mousemove/mouseup on window
  useEffect(()=>{
    const svg=svgRef.current;
    if(!svg)return;
    const onDown=(e)=>{
      // Walk up from the event target to find a [data-dot-id] group
      let el=e.target;
      let dotId=null;
      while(el&&el!==svg){
        if(el.dataset&&el.dataset.dotId){dotId=el.dataset.dotId;break;}
        el=el.parentElement||el.parentNode;
      }
      if(!dotId)return;
      e.preventDefault();
      const task=tasksRef.current.find(t=>String(t.id)===dotId);
      if(!task)return;
      dragRef.current={task,startClient:{x:e.clientX,y:e.clientY},active:false,pos:null};
    };
    const onMove=(e)=>{
      const d=dragRef.current;if(!d||!d.task)return;
      const dx=e.clientX-d.startClient.x,dy=e.clientY-d.startClient.y;
      if(!d.active&&Math.sqrt(dx*dx+dy*dy)<6)return;
      d.active=true;
      const svgPt=toSvgCoords(e.clientX,e.clientY);
      if(svgPt){d.pos=svgPt;setDragRender({task:d.task,x:svgPt.x,y:svgPt.y});}
    };
    const onUp=(e)=>{
      const d=dragRef.current;
      if(!d||!d.task)return;
      if(d.active&&d.pos){
        const dist=Math.sqrt((d.pos.x-CX)**2+(d.pos.y-CY)**2);
        const newRing=dist<=121?0:dist<=251?1:2;
        const oldRing=getRing(d.task.importance);
        if(newRing!==oldRing){
          const newImportance=newRing===0?3:newRing===1?2:1;
          const ringLabel=["MUST DO","IMPORTANT","NICE TO HAVE"][newRing];
          setPendingDrop({task:d.task,newImportance,ringLabel,x:d.pos.x,y:d.pos.y});
        }
      } else if(!d.active){
        const task=d.task;
        if(onSelectRef.current) onSelectRef.current(task);
      }
      dragRef.current={task:null,startClient:null,active:false,pos:null};
      setDragRender(null);
    };
    svg.addEventListener("mousedown",onDown);
    window.addEventListener("mousemove",onMove);
    window.addEventListener("mouseup",onUp);
    return()=>{svg.removeEventListener("mousedown",onDown);window.removeEventListener("mousemove",onMove);window.removeEventListener("mouseup",onUp);};
  },[]);

  return (
    <div ref={containerRef} style={{flex:1,minHeight:0,display:"flex",overflow:"hidden",position:"relative"}}>
      {/* Legend — HTML overlay, top-left corner */}
      <div style={{position:"absolute",top:6,left:6,zIndex:10,background:"rgba(15,23,42,0.92)",border:"1px solid #1E293B",borderRadius:8,padding:"8px 12px",display:"flex",flexDirection:"column",gap:6}}>
        {rings.map((r,ri)=>(
          <div key={ri} style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{width:10,height:10,borderRadius:"50%",background:r.fill,border:`1.5px solid ${r.stroke}`,flexShrink:0}}/>
            <span style={{fontSize:11,fontWeight:700,color:r.lColor,letterSpacing:0.8,opacity:0.9}}>{r.label}</span>
          </div>
        ))}
        {voiceSupported&&(
          <button onClick={toggleVoice} title={voiceActive?'Stop listening':'Voice command — say "Move [task] to [ring]"'}
            style={{marginTop:4,display:"flex",alignItems:"center",gap:6,padding:"5px 10px",borderRadius:6,
              border:`1px solid ${voiceActive?"#EF4444":"#334155"}`,
              background:voiceActive?"rgba(239,68,68,0.15)":"rgba(59,130,246,0.08)",
              color:voiceActive?"#EF4444":"#64748B",cursor:"pointer",fontSize:11,fontWeight:600,
              transition:"all 0.15s",animation:voiceActive?"pulse 1.2s infinite":"none"}}>
            {voiceActive?"⏹ Listening...":"🎤 Voice Move"}
          </button>
        )}
      </div>
      {/* Voice command toast */}
      {voiceMsg&&(
        <div style={{position:"absolute",top:10,left:"50%",transform:"translateX(-50%)",zIndex:20,
          background:voiceMsg.type==="success"?"rgba(16,185,129,0.95)":voiceMsg.type==="error"?"rgba(239,68,68,0.95)":voiceMsg.type==="heard"?"rgba(59,130,246,0.95)":"rgba(139,92,246,0.9)",
          color:"white",padding:"10px 20px",borderRadius:10,fontSize:13,fontWeight:600,
          boxShadow:"0 8px 32px rgba(0,0,0,0.4)",maxWidth:500,textAlign:"center",
          animation:"voiceToastIn 0.25s ease-out"}}>
          {voiceMsg.text}
        </div>
      )}
      {/* SVG ring chart */}
      <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden",padding:"4px 12px"}}>
        <svg ref={svgRef} viewBox="0 0 640 640" style={{width:"100%",height:"100%",maxWidth:775,maxHeight:775}} preserveAspectRatio="xMidYMid meet">
          {[...grouped].reverse().map((r,i)=><circle key={i} cx={CX} cy={CY} r={r.r2} fill={r.fill} stroke={r.stroke} strokeWidth={1.5}/>)}
          {grouped.map(ring=>ring.tasks.map((task,i)=>{
            const pos=dotPositions[task.id];
            const x=pos?pos.x:(CX), y=pos?pos.y:(CY);
            const isHov=hov===task.id,isSel=selectedId===task.id;
            const color=getColor(task),dotR=isSel?12:isHov?11:9;
            return (
              <g key={task.id} data-dot-id={String(task.id)}
                onMouseEnter={()=>setHov(task.id)} onMouseLeave={()=>setHov(null)} style={{cursor:"grab",userSelect:"none"}}>
                {isSel&&<circle cx={x} cy={y} r={dotR+4} fill={color} opacity={0.18}/>}
                {hov===task.id&&<circle cx={x} cy={y} r={dotR+5} fill="none" stroke={color} strokeWidth={1.5} opacity={0.5} strokeDasharray="3,2"/>}
                <circle cx={x} cy={y} r={dotR} fill={color} stroke={isSel?"white":"rgba(255,255,255,0.55)"} strokeWidth={isSel?2.5:1.5} opacity={dragRender?.task?.id===task.id?0.4:isSel?1:0.9}/>
              </g>
            );
          }))}
          {/* Dragging ghost circle */}
          {dragRender&&(
            <circle cx={dragRender.x} cy={dragRender.y} r={11} fill={getColor(dragRender.task)} stroke="white" strokeWidth={2} opacity={0.6} strokeDasharray="4,3" pointerEvents="none"/>
          )}
          {/* Task name labels adjacent to each dot */}
          {grouped.flatMap(g=>g.tasks).map(task=>{
            const dp=dotPositions[task.id], lp=dotLabelPos[task.id];
            if(!dp||!lp) return null;
            const isHov2=hov===task.id, isSel2=selectedId===task.id;
            const color=getColor(task);
            // Connector line: from dot edge toward label nearest edge
            const lCenterX=lp.x+lp.w/2, lCenterY=lp.y+lp.h/2;
            const ang=Math.atan2(lCenterY-dp.y,lCenterX-dp.x);
            const lineX1=dp.x+Math.cos(ang)*10;
            const lineY1=dp.y+Math.sin(ang)*10;
            // Nearest point on label rect to the dot
            const lineX2=Math.max(lp.x,Math.min(dp.x,lp.x+lp.w));
            const lineY2=Math.max(lp.y,Math.min(dp.y,lp.y+lp.h));
            return (
              <g key={"dlbl-"+task.id} style={{pointerEvents:"none"}}>
                <line x1={lineX1} y1={lineY1} x2={lineX2} y2={lineY2}
                  stroke={color} strokeWidth={0.6} strokeDasharray="2,1.5" opacity={isHov2||isSel2?0.7:0.3}/>
                <text x={lp.x} y={lp.y+lp.h-4}
                  fill={isHov2||isSel2?"#F8FAFC":"#CBD5E1"}
                  fontSize={10} fontWeight={isHov2||isSel2?700:500}
                  opacity={isHov2||isSel2?1:0.8}>{lp.title}</text>
              </g>
            );
          })}
        </svg>

        {/* Confirmation overlay for drag drop */}
        {pendingDrop&&pendingDrop.x!==undefined&&(
          <svg style={{position:"absolute",top:0,left:0,width:"100%",height:"100%",pointerEvents:"auto",overflow:"visible"}} width="100%" height="100%">
            <foreignObject x={Math.max(0,pendingDrop.x-80)} y={Math.max(0,pendingDrop.y-80)} width={160} height={100}>
              <div style={{background:"#1E293B",border:`2px solid ${pendingDrop.task.importance===3?"#EF4444":pendingDrop.task.importance===2?"#F59E0B":"#475569"}`,borderRadius:12,padding:12,width:"100%",boxShadow:"0 8px 32px rgba(0,0,0,0.6)",fontFamily:"inherit"}}>
                <div style={{fontSize:11,fontWeight:600,color:"#F1F5F9",marginBottom:8,maxWidth:136,whiteSpace:"normal",wordBreak:"break-word"}}>{pendingDrop.task.name}</div>
                <div style={{fontSize:10,color:"#94A3B8",marginBottom:10}}>Move to {pendingDrop.ringLabel}?</div>
                <div style={{display:"flex",gap:6}}>
                  <button onClick={async()=>{if(onTaskUpdateRef.current)await onTaskUpdateRef.current(pendingDrop.task.id,{importance:pendingDrop.newImportance});setPendingDrop(null);}} style={{flex:1,background:"#10B981",color:"white",border:"none",borderRadius:6,padding:"6px 12px",fontSize:11,fontWeight:600,cursor:"pointer"}}>✓ Move</button>
                  <button onClick={()=>setPendingDrop(null)} style={{flex:1,background:"#EF4444",color:"white",border:"none",borderRadius:6,padding:"6px 12px",fontSize:11,fontWeight:600,cursor:"pointer"}}>✕ Cancel</button>
                </div>
              </div>
            </foreignObject>
          </svg>
        )}
      </div>

      {/* Right detail panel — visible when Details On */}
      {showAll&&(
        <div style={{width:270,flexShrink:0,overflowY:"auto",borderLeft:"1px solid #1E293B",background:"#0A0F1C",padding:"8px 6px",display:"flex",flexDirection:"column",gap:3,justifyContent:"center"}}>
          {grouped.map((ring,ri)=>ring.tasks.length===0?null:(
            <div key={ring.label}>
              <div
                ref={el=>headerRefs.current[ri]=el}
                onMouseEnter={()=>setHovGroup(ri)} onMouseLeave={()=>setHovGroup(null)}
                style={{fontSize:9,fontWeight:700,color:ring.lColor,letterSpacing:1.2,padding:"6px 6px 4px",textTransform:"uppercase",cursor:"crosshair",userSelect:"none",
                  background:hovGroup===ri?"rgba(255,255,255,0.06)":"transparent",borderRadius:4,transition:"background 0.15s"}}>{ring.label} ↔</div>
              {ring.tasks.map(task=>{
                const color=getColor(task);
                const isSel=selectedId===task.id, isHov=hov===task.id;
                return (
                  <div key={task.id} ref={el=>cardRefs.current[task.id]=el}
                    onClick={()=>onSelect(task)} onMouseEnter={()=>setHov(task.id)} onMouseLeave={()=>setHov(null)}
                    style={{background:isSel?"rgba(59,130,246,0.12)":isHov?"rgba(255,255,255,0.05)":"rgba(255,255,255,0.02)",
                      border:`1px solid ${isSel?"#3B82F6":isHov?color:"#1E293B"}`,
                      borderLeft:`3px solid ${color}`,borderRadius:6,
                      padding:"6px 8px",cursor:"pointer",transition:"all 0.15s",marginBottom:3}}>
                    <div style={{fontSize:11,fontWeight:600,color:"#F1F5F9",lineHeight:1.3,marginBottom:2}}>{task.name}</div>
                    <div style={{fontSize:9.5,color:"#64748B"}}>{typeLabel(task)} · Imp {task.importance}/10 · Urg {task.urgency}/3</div>
                    {task.ownerPrimary&&<div style={{fontSize:9,color:"#475569",marginTop:1}}>{task.ownerPrimary}</div>}
                    {task.dueDate&&<div style={{fontSize:9,color:"#334155",marginTop:1}}>📅 {fmtDate(task.dueDate)}</div>}
                  </div>
                );
              })}
            </div>
          ))}
        </div>
      )}

      {/* Dashed connector lines — single task hover or whole group hover */}
      {(connLines.length>0||ringLines.length>0)&&showAll&&(
        <svg style={{position:"absolute",top:0,left:0,width:"100%",height:"100%",pointerEvents:"none",zIndex:10,overflow:"visible"}}>
          {/* Task dot → task card lines */}
          {connLines.map((l,i)=>(
            <line key={i} x1={l.x1} y1={l.y1} x2={l.x2} y2={l.y2}
              stroke={l.color} strokeWidth={2} strokeDasharray="6,4" strokeLinecap="round" opacity={0.85}/>
          ))}
          {/* Ring header → ring boundary line */}
          {ringLines.map((l,i)=>(
            <line key={"r"+i} x1={l.x1} y1={l.y1} x2={l.x2} y2={l.y2}
              stroke={l.color} strokeWidth={1.5} strokeDasharray="4,4" strokeLinecap="round" opacity={0.6}/>
          ))}
        </svg>
      )}
    </div>
  );
}

// ── Eisenhower Matrix ─────────────────────────────────────────────────────────
function Matrix({tasks,colorBy,onSelect,selectedId,showDetails}) {
  const getColor=t=>colorBy==="type"?typeColor(t):colorBy==="timeline"?TIME_COLORS[t.timeline]:CAT_COLORS[t.category];
  const byQ=QUADRANTS.map(q=>({...q,tasks:tasks.filter(t=>getQuad(t.importance,t.urgency)===q.key)}));
  return (
    <div style={{width:"100%",height:"100%",display:"flex",flexDirection:"column",gap:5}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"0 4px",flexShrink:0}}>
        <span style={{fontSize:10,color:"#64748B",letterSpacing:1,fontWeight:600}}>← NOT URGENT</span>
        <span style={{fontSize:10,color:"#64748B",letterSpacing:1,fontWeight:600}}>URGENT →</span>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gridTemplateRows:"1fr 1fr",gap:10,flex:1,overflow:"hidden"}}>
        {[byQ[1],byQ[0],byQ[3],byQ[2]].map(q=>(
          <div key={q.key} className="quadrant" style={{border:`1px solid ${q.border}`,background:q.bg}}>
            <div className="q-label" style={{color:q.color}}>
              <div className="q-dot" style={{background:q.color}}/>{q.label}
              <span style={{color:"#475569",fontWeight:400,fontSize:9,letterSpacing:0.5,marginLeft:2}}>— {q.sub}</span>
              <span style={{marginLeft:"auto",fontSize:9,color:"#334155"}}>{q.tasks.length}</span>
            </div>
            <div className="q-tasks">
              {q.tasks.length===0&&<div style={{color:"#334155",fontSize:11,fontStyle:"italic"}}>No tasks</div>}
              {q.tasks.map(t=>(
                <div key={t.id} className={`task-card${selectedId===t.id?" selected":""}`} onClick={()=>onSelect(t)}
                  style={{borderLeft:`3px solid ${getColor(t)}`}}>
                  <div style={{fontSize:12,fontWeight:600,color:"#F1F5F9",lineHeight:1.3}}>{t.name}</div>
                  {showDetails&&<div style={{display:"flex",gap:4,marginTop:4,flexWrap:"wrap",alignItems:"center"}}>
                    <span className="chip" style={{background:`${getColor(t)}22`,color:getColor(t)}}>{typeLabel(t)}</span>
                    <span className="chip" style={{background:"#1E293B",color:"#64748B"}}>{ownerDisplay(t)}</span>
                    {t.dueDate&&<span style={{fontSize:10,color:"#475569"}}>📅 {fmtDate(t.dueDate)}</span>}
                  </div>}
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>
      <div style={{display:"flex",justifyContent:"space-between",padding:"0 4px",flexShrink:0}}>
        <span style={{fontSize:10,color:"#64748B",letterSpacing:1,fontWeight:600}}>↓ LESS IMPORTANT</span>
        <span style={{fontSize:10,color:"#64748B",letterSpacing:1,fontWeight:600}}>MORE IMPORTANT ↑</span>
      </div>
    </div>
  );
}

// ── Value vs. Effort Matrix ───────────────────────────────────────────────────
function ValueEffortMatrix({tasks,colorBy,onSelect,selectedId,showDetails,onTaskUpdate}) {
  const getColor=t=>colorBy==="type"?typeColor(t):colorBy==="timeline"?TIME_COLORS[t.timeline]:CAT_COLORS[t.category];
  const byQ=VE_QUADRANTS.map(q=>({...q,tasks:tasks.filter(t=>getVEQuad(t.value,t.effort)===q.key)}));
  const [hovId,setHovId]=useState(null);
  const [veNotes,setVeNotes]=useState(()=>{try{return localStorage.getItem("pm_ve_notes")||"";}catch(e){return "";}});
  const [veNotesSaved,setVeNotesSaved]=useState(true);
  const [pendingVEDrop,setPendingVEDrop]=useState(null);
  const [veDragState,setVeDragState]=useState(null);
  const veDragRef=useRef(null);
  const quadRefs=useRef({});
  const veContainerRef=useRef(null);
  const onSelectRef=useRef(onSelect);
  onSelectRef.current=onSelect;
  const onTaskUpdateRef=useRef(onTaskUpdate);
  onTaskUpdateRef.current=onTaskUpdate;
  const veTasksRef=useRef(tasks);
  veTasksRef.current=tasks;
  const saveVeNotes=useCallback(()=>{try{localStorage.setItem("pm_ve_notes",veNotes);}catch(e){} setVeNotesSaved(true);},[veNotes]);
  const getQuadAtPoint=(clientX,clientY)=>{
    for(const key of [0,1,2,3]){
      const el=quadRefs.current[key];
      if(!el)continue;
      const r=el.getBoundingClientRect();
      if(clientX>=r.left&&clientX<=r.right&&clientY>=r.top&&clientY<=r.bottom)return key;
    }
    return null;
  };
  // Native DOM event listeners for VxE drag
  useEffect(()=>{
    const container=veContainerRef.current;
    if(!container)return;
    const onDown=(e)=>{
      // Walk up from target to find a [data-task-id] element
      let el=e.target;
      let taskId=null;
      while(el&&el!==container){
        if(el.dataset&&el.dataset.taskId){taskId=el.dataset.taskId;break;}
        el=el.parentElement;
      }
      if(!taskId)return;
      e.preventDefault();
      const task=veTasksRef.current.find(t=>String(t.id)===taskId);
      if(!task)return;
      veDragRef.current={task,startX:e.clientX,startY:e.clientY,currentX:e.clientX,currentY:e.clientY,active:false};
    };
    const onMove=(e)=>{
      const d=veDragRef.current;if(!d)return;
      const dx=e.clientX-d.startX,dy=e.clientY-d.startY;
      if(!d.active&&Math.sqrt(dx*dx+dy*dy)<6)return;
      d.active=true;d.currentX=e.clientX;d.currentY=e.clientY;
      veDragRef.current={...d};
      setVeDragState({...d});
    };
    const onUp=(e)=>{
      const d=veDragRef.current;
      if(!d)return;
      if(d.active){
        const targetQ=getQuadAtPoint(e.clientX,e.clientY);
        const currentQ=getVEQuad(d.task.value,d.task.effort);
        if(targetQ!==null&&targetQ!==currentQ){
          const veMap={0:{value:3,effort:1},1:{value:3,effort:3},2:{value:1,effort:1},3:{value:1,effort:3}};
          const newVE=veMap[targetQ];
          setPendingVEDrop({task:d.task,quadrantKey:targetQ,quadrantLabel:VE_QUADRANTS[targetQ].label,newValue:newVE.value,newEffort:newVE.effort});
        }
      } else {
        if(onSelectRef.current) onSelectRef.current(d.task);
      }
      veDragRef.current=null;
      setVeDragState(null);
    };
    container.addEventListener("mousedown",onDown);
    window.addEventListener("mousemove",onMove);
    window.addEventListener("mouseup",onUp);
    return()=>{container.removeEventListener("mousedown",onDown);window.removeEventListener("mousemove",onMove);window.removeEventListener("mouseup",onUp);};
  },[]);

  return (
    <div style={{width:"100%",height:"100%",display:"flex",gap:0}}>
      {/* Left 75%: quadrants */}
      <div style={{flex:3,display:"flex",flexDirection:"column",gap:5,minWidth:0,position:"relative"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"0 4px",flexShrink:0}}>
          <span style={{fontSize:10,color:"#64748B",letterSpacing:1,fontWeight:600}}>← LOW EFFORT</span>
          <span style={{fontSize:10,color:"#64748B",letterSpacing:0.5,fontWeight:600}}>VALUE vs. EFFORT</span>
          <span style={{fontSize:10,color:"#64748B",letterSpacing:1,fontWeight:600}}>HIGH EFFORT →</span>
        </div>
        <div ref={veContainerRef} style={{display:"grid",gridTemplateColumns:"1fr 1fr",gridTemplateRows:"1.57fr 0.6fr",gap:18,flex:1,overflow:"visible"}}>
          {[byQ[0],byQ[1],byQ[2],byQ[3]].map(q=>(
            <div key={q.key} className="quadrant" ref={el=>quadRefs.current[q.key]=el}
              style={{border:`2px solid ${q.border}`,background:`linear-gradient(135deg, ${q.bg} 0%, rgba(15,23,42,0.95) 70%)`,boxShadow:`0 0 18px ${q.border}, inset 0 0 30px rgba(0,0,0,0.15)`,borderRadius:12}}>
              <div style={{flexShrink:0,background:`linear-gradient(90deg, ${q.color}CC, ${q.color}88)`,borderRadius:"10px 10px 0 0",padding:"8px 14px",marginBottom:8,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{width:8,height:8,borderRadius:"50%",background:"white",opacity:0.9,flexShrink:0}}/>
                  <span style={{fontSize:11,fontWeight:800,color:"white",letterSpacing:1.5,textTransform:"uppercase"}}>{q.label}</span>
                  <span style={{fontSize:9,fontWeight:500,color:"rgba(255,255,255,0.7)",letterSpacing:0.3}}>— {q.sub}</span>
                </div>
                <span style={{fontSize:10,fontWeight:700,color:"rgba(255,255,255,0.8)",background:"rgba(0,0,0,0.25)",borderRadius:10,padding:"2px 8px"}}>{q.tasks.length}</span>
              </div>
              <div style={{padding:"0 12px 12px 12px",flex:1,display:"flex",flexDirection:"column"}}>
              <div style={{fontSize:10,color:q.color,fontStyle:"italic",opacity:0.85,marginBottom:6}}>{q.tag}</div>
              {(()=>{
                const n=q.tasks.length;
                const compact=n>=6;
                const twoCol=n>=4;
                const fs=compact?9:12;
                const pad=compact?"3px 5px":"6px 8px";
                const gap=compact?3:5;
                return (
                  <div className="q-tasks" style={{flexDirection:twoCol?"row":"column",flexWrap:twoCol?"wrap":"nowrap",gap}}>
                    {n===0&&<div style={{color:"#334155",fontSize:11,fontStyle:"italic"}}>No tasks</div>}
                    {q.tasks.map(t=>{
                      const isHov=hovId===t.id;
                      const isSel=selectedId===t.id;
                      return (
                        <div key={t.id} data-task-id={String(t.id)}
                          onMouseEnter={()=>{if(!veDragState)setHovId(t.id);}} onMouseLeave={()=>setHovId(null)}
                          style={{
                            borderLeft:(isHov&&!veDragState)?`4px solid ${getColor(t)}`:`3px solid ${getColor(t)}`,
                            background:(veDragState?.task?.id===t.id&&veDragState?.active)?"rgba(59,130,246,0.08)":(isSel?"rgba(59,130,246,0.12)":"#0F172A"),
                            borderRadius:(isHov&&!veDragState)?8:compact?4:6,
                            padding:(isHov&&!veDragState&&!twoCol)?"10px 12px":pad,
                            cursor:"grab",
                            width:twoCol?"calc(50% - 3px)":undefined,
                            flexShrink:twoCol?0:undefined,
                            transition:(veDragState?.task?.id===t.id)?"none":"all 0.15s ease-out",
                            transform:(isHov&&!veDragState)?"scale(1.35) translateY(-4px)":"scale(1)",
                            transformOrigin:twoCol?"center center":"left center",
                            zIndex:(isHov&&!veDragState)?50:1,
                            position:"relative",
                            opacity:(veDragState?.task?.id===t.id&&veDragState?.active)?0.4:1,
                            boxShadow:(isHov&&!veDragState)?"0 16px 48px rgba(0,0,0,0.7), 0 4px 12px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.08)":"none",
                            border:(isHov&&!veDragState)?`2px solid ${getColor(t)}`:(isSel?"1px solid rgba(59,130,246,0.4)":"1px solid #1E293B"),
                            borderLeft:(isHov&&!veDragState)?`4px solid ${getColor(t)}`:`3px solid ${getColor(t)}`,
                          }}>
                          <div style={{fontSize:isHov?14:fs,fontWeight:600,color:"#F1F5F9",lineHeight:1.3,whiteSpace:isHov?"normal":(compact?"nowrap":"normal"),overflow:compact&&!isHov?"hidden":"visible",textOverflow:"ellipsis"}}>{t.name}</div>
                          {(isHov||showDetails)&&<div style={{display:"flex",gap:isHov?4:(compact?2:3),marginTop:isHov?5:(compact?2:3),flexWrap:compact&&!isHov?"nowrap":"wrap",overflow:compact&&!isHov?"hidden":"visible",alignItems:"center"}}>
                            <span className="chip" style={{background:`${getColor(t)}22`,color:getColor(t),fontSize:isHov?11:(compact?8:undefined)}}>{typeLabel(t)}</span>
                            <span className="chip" style={{background:"#1E293B",color:"#64748B",fontSize:isHov?11:(compact?8:undefined)}}>{ownerDisplay(t)}</span>
                            <span className="chip" style={{background:"rgba(16,185,129,0.12)",color:"#10B981",fontSize:isHov?11:(compact?8:10)}}>V:{t.value||2}</span>
                            <span className="chip" style={{background:"rgba(239,68,68,0.1)",color:"#F87171",fontSize:isHov?11:(compact?8:10)}}>E:{t.effort||2}</span>
                            {t.dueDate&&<span style={{fontSize:isHov?11:(compact?8:10),color:"#475569"}}>📅 {fmtDate(t.dueDate)}</span>}
                          </div>}
                          {isHov&&t.notes&&<div style={{fontSize:11,color:"#94A3B8",marginTop:5,lineHeight:1.5}}>{t.notes}</div>}
                        </div>
                      );
                    })}
                  </div>
                );
              })()}
              </div>
            </div>
          ))}
        </div>
        <div style={{display:"flex",justifyContent:"space-between",padding:"0 4px",flexShrink:0}}>
          <span style={{fontSize:10,color:"#64748B",letterSpacing:1,fontWeight:600}}>↓ LOW VALUE</span>
          <span style={{fontSize:10,color:"#64748B",letterSpacing:1,fontWeight:600}}>HIGH VALUE ↑</span>
        </div>

        {/* Floating ghost card while dragging */}
        {veDragState&&veDragState.active&&(
          <div style={{position:"fixed",left:veDragState.currentX+12,top:veDragState.currentY-16,background:"#1E293B",border:`2px solid ${getColor(veDragState.task)}`,borderRadius:8,padding:"6px 12px",fontSize:11,fontWeight:600,color:"#F1F5F9",pointerEvents:"none",zIndex:200,boxShadow:"0 8px 24px rgba(0,0,0,0.6)",maxWidth:200,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{veDragState.task.name}</div>
        )}
        {/* Confirmation overlay for VxE drag drop */}
        {pendingVEDrop&&(
          <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",background:"#1E293B",border:`2px solid ${pendingVEDrop.newValue>=2?"#10B981":"#64748B"}`,borderRadius:12,padding:20,zIndex:100,boxShadow:"0 12px 48px rgba(0,0,0,0.8)",minWidth:280,textAlign:"center"}}>
            <div style={{fontSize:14,fontWeight:600,color:"#F1F5F9",marginBottom:8}}>{pendingVEDrop.task.name}</div>
            <div style={{fontSize:12,color:"#94A3B8",marginBottom:16}}>Move to <strong>{pendingVEDrop.quadrantLabel}</strong>?</div>
            <div style={{display:"flex",gap:12}}>
              <button onClick={async()=>{if(onTaskUpdateRef.current)await onTaskUpdateRef.current(pendingVEDrop.task.id,{value:pendingVEDrop.newValue,effort:pendingVEDrop.newEffort});setPendingVEDrop(null);}} style={{flex:1,background:"#10B981",color:"white",border:"none",borderRadius:8,padding:"10px 16px",fontSize:12,fontWeight:600,cursor:"pointer"}}>✓ Move</button>
              <button onClick={()=>setPendingVEDrop(null)} style={{flex:1,background:"#EF4444",color:"white",border:"none",borderRadius:8,padding:"10px 16px",fontSize:12,fontWeight:600,cursor:"pointer"}}>✕ Cancel</button>
            </div>
          </div>
        )}
      </div>
      {/* Right 25%: Notes */}
      <div style={{flex:1,display:"flex",flexDirection:"column",borderLeft:"1px solid #1E293B",padding:"12px 14px",minWidth:0}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,flexShrink:0}}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#64748B" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          <span style={{fontSize:12,fontWeight:700,color:"#94A3B8",letterSpacing:0.5}}>NOTES</span>
          <div style={{flex:1}}/>
          {!veNotesSaved&&<span style={{fontSize:10,color:"#F59E0B"}}>● Unsaved</span>}
          <button onClick={saveVeNotes} style={{padding:"4px 12px",borderRadius:6,border:`1px solid ${veNotesSaved?"#334155":"#3B82F6"}`,background:veNotesSaved?"#1E293B":"#3B82F6",color:veNotesSaved?"#64748B":"white",fontSize:10,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{veNotesSaved?"Saved ✓":"Save"}</button>
        </div>
        <textarea value={veNotes} onChange={e=>{setVeNotes(e.target.value);setVeNotesSaved(false);}} onBlur={saveVeNotes}
          placeholder={"Strategy notes, prioritization rationale, trade-off decisions…"}
          style={{flex:1,background:"#0F172A",border:"1px solid #1E293B",borderRadius:10,padding:"14px 16px",color:"#CBD5E1",fontSize:13,lineHeight:1.7,outline:"none",resize:"none",fontFamily:"inherit"}}/>
      </div>
    </div>
  );
}

// ── Timeline Scatter View ─────────────────────────────────────────────────────
const ZOOM_PRESETS_BASE = [
  {label:"This Week",  start:0, end:0.23},
  {label:"1 Month",    start:0, end:1},
  // "Quarter" is inserted dynamically inside TimelineView (end = months to end of current calendar quarter)
  {label:"3 Months",   start:0, end:3},
  {label:"6 Months",   start:0, end:6},
  {label:"All (18mo)", start:0, end:18},
];

function TimelineView({tasks,colorBy,onSelect,selectedId,showAll,sbClient,sbStatus}) {
  const [hov,setHov]=useState(null);
  const [viewStart,setViewStart]=useState(0);
  const [viewEnd,setViewEnd]=useState(()=>{const n=new Date(),m=n.getMonth(),qm=[2,2,2,5,5,5,8,8,8,11,11,11][m],ed=new Date(n.getFullYear(),qm+1,0,23,59,59);return Math.max((ed-n)/(1000*60*60*24*30.44),0.03);});
  const now=useMemo(()=>new Date(),[]);

  // Compute months from now to end of current calendar quarter
  const quarterEnd=useMemo(()=>{
    const m=now.getMonth(); // 0–11
    const qEndMonth=[2,2,2,5,5,5,8,8,8,11,11,11][m]; // last month of the quarter (0-based)
    const endDate=new Date(now.getFullYear(),qEndMonth+1,0,23,59,59); // last day of that month
    return Math.max((endDate-now)/(1000*60*60*24*30.44),0.03); // at least ~1 day so the preset is never 0
  },[now]);

  // Default zoom preset labels in default order
  const DEFAULT_ZOOM_LABELS=["This Week","1 Month","Quarter","3 Months","6 Months","All (18mo)"];
  const zoomDataMap=useMemo(()=>({
    "This Week":{start:0,end:0.23},
    "1 Month":{start:0,end:1},
    "Quarter":{start:0,end:quarterEnd},
    "3 Months":{start:0,end:3},
    "6 Months":{start:0,end:6},
    "All (18mo)":{start:0,end:18},
  }),[quarterEnd]);

  // Persisted zoom order
  const [zoomOrder,setZoomOrder]=useState(()=>{
    try{const s=localStorage.getItem("pm_zoom_order");if(s){const arr=JSON.parse(s);if(Array.isArray(arr)&&arr.length)return arr;}}catch(e){}
    return DEFAULT_ZOOM_LABELS;
  });
  const zoomPresets=useMemo(()=>zoomOrder.filter(l=>zoomDataMap[l]).map(l=>({label:l,...zoomDataMap[l]})),[zoomOrder,zoomDataMap]);

  // Load zoom order from Supabase
  useEffect(()=>{
    if(sbStatus!=="connected"||!sbClient) return;
    sbClient.from("settings").select("*").eq("key","zoom_order").single().then(({data})=>{
      if(data&&data.value){
        try{
          const saved=typeof data.value==='string'?JSON.parse(data.value):data.value;
          if(Array.isArray(saved)&&saved.length){
            setZoomOrder(saved);
            try{localStorage.setItem("pm_zoom_order",JSON.stringify(saved));}catch(e){}
          }
        }catch(e){}
      }
    });
  },[sbStatus,sbClient]);

  // Drag-and-drop for zoom presets
  const dragZoomIdx=useRef(null);
  const dragOverZoomIdx=useRef(null);
  const [draggingZoom,setDraggingZoom]=useState(null);
  const onZoomDragStart=(e,i)=>{dragZoomIdx.current=i;setDraggingZoom(i);e.dataTransfer.effectAllowed="move";};
  const onZoomDragEnter=i=>{dragOverZoomIdx.current=i;};
  const onZoomDragEnd=()=>{
    if(dragZoomIdx.current!==null&&dragOverZoomIdx.current!==null&&dragZoomIdx.current!==dragOverZoomIdx.current){
      const next=[...zoomOrder];
      const [moved]=next.splice(dragZoomIdx.current,1);
      next.splice(dragOverZoomIdx.current,0,moved);
      setZoomOrder(next);
      try{localStorage.setItem("pm_zoom_order",JSON.stringify(next));}catch(e){}
      if(sbClient&&sbStatus==="connected"){
        sbClient.from("settings").upsert({key:"zoom_order",value:next},{onConflict:"key"}).then(()=>{});
      }
    }
    dragZoomIdx.current=null;dragOverZoomIdx.current=null;setDraggingZoom(null);
  };

  // SVG internal dimensions — MT=62 gives circles at importance=10 room above the axis
  const VW=920,VH=500,ML=58,MR=32,MT=62,MB=78;
  const PW=VW-ML-MR,PH=VH-MT-MB;
  const rangeM=viewEnd-viewStart;

  const getColor=t=>colorBy==="type"?typeColor(t):colorBy==="timeline"?TIME_COLORS[t.timeline]:CAT_COLORS[t.category];
  const sp=t=>((t.id*137+41)%97)/97;

  // Month position helpers
  const moFromDate=d=>(new Date(d+"T12:00:00")-now)/(1000*60*60*24*30.44);
  const taskMo=t=>{
    if(t.dueDate) return moFromDate(t.dueDate);
    if(t.startDate) return moFromDate(t.startDate);
    const s=sp(t);
    if(t.timeline==="Short Term") return 0.3+s*2.2;
    if(t.timeline==="Mid Term")   return 3.2+s*4.5;
    return 9.5+s*7.0;
  };
  const startMoOf=t=>t.startDate?moFromDate(t.startDate):null;

  const moToX=mo=>ML+((mo-viewStart)/rangeM)*PW;
  // Non-linear y mapping: Nice-to-Have→Important band = 1/3 of space (bottom),
  // Important→Must Do band = 2/3 of space (top) — more room for high-priority tasks
  // Each band has a center line; tasks spread vertically within the band using a hash jitter
  // Band layout: Nice-to-Have gridline at 15% from bottom, Important at 33%, Must Do at 97%
  // The Important→Must Do zone spans 64% of chart height — the big open area for most tasks
  const bandCenter={1:0.15, 2:0.33, 3:0.97}; // gridline positions as fraction of PH from bottom
  const bandHalf={1:PH*0.10, 2:PH*0.25, 3:PH*0.05}; // half-height jitter spread within each band
  const yOf=t=>{
    const hash=((t.id*137+41)%97)/97; // 0–1 deterministic per task
    const jitter=(hash-0.5)*2*bandHalf[t.importance]; // spread within band
    return MT+PH-bandCenter[t.importance]*PH+jitter;
  };
  const rOf=t=>Math.round((8+t.urgency*4)*0.75); // urgency 1→9, 2→12, 3→15

  // Tasks visible in current zoom window — check both start and due dates
  const buffer=rangeM*0.05;
  const visibleTasks=useMemo(()=>tasks.filter(t=>{
    const mo=taskMo(t), smo=startMoOf(t);
    return (mo>=viewStart-buffer&&mo<=viewEnd+buffer)||
           (smo!==null&&smo>=viewStart-buffer&&smo<=viewEnd+buffer);
  }),[tasks,viewStart,viewEnd]);

  // ── Collision-avoidance for circles ────────────────────────────────────────
  // Generous padding; allow dots to drift across importance bands if needed.
  // After initial greedy placement, run a force-relaxation pass to push apart
  // any remaining overlaps.
  const placedPos=useMemo(()=>{
    const PAD=22; // min gap between circle edges — generous spacing
    const sorted=[...visibleTasks].sort((a,b)=>{
      const xa=ML+((taskMo(a)-viewStart)/rangeM)*PW;
      const xb=ML+((taskMo(b)-viewStart)/rangeM)*PW;
      return xa-xb;
    });
    // Initial greedy placement — spiral outward from anchor
    const pos={}; // id -> {x,y,r}
    const all=[]; // [{x,y,r,id}]
    for(const t of sorted){
      const x=ML+((taskMo(t)-viewStart)/rangeM)*PW;
      const r=rOf(t);
      const cy=yOf(t);
      const step=r+PAD*0.5;
      let chosenX=x, chosenY=cy, found=false;
      // Spiral: try offsets in y and x — wider search
      for(let ring=0;ring<=24&&!found;ring++){
        const offsets=ring===0?[[0,0]]:[];
        if(ring>0){
          for(let dy=-ring;dy<=ring;dy++){
            offsets.push([0,dy*step]);
            offsets.push([step*0.6,dy*step]);
            offsets.push([-step*0.6,dy*step]);
            offsets.push([step*1.2,dy*step]);
            offsets.push([-step*1.2,dy*step]);
          }
        }
        for(const [dx,dy] of offsets){
          const tx=x+dx, ty=cy+dy;
          if(ty-r<MT-28||ty+r>MT+PH+12) continue;
          if(tx-r<ML-5||tx+r>ML+PW+5) continue;
          const ok=all.every(p=>{
            const ddx=tx-p.x, ddy=ty-p.y;
            return Math.sqrt(ddx*ddx+ddy*ddy)>=r+p.r+PAD;
          });
          if(ok){chosenX=tx;chosenY=ty;found=true;break;}
        }
      }
      pos[t.id]={x:chosenX,y:chosenY,r};
      all.push({x:chosenX,y:chosenY,r,id:t.id});
    }
    // Force-relaxation pass — push overlapping circles apart with stronger force
    for(let iter=0;iter<60;iter++){
      let moved=false;
      for(let i=0;i<all.length;i++){
        for(let j=i+1;j<all.length;j++){
          const a=all[i], b=all[j];
          const dx=b.x-a.x, dy=b.y-a.y;
          const dist=Math.sqrt(dx*dx+dy*dy);
          const minD=a.r+b.r+PAD;
          if(dist<minD&&dist>0.01){
            const push=(minD-dist)/2+1.5;
            const nx=dx/dist, ny=dy/dist;
            a.x-=nx*push; a.y-=ny*push;
            b.x+=nx*push; b.y+=ny*push;
            a.y=Math.max(MT-24,Math.min(MT+PH+8,a.y));
            b.y=Math.max(MT-24,Math.min(MT+PH+8,b.y));
            a.x=Math.max(ML,Math.min(ML+PW,a.x));
            b.x=Math.max(ML,Math.min(ML+PW,b.x));
            moved=true;
          }
        }
      }
      if(!moved) break;
    }
    // Write back
    const result={};
    for(const a of all) result[a.id]={x:a.x,y:a.y,r:a.r};
    return result;
  },[visibleTasks,viewStart,viewEnd]);

  // ── Label collision avoidance ─────────────────────────────────────────────
  // Try 8 candidate positions around each dot; pick the one with fewest overlaps.
  // Then run a force-push pass to resolve remaining collisions.
  const labelPos=useMemo(()=>{
    if(!showAll) return {};
    const LH=12, LPAD=6, CHAR_W=2.9;
    const placedLabels=[];
    const result={};
    // Build circle obstacles list for label-vs-circle avoidance
    const circleObs=visibleTasks.map(t=>placedPos[t.id]).filter(Boolean);
    const sorted=[...visibleTasks].sort((a,b)=>{
      const pa=placedPos[a.id], pb=placedPos[b.id];
      return (pa?pa.x:0)-(pb?pb.x:0);
    });

    const labelOverlaps=(lx,ly,lw,skipIdx)=>{
      let score=0;
      // Check vs other labels
      for(let i=0;i<placedLabels.length;i++){
        if(i===skipIdx) continue;
        const q=placedLabels[i];
        if(lx<q.x+q.w+LPAD && lx+lw>q.x-LPAD && ly<q.y+q.h+LPAD && ly+LH>q.y-LPAD) score++;
      }
      // Check vs all circle dots
      for(const c of circleObs){
        const cx=c.x, cy=c.y, cr=c.r+4;
        // Simple rect-vs-circle: closest point on rect to circle center
        const clX=Math.max(lx,Math.min(cx,lx+lw));
        const clY=Math.max(ly,Math.min(cy,ly+LH));
        const dx=cx-clX, dy=cy-clY;
        if(dx*dx+dy*dy<cr*cr) score+=0.5;
      }
      return score;
    };

    for(const t of sorted){
      const p=placedPos[t.id];
      if(!p) continue;
      const title=t.name.length>22?t.name.slice(0,22)+"…":t.name;
      const lw=title.length*CHAR_W+10;
      const gap=p.r+6; // distance from dot edge to label

      // 8 candidate positions: right, above-right, below-right, left, above-left, below-left, above, below
      const candidates=[
        {x:p.x+gap,          y:p.y-LH/2},           // right
        {x:p.x+gap*0.7,      y:p.y-LH-gap*0.5},     // above-right
        {x:p.x+gap*0.7,      y:p.y+gap*0.5},         // below-right
        {x:p.x-lw-gap,       y:p.y-LH/2},            // left
        {x:p.x-lw-gap*0.7,   y:p.y-LH-gap*0.5},     // above-left
        {x:p.x-lw-gap*0.7,   y:p.y+gap*0.5},         // below-left
        {x:p.x-lw/2,         y:p.y-LH-gap},          // above center
        {x:p.x-lw/2,         y:p.y+gap},              // below center
      ].filter(c=>c.x>=ML-10 && c.x+lw<=VW-MR+10 && c.y>=MT-30 && c.y+LH<=MT+PH+20);

      // Score each candidate, pick the best
      let best=candidates[0]||{x:p.x+gap,y:p.y-LH/2};
      let bestScore=Infinity;
      for(const c of candidates){
        const s=labelOverlaps(c.x,c.y,lw,-1);
        // Slight preference for right-side placement
        const bonus=(c.x>p.x)?0:0.1;
        if(s+bonus<bestScore){bestScore=s+bonus;best=c;}
      }

      result[t.id]={x:best.x,y:best.y,w:lw,h:LH,title};
      placedLabels.push({x:best.x,y:best.y,w:lw,h:LH});
    }

    // Force-push pass: iteratively nudge overlapping labels apart
    const labs=Object.keys(result).map(id=>({id,r:result[id]}));
    for(let iter=0;iter<30;iter++){
      let moved=false;
      for(let i=0;i<labs.length;i++){
        for(let j=i+1;j<labs.length;j++){
          const a=labs[i].r, b=labs[j].r;
          // Check overlap
          const ox=Math.min(a.x+a.w+LPAD,b.x+b.w+LPAD)-Math.max(a.x-LPAD,b.x-LPAD);
          const oy=Math.min(a.y+a.h+LPAD,b.y+b.h+LPAD)-Math.max(a.y-LPAD,b.y-LPAD);
          if(ox>0&&oy>0){
            // Push along axis of least overlap
            if(oy<ox){
              const push=oy/2+1;
              if(a.y<b.y){a.y-=push;b.y+=push;}else{a.y+=push;b.y-=push;}
            }else{
              const push=ox/2+1;
              if(a.x<b.x){a.x-=push;b.x+=push;}else{a.x+=push;b.x-=push;}
            }
            // Clamp
            a.y=Math.max(MT-30,Math.min(MT+PH+15,a.y));
            b.y=Math.max(MT-30,Math.min(MT+PH+15,b.y));
            a.x=Math.max(ML-15,Math.min(VW-MR-a.w+10,a.x));
            b.x=Math.max(ML-15,Math.min(VW-MR-b.w+10,b.x));
            moved=true;
          }
        }
      }
      if(!moved) break;
    }
    // Write back
    const final={};
    for(const l of labs) final[l.id]=l.r;
    return final;
  },[visibleTasks,placedPos,showAll]);

  // Generate x-axis ticks
  const xTicks=useMemo(()=>{
    const n=rangeM<=0.3?7:rangeM<=1?6:rangeM<=4?7:rangeM<=8?7:8;
    return Array.from({length:n},(_,i)=>{
      const mo=viewStart+(i/(n-1))*rangeM;
      const ms=now.getTime()+mo*30.44*24*60*60*1000;
      const d=new Date(ms);
      let label;
      if(rangeM<=0.3)       label=d.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
      else if(rangeM<=2)    label=d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
      else if(rangeM<=10)   label=d.toLocaleString("default",{month:"short"})+" '"+String(d.getFullYear()).slice(2);
      else                  label=d.toLocaleString("default",{month:"short",year:"2-digit"});
      return {mo,label};
    });
  },[viewStart,viewEnd,now]);

  // Band boundaries in the current view
  // Short Term ≈ 0-3mo, Mid Term ≈ 3-9mo, Long Term ≈ 9-18mo
  const bands=[
    {label:"SHORT TERM",s:0,e:3,color:"rgba(239,68,68,0.05)"},
    {label:"MID TERM",s:3,e:9,color:"rgba(245,158,11,0.03)"},
    {label:"LONG TERM",s:9,e:18,color:"rgba(100,116,139,0.04)"},
  ];

  const pan=dir=>{ const step=rangeM*0.4; const ns=viewStart+dir*step, ne=viewEnd+dir*step; if(ns>=0) { setViewStart(ns); setViewEnd(ne); } else { setViewStart(0); setViewEnd(rangeM); }};
  const setPreset=p=>{ setViewStart(p.start); setViewEnd(p.end); };
  const isPreset=p=>Math.abs(viewStart-p.start)<0.01&&Math.abs(viewEnd-p.end)<0.01;

  const yTicks=[1,2,3];

  return (
    <div style={{display:"flex",flexDirection:"column",flex:1,minHeight:0,gap:0}}>
      {/* Zoom controls */}
      <div style={{display:"flex",gap:6,alignItems:"center",padding:"0 4px 10px",flexShrink:0,flexWrap:"wrap"}}>
        <span style={{fontSize:10,color:"#475569",fontWeight:700,letterSpacing:1,marginRight:2}}>ZOOM:</span>
        {zoomPresets.map((p,pi)=>(
          <button key={p.label} className={`zoom-btn${isPreset(p)?" active":""}`}
            draggable onDragStart={e=>onZoomDragStart(e,pi)} onDragEnter={()=>onZoomDragEnter(pi)} onDragEnd={onZoomDragEnd} onDragOver={e=>e.preventDefault()}
            onClick={()=>setPreset(p)}
            style={draggingZoom===pi?{opacity:0.4}:dragOverZoomIdx.current===pi?{borderColor:"#3B82F6"}:{}}>{p.label}</button>
        ))}
        <div style={{marginLeft:"auto",display:"flex",gap:5,alignItems:"center"}}>
          <span style={{fontSize:10,color:"#334155"}}>PAN:</span>
          <button className="pan-btn" onClick={()=>pan(-1)} disabled={viewStart<=0}>◀</button>
          <button className="pan-btn" onClick={()=>pan(1)}>▶</button>
        </div>
        <span style={{fontSize:10,color:"#334155",marginLeft:8}}>
          {viewStart===0?"Now":""} → {(()=>{const d=new Date(now); d.setTime(d.getTime()+viewEnd*30.44*24*60*60*1000); return d.toLocaleDateString("en-US",{month:"short",year:"numeric"});})()}
        </span>
      </div>
      {/* SVG fills remaining height */}
      <div style={{flex:1,overflow:"hidden",position:"relative",marginBottom:2}}>
        <svg viewBox={`0 0 ${VW} ${VH}`} style={{width:"100%",height:"100%",overflow:"visible"}} preserveAspectRatio="xMidYMid meet">
          <defs>
            <filter id="tipShadow" x="-10%" y="-10%" width="120%" height="120%">
              <feDropShadow dx="0" dy="1" stdDeviation="2" floodColor="#000" floodOpacity="0.5"/>
            </filter>
          </defs>
          {/* Band fills — clipped to view */}
          {bands.map((b,i)=>{
            const bxs=Math.max(b.s,viewStart), bxe=Math.min(b.e,viewEnd);
            if(bxe<=bxs) return null;
            return <rect key={i} x={moToX(bxs)} y={MT} width={(bxe-bxs)/rangeM*PW} height={PH} fill={b.color}/>;
          })}
          {/* Band dividers at 3mo and 9mo */}
          {[3,9].map(mo=>{
            if(mo<=viewStart||mo>=viewEnd) return null;
            const x=moToX(mo);
            return <line key={mo} x1={x} y1={MT} x2={x} y2={MT+PH} stroke="#1E293B" strokeWidth={1} strokeDasharray="5,4"/>;
          })}
          {/* Band labels at top */}
          {bands.map((b,i)=>{
            const mids=(Math.max(b.s,viewStart)+Math.min(b.e,viewEnd))/2;
            if(mids<=viewStart||mids>=viewEnd) return null;
            return <text key={i} x={moToX(mids)} y={MT-12} textAnchor="middle" fill="#1E293B" fontSize={9} fontWeight="700" letterSpacing={1.5}>{b.label}</text>;
          })}
          {/* Y gridlines — 3-level importance */}
          {yTicks.map(v=>{
            const y=MT+PH-bandCenter[v]*PH;
            const {color,label}=impTier(v);
            return <g key={v}>
              <line x1={ML} y1={y} x2={ML+PW} y2={y} stroke="#1E293B" strokeWidth={1}/>
              <text x={ML-8} y={y+4} textAnchor="end" fill="#334155" fontSize={10}>{v}</text>
              <text x={ML+5} y={y-5} fill={color+"55"} fontSize={8} fontWeight="700" letterSpacing={1}>{label.toUpperCase()}</text>
            </g>;
          })}
          {/* Axes */}
          <line x1={ML} y1={MT} x2={ML} y2={MT+PH} stroke="#334155" strokeWidth={1}/>
          <line x1={ML} y1={MT+PH} x2={ML+PW} y2={MT+PH} stroke="#334155" strokeWidth={1}/>
          {/* Y-axis label */}
          <text x={14} y={MT+PH/2} textAnchor="middle" fill="#475569" fontSize={10} fontWeight="700" transform={`rotate(-90,14,${MT+PH/2})`} letterSpacing={1.2}>IMPORTANCE</text>
          {/* X ticks */}
          {xTicks.map(({mo,label},i)=>{
            const x=moToX(mo);
            return <g key={i}><line x1={x} y1={MT+PH} x2={x} y2={MT+PH+6} stroke="#334155" strokeWidth={1}/><text x={x} y={MT+PH+18} textAnchor="middle" fill="#475569" fontSize={rangeM<=0.3?8:9}>{label}</text></g>;
          })}
          {/* "Now" marker */}
          {viewStart<=0&&viewEnd>0&&(
            <g><line x1={moToX(0)} y1={MT} x2={moToX(0)} y2={MT+PH} stroke="#3B82F650" strokeWidth={1.5} strokeDasharray="3,3"/><text x={moToX(0)} y={MT-4} textAnchor="middle" fill="#3B82F6" fontSize={8} fontWeight="700">NOW</text></g>
          )}
          {/* Clip region for task nodes — extends 24px above axis so top-importance circles aren't cut */}
          <clipPath id="plotClip"><rect x={ML} y={MT-24} width={PW} height={PH+24}/></clipPath>
          <g clipPath="url(#plotClip)">
            {visibleTasks.map(task=>{
              const mo=taskMo(task);
              const smo=startMoOf(task);
              const {x,y,r}=placedPos[task.id]||{x:moToX(mo),y:yOf(task),r:rOf(task)};
              const isHov=hov===task.id, isSel=selectedId===task.id;
              const color=getColor(task);
              const hasStart=!!task.startDate, hasDue=!!task.dueDate;
              const hasRange=hasStart&&hasDue;
              const sx=hasRange?moToX(smo):null;
              return (
                <g key={task.id} onClick={()=>onSelect(task)} onMouseEnter={()=>setHov(task.id)} onMouseLeave={()=>setHov(null)} style={{cursor:"pointer"}}>
                  {/* Natural position connector — shows where the circle "belongs" on the timeline */}
                  {(()=>{
                    const natX=moToX(mo);
                    const natY=yOf(task);
                    const dist=Math.sqrt((x-natX)**2+(y-natY)**2);
                    return dist>8?<line x1={natX} y1={natY} x2={x} y2={y} stroke={color} strokeWidth={1} strokeDasharray="3,3" opacity={0.25}/>:null;
                  })()}
                  {/* Duration bar for tasks with both start + due */}
                  {hasRange&&<line x1={sx} y1={y} x2={x} y2={y} stroke={color} strokeWidth={2.5} strokeLinecap="round" opacity={isSel?0.5:0.3}/>}
                  {/* Selection halo */}
                  {isSel&&<circle cx={x} cy={y} r={r+6} fill={color} opacity={0.18}/>}
                  {/* Hover glow */}
                  {isHov&&<circle cx={x} cy={y} r={r+5} fill={color} opacity={0.22}/>}
                  {/* Start dot — small hollow circle */}
                  {hasRange&&<circle cx={sx} cy={y} r={r*0.45} fill="#0F172A" stroke={color} strokeWidth={2} opacity={isSel?1:0.85}/>}
                  {/* Main circle — at due date (or start if no due) */}
                  <circle cx={x} cy={y} r={isHov?r*1.3:r} fill={color}
                    stroke={isSel?"white":isHov?"#F8FAFC":"rgba(255,255,255,0.4)"}
                    strokeWidth={isSel?2:isHov?1.5:1}
                    strokeDasharray={hasDue?"none":"3,2"}
                    opacity={isSel?1:isHov?1:hasDue?0.88:0.65}
                    style={{transition:"r 0.15s,opacity 0.15s"}}/>
                </g>
              );
            })}
          </g>
          {/* Title-only labels rendered outside clip group so they aren't clipped */}
          {showAll&&visibleTasks.map(task=>{
            const p=placedPos[task.id], lp=labelPos[task.id];
            if(!p||!lp) return null;
            const isH=hov===task.id, isS=selectedId===task.id;
            if(isH||isS) return null;
            const cl=getColor(task);
            return (
              <g key={"lbl-"+task.id} style={{pointerEvents:"none"}}>
                <line x1={p.x} y1={p.y}
                  x2={lp.x+(lp.x>p.x?0:lp.w)} y2={lp.y+lp.h/2}
                  stroke={cl} strokeWidth={0.5} opacity={0.3} strokeDasharray="2,2"/>
                <text x={lp.x} y={lp.y+lp.h-2} fill="#CBD5E1" fontSize={5} fontWeight={500}>{lp.title}</text>
              </g>
            );
          })}
          {/* Hover/selected detail cards rendered outside clip group */}
          {visibleTasks.map(task=>{
            const p=placedPos[task.id];
            if(!p) return null;
            const isHov2=hov===task.id, isSel2=selectedId===task.id;
            if(!isHov2&&!isSel2) return null;
            const cl=getColor(task);
            const hasStart=!!task.startDate, hasDue=!!task.dueDate, hasRange=hasStart&&hasDue;
            const hovW=150, hovH=task.notes?56:42;
            const hovX=p.x>VW*0.6?p.x-hovW-8:p.x+rOf(task)+6;
            const hovY=Math.max(MT-10,Math.min(p.y-hovH/2,MT+PH-hovH+10));
            return (
              <g key={"hov-"+task.id} style={{pointerEvents:"none"}}>
                <line x1={p.x} y1={p.y} x2={hovX+(p.x>VW*0.6?hovW:0)} y2={hovY+hovH/2} stroke={cl} strokeWidth={0.6} strokeDasharray="3,2" opacity={0.45}/>
                <rect x={hovX} y={hovY} width={hovW} height={hovH} rx={4} fill="#1E293B" stroke={cl} strokeWidth={0.8} filter="url(#tipShadow)"/>
                <rect x={hovX} y={hovY} width={3} height={hovH} rx={1.5} fill={cl}/>
                <text x={hovX+8} y={hovY+10} fill="#F8FAFC" fontSize={6} fontWeight={700}>{task.name.length>40?task.name.slice(0,40)+"…":task.name}</text>
                <text x={hovX+8} y={hovY+18} fill="#94A3B8" fontSize={4.5}>{typeLabel(task)} · {ownerDisplay(task)}</text>
                <text x={hovX+8} y={hovY+25} fill="#64748B" fontSize={4.5}>{`Imp ${task.importance}/3 · Urg ${task.urgency}/3 · ${task.timeline}`}</text>
                {hasRange&&<text x={hovX+8} y={hovY+32} fill="#64748B" fontSize={4.5}>▶ {fmtDate(task.startDate)} → {fmtDate(task.dueDate)}</text>}
                {!hasRange&&hasDue&&<text x={hovX+8} y={hovY+32} fill="#64748B" fontSize={4.5}>Due {fmtDate(task.dueDate)}</text>}
                {!hasRange&&hasStart&&!hasDue&&<text x={hovX+8} y={hovY+32} fill="#64748B" fontSize={4.5}>Starts {fmtDate(task.startDate)}</text>}
                {!hasDue&&!hasStart&&<text x={hovX+8} y={hovY+32} fill="#334155" fontSize={4.5}>No dates set</text>}
                {task.notes&&<text x={hovX+8} y={hovY+40} fill="#475569" fontSize={4}>{task.notes.length>55?task.notes.slice(0,55)+"…":task.notes}</text>}
              </g>
            );
          })}
        </svg>
      </div>
      {/* Urgency size legend — below chart, right-aligned */}
      <div style={{display:"flex",justifyContent:"flex-end",alignItems:"center",gap:10,padding:"3px 6px 2px",flexShrink:0}}>
        <span style={{fontSize:9,color:"#334155",fontWeight:700,letterSpacing:1,marginRight:2}}>URGENCY SIZE:</span>
        {[1,2,3].map(u=>{
          const {color}=urgInfo(u);
          const r=Math.round((8+u*4)*0.75); // matches rOf on chart
          const d=Math.round(r*2*0.82);     // SVG→CSS px scale ≈0.82
          return (
            <div key={u} style={{display:"flex",alignItems:"center",gap:4}}>
              <div style={{width:d,height:d,borderRadius:"50%",background:color,opacity:0.7,border:`1px solid ${color}`,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
                <span style={{fontSize:Math.max(7,Math.round(d*0.42)),fontWeight:700,color:"white",lineHeight:1}}>{u}</span>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── Tasks Grid View ───────────────────────────────────────────────────────────
function TasksGrid({tasks,colorBy,onSelect,selectedId}) {
  const [sortBy,setSortBy]=useState("importance");
  const [groupBy,setGroupBy]=useState("ring");
  const getColor=t=>colorBy==="type"?typeColor(t):colorBy==="timeline"?TIME_COLORS[t.timeline]:CAT_COLORS[t.category];

  const sorted=useMemo(()=>[...tasks].sort((a,b)=>{
    if(sortBy==="importance") return b.importance-a.importance;
    if(sortBy==="urgency")    return b.urgency-a.urgency;
    if(sortBy==="name")       return a.name.localeCompare(b.name);
    if(sortBy==="due"){
      if(!a.dueDate&&!b.dueDate) return 0;
      if(!a.dueDate) return 1; if(!b.dueDate) return -1;
      return a.dueDate.localeCompare(b.dueDate);
    }
    return 0;
  }),[tasks,sortBy]);

  const groups=useMemo(()=>{
    if(groupBy==="ring") return [0,1,2].map(ri=>({label:RING_LABELS[ri],color:RING_COLORS[ri],tasks:sorted.filter(t=>getRing(t.importance)===ri)})).filter(g=>g.tasks.length);
    if(groupBy==="type") return [...new Set(sorted.map(t=>typeLabel(t)))].map(lbl=>({label:lbl,color:typeColor(sorted.find(t=>typeLabel(t)===lbl)),tasks:sorted.filter(t=>typeLabel(t)===lbl)}));
    return [{label:"All Tasks",color:"#3B82F6",tasks:sorted}];
  },[sorted,groupBy]);

  const tile=task=>{
    const color=getColor(task), it=impTier(task.importance), ui=urgInfo(task.urgency);
    const isSel=selectedId===task.id;
    return (
      <div key={task.id} onClick={()=>onSelect(task)}
        style={{background:isSel?"rgba(59,130,246,0.13)":"rgba(255,255,255,0.03)",
          border:`1px solid ${isSel?"#3B82F6":"#2D3748"}`,borderLeft:`4px solid ${color}`,
          borderRadius:8,padding:"10px 12px",cursor:"pointer",transition:"all 0.15s",
          display:"flex",flexDirection:"column",gap:5}}>
        <div style={{fontSize:13,fontWeight:700,color:"#F1F5F9",lineHeight:1.3}}>{task.name}</div>
        <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
          <span style={{background:it.bg,color:it.color,fontSize:9,fontWeight:700,padding:"2px 7px",borderRadius:4,letterSpacing:0.5}}>{it.label.toUpperCase()}</span>
          <span style={{background:"rgba(255,255,255,0.06)",color:"#94A3B8",fontSize:9,padding:"2px 7px",borderRadius:4}}>{typeLabel(task)}</span>
          <span style={{background:"rgba(255,255,255,0.04)",color:ui.color,fontSize:9,fontWeight:600,padding:"2px 7px",borderRadius:4}}>Urg {ui.label}</span>
        </div>
        <div style={{display:"flex",gap:10,fontSize:10,color:"#64748B",alignItems:"center"}}>
          <span>Imp <span style={{color:it.color,fontWeight:700}}>{task.importance}</span>/10</span>
          <span style={{flex:1,height:3,background:"#1E293B",borderRadius:2,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${(task.importance-1)/2*100}%`,background:it.color,borderRadius:2,transition:"width 0.3s"}}/>
          </span>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#475569"}}>
          <span>{ownerDisplay(task)}</span>
          <span>{task.dueDate?"📅 "+fmtDate(task.dueDate):task.timeline}</span>
        </div>
        {task.notes&&<div style={{fontSize:10,color:"#334155",fontStyle:"italic",lineHeight:1.3,borderTop:"1px solid #1E293B",paddingTop:4}}>{task.notes.length>70?task.notes.slice(0,70)+"…":task.notes}</div>}
      </div>
    );
  };

  return (
    <div style={{flex:1,minHeight:0,display:"flex",flexDirection:"column",overflow:"hidden",padding:"10px 16px 8px"}}>
      {/* Controls */}
      <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:10,flexShrink:0,flexWrap:"wrap"}}>
        <span style={{fontSize:9,color:"#334155",fontWeight:700,letterSpacing:1}}>SORT</span>
        {[["importance","Importance"],["urgency","Urgency"],["due","Due Date"],["name","Name A–Z"]].map(([v,l])=>(
          <button key={v} onClick={()=>setSortBy(v)} style={{padding:"4px 10px",borderRadius:6,border:"none",cursor:"pointer",fontSize:11,fontWeight:600,
            background:sortBy===v?"#3B82F6":"#1E293B",color:sortBy===v?"white":"#64748B",transition:"all 0.15s"}}>{l}</button>
        ))}
        <div style={{width:1,height:16,background:"#1E293B",margin:"0 2px"}}/>
        <span style={{fontSize:9,color:"#334155",fontWeight:700,letterSpacing:1}}>GROUP</span>
        {[["ring","Ring"],["type","Type"],["none","None"]].map(([v,l])=>(
          <button key={v} onClick={()=>setGroupBy(v)} style={{padding:"4px 10px",borderRadius:6,border:"none",cursor:"pointer",fontSize:11,fontWeight:600,
            background:groupBy===v?"#8B5CF6":"#1E293B",color:groupBy===v?"white":"#64748B",transition:"all 0.15s"}}>{l}</button>
        ))}
        <span style={{fontSize:11,color:"#334155",marginLeft:"auto"}}>{tasks.length} tasks</span>
      </div>
      {/* Tile grid */}
      <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:14}}>
        {groups.map(g=>(
          <div key={g.label}>
            <div style={{fontSize:10,fontWeight:700,color:g.color,letterSpacing:1.2,textTransform:"uppercase",marginBottom:8,paddingBottom:4,borderBottom:`1px solid #1E293B`}}>{g.label} <span style={{color:"#334155",fontWeight:400}}>({g.tasks.length})</span></div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(230px,1fr))",gap:8}}>
              {g.tasks.map(tile)}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}
