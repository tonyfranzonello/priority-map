  );
}

// ── Deal Pipeline View ────────────────────────────────────────────────────────
function DealPipelineView({sbClient}) {
  const contRef=useRef(null);
  const [dims,setDims]=useState({w:900,h:500});
  const [hov,setHov]=useState(null);
  useEffect(()=>{
    const el=contRef.current; if(!el) return;
    const ro=new ResizeObserver(en=>{
      const r=en[0].contentRect;
      setDims({w:Math.max(r.width,400),h:Math.max(r.height,280)});
    });
    ro.observe(el); return()=>ro.disconnect();
  },[]);

  // ── Pipeline data from Supabase (with DEAL_DATA fallback) ──
  const [deals,setDeals]=useState(DEAL_DATA);
  const [dealsSource,setDealsSource]=useState("hardcoded"); // "hardcoded" | "supabase"
  const [dealsLoading,setDealsLoading]=useState(false);
  // Load deals from Supabase on mount
  useEffect(()=>{
    if(!sbClient) return;
    (async()=>{
      setDealsLoading(true);
      try{
        const{data,error}=await sbClient.from("pipeline_deals").select("*").order("date",{ascending:true});
        if(!error&&data&&data.length>0){
          const mapped=data.map(r=>({account:r.account,date:r.date,amount:r.amount,trend:r.trend,status:r.status||"",sheet:r.sheet,notes:r.notes||"",category:r.category||"",winPct:r.win_pct!==undefined&&r.win_pct!==null?r.win_pct:0.40}));
          setDeals(mapped);
          setDealsSource("supabase");
        }
      }catch(e){console.log("pipeline_deals load error:",e);}
      setDealsLoading(false);
    })();
  },[sbClient]);

  // ── Spreadsheet upload state ──
  const fileRef=useRef(null);
  const [showUpload,setShowUpload]=useState(false);
  const [parsedDeals,setParsedDeals]=useState(null);
  const [uploadStatus,setUploadStatus]=useState(""); // "" | "parsing" | "preview" | "saving" | "done" | "error"
  const [uploadError,setUploadError]=useState("");

  const parseSpreadsheet=(file)=>{
    setUploadStatus("parsing"); setUploadError("");
    const reader=new FileReader();
    reader.onload=(e)=>{
      try{
        const wb=XLSX.read(e.target.result,{type:"array"});
        const allDeals=[];
        // Map of tab names we care about
        const tabMap={"Civ SLED":"Civ SLED","Civ/SLED":"Civ SLED","CivSLED":"Civ SLED","Postal":"Postal","DoD":"DoD","DOD":"DoD"};
        wb.SheetNames.forEach(sn=>{
          const sheetKey=Object.keys(tabMap).find(k=>sn.toLowerCase().includes(k.toLowerCase()));
          const sheetLabel=sheetKey?tabMap[sheetKey]:sn;
          const ws=wb.Sheets[sn];
          const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
          if(rows.length<2) return;
          // Find header row (look for "Account" or similar in first 5 rows)
          let headerIdx=0;
          for(let r=0;r<Math.min(5,rows.length);r++){
            const row=rows[r].map(c=>String(c).toLowerCase());
            if(row.some(c=>c.includes("account")||c.includes("deal")||c.includes("name"))){headerIdx=r;break;}
          }
          // Column mapping: A=account(0), H=amount(7), K=trend(10), O=notes(14)
          for(let r=headerIdx+1;r<rows.length;r++){
            const row=rows[r];
            const account=String(row[0]||"").trim();
            if(!account) continue;
            const rawAmt=row[7]; // Column H
            const amount=typeof rawAmt==="number"?rawAmt:parseFloat(String(rawAmt).replace(/[$,]/g,""))||0;
            if(amount<=0) continue;
            // Trend: column K - map text to number
            const rawTrend=String(row[10]||"").trim().toLowerCase();
            let trend=1; // default up
            if(rawTrend.includes("down")||rawTrend==="3"||rawTrend.includes("↓")) trend=3;
            else if(rawTrend.includes("stable")||rawTrend==="2"||rawTrend.includes("→")||rawTrend.includes("flat")) trend=2;
            else if(rawTrend.includes("new")||rawTrend==="0"||rawTrend.includes("·")||rawTrend==="") trend=0;
            else if(rawTrend.includes("up")||rawTrend==="1"||rawTrend.includes("↑")) trend=1;
            else{const n=parseInt(rawTrend);if(!isNaN(n)&&n>=0&&n<=3) trend=n;}
            // Date: look in multiple columns for a date
            let date="";
            for(const ci of [3,4,5,6]){
              const v=row[ci];
              if(v instanceof Date){date=v.toISOString().slice(0,10);break;}
              if(typeof v==="number"&&v>40000&&v<60000){
                // Excel serial date
                const d=new Date((v-25569)*86400000);
                date=d.toISOString().slice(0,10);break;
              }
              const s=String(v||"").trim();
              if(/^\d{4}-\d{2}-\d{2}$/.test(s)){date=s;break;}
              const pd=new Date(s);
              if(!isNaN(pd.getTime())&&pd.getFullYear()>2020){date=pd.toISOString().slice(0,10);break;}
            }
            if(!date) date=new Date().toISOString().slice(0,10);
            // Status: look in a few columns
            let status="";
            for(const ci of [1,2,8,9]){
              const s=String(row[ci]||"").trim();
              if(s.toLowerCase().includes("closed")){status="CLOSED!";break;}
              if(s.toLowerCase().includes("commit")){status="Commit";break;}
              if(s.toLowerCase().includes("pipeline")){status="Pipeline";break;}
            }
            // Win probability: column I (index 8), default 40% if blank
            const rawPct=row[8];
            let winPct=0.40;
            if(rawPct!==undefined&&rawPct!==null&&String(rawPct).trim()!==""){
              const pv=typeof rawPct==="number"?rawPct:parseFloat(String(rawPct).replace(/[%,]/g,""));
              if(!isNaN(pv)) winPct=pv>1?pv/100:pv; // handle both 85 and 0.85 formats
            }
            const notes=String(row[14]||"").trim(); // Column O
            // Category from column Q (index 16)
            const rawCat=String(row[16]||"").trim();
            let category="";
            if(/civ/i.test(rawCat)&&!/sled/i.test(rawCat)) category="Civ";
            else if(/sled/i.test(rawCat)) category="SLED";
            else if(/dod/i.test(rawCat)) category="DoD";
            allDeals.push({account,date,amount,trend,status,sheet:sheetLabel,notes,category,winPct});
          }
        });
        if(allDeals.length===0){
          setUploadError("No deals found. Check that your spreadsheet has data in the expected columns (A=Account, H=Amount, K=Trend, O=Notes).");
          setUploadStatus("error");
          return;
        }
        setParsedDeals(allDeals);
        setUploadStatus("preview");
      }catch(err){
        setUploadError("Error parsing spreadsheet: "+err.message);
        setUploadStatus("error");
      }
    };
    reader.readAsArrayBuffer(file);
  };

  const saveToSupabase=async()=>{
    if(!sbClient||!parsedDeals) return;
    setUploadStatus("saving");
    try{
      // Clear existing pipeline deals
      await sbClient.from("pipeline_deals").delete().neq("id",0);
      // Insert new deals in batches of 50
      for(let i=0;i<parsedDeals.length;i+=50){
        const batch=parsedDeals.slice(i,i+50).map(d=>({
          account:d.account, date:d.date, amount:d.amount, trend:d.trend,
          status:d.status, sheet:d.sheet, notes:d.notes, category:d.category||"",
          win_pct:d.winPct!==undefined?d.winPct:0.40
        }));
        const{error}=await sbClient.from("pipeline_deals").insert(batch);
        if(error) throw error;
      }
      setDeals(parsedDeals);
      setDealsSource("supabase");
      setUploadStatus("done");
      setTimeout(()=>{setShowUpload(false);setUploadStatus("");setParsedDeals(null);},1500);
    }catch(err){
      setUploadError("Error saving to database: "+err.message);
      setUploadStatus("error");
    }
  };

  const [pipelineTab,setPipelineTab]=useState("Total");
  const catTabs=["Total","Civ","SLED","DoD"];
  const filteredDeals=useMemo(()=>deals.map((d,i)=>({...d,_i:i})).filter(d=>pipelineTab==="Total"||d.category===pipelineTab),[pipelineTab,deals]);

  // ── Modeling Mode ──
  const [modelingMode,setModelingMode]=useState(false);
  const [modelDeals,setModelDeals]=useState(null); // deep clone of deals for modeling
  const [modelDrag,setModelDrag]=useState(null); // {idx,startX,startY,origDate,origAmt}
  const [modelTooltip,setModelTooltip]=useState(null); // {x,y,text,color}
  const [scenarios,setScenarios]=useState([]); // [{name,deals,savedAt}] max 3
  const [scenarioName,setScenarioName]=useState("");
  const [showScenarioPanel,setShowScenarioPanel]=useState(false);
  const [activeScenario,setActiveScenario]=useState(null); // name of loaded scenario
  const [modelMsg,setModelMsg]=useState(null);
  const [modelUndoStack,setModelUndoStack]=useState([]); // array of previous modelDeals snapshots
  const modelMsgTimer=useRef(null);
  const showModelMsg=(text,type,dur=3000)=>{clearTimeout(modelMsgTimer.current);setModelMsg({text,type});if(dur>0)modelMsgTimer.current=setTimeout(()=>setModelMsg(null),dur);};
  const pushUndo=()=>{if(modelDeals)setModelUndoStack(prev=>[...prev,modelDeals.map(d=>({...d}))]);};
  const doUndo=()=>{setModelUndoStack(prev=>{if(prev.length===0)return prev;const last=prev[prev.length-1];setModelDeals(last);showModelMsg("Undone","success");return prev.slice(0,-1);});};

  // Enter modeling: deep clone current deals
  const enterModeling=()=>{
    setModelDeals(deals.map(d=>({...d})));
    setModelingMode(true);
    setActiveScenario(null);
    setModelUndoStack([]);
  };
  const exitModeling=()=>{setModelingMode(false);setModelDeals(null);setActiveScenario(null);setModelTooltip(null);};

  // Load scenarios from Supabase on mount
  useEffect(()=>{
    if(!sbClient) return;
    sbClient.from("settings").select("*").eq("key","pipeline_scenarios").single().then(({data})=>{
      if(data?.value) setScenarios(data.value);
    });
  },[sbClient]);

  const saveScenario=async(name)=>{
    if(!modelDeals||!name.trim()) return;
    const entry={name:name.trim(),deals:modelDeals,savedAt:new Date().toISOString()};
    let updated=[...scenarios];
    const existing=updated.findIndex(s=>s.name===entry.name);
    if(existing>=0) updated[existing]=entry;
    else if(updated.length>=3){showModelMsg("Max 3 scenarios. Delete one first.","error");return;}
    else updated.push(entry);
    setScenarios(updated);
    setActiveScenario(entry.name);
    if(sbClient) await sbClient.from("settings").upsert({key:"pipeline_scenarios",value:updated},{onConflict:"key"});
    showModelMsg(`Scenario "${entry.name}" saved`,"success");
  };

  const loadScenario=(sc)=>{
    setModelDeals(sc.deals.map(d=>({...d})));
    setActiveScenario(sc.name);
    setModelingMode(true);
    showModelMsg(`Loaded "${sc.name}"`,"success");
  };

  const deleteScenario=async(name)=>{
    const updated=scenarios.filter(s=>s.name!==name);
    setScenarios(updated);
    if(activeScenario===name) setActiveScenario(null);
    if(sbClient) await sbClient.from("settings").upsert({key:"pipeline_scenarios",value:updated},{onConflict:"key"});
    showModelMsg(`Deleted "${name}"`,"success");
  };

  // The deals to render in the chart (modeling vs real)
  const displayDeals=modelingMode&&modelDeals?modelDeals:deals;
  const filteredDisplay=useMemo(()=>displayDeals.map((d,i)=>({...d,_i:i})).filter(d=>pipelineTab==="Total"||d.category===pipelineTab),[pipelineTab,displayDeals]);

  // Cycle trend on click in modeling mode
  const cycleTrend=(idx)=>{
    if(!modelingMode||!modelDeals) return;
    pushUndo();
    const trendCycle=[1,2,3,4]; // 1=up,2=stable,3=down,4=?
    setModelDeals(prev=>{
      const next=[...prev];
      const cur=next[idx].trend;
      const ci=trendCycle.indexOf(cur);
      next[idx]={...next[idx],trend:trendCycle[(ci+1)%trendCycle.length]};
      return next;
    });
  };

  // ── Apply modeled changes back to pipeline + optionally push to Google Sheet ──
  const [applyingChanges,setApplyingChanges]=useState(false);
  const [pushingToSheet,setPushingToSheet]=useState(false);
  const [sheetWebAppUrl,setSheetWebAppUrl]=useState(()=>localStorage.getItem("pm_sheet_webapp_url")||"");
  const [showApplyModal,setShowApplyModal]=useState(false);
  const [showSheetPushModal,setShowSheetPushModal]=useState(false);

  // Compute which deals were modified
  const modifiedDeals=useMemo(()=>{
    if(!modelingMode||!modelDeals) return [];
    return modelDeals.map((d,i)=>({...d,_origIdx:i})).filter((d,i)=>{
      const orig=deals[i];
      if(!orig) return false;
      return orig.amount!==d.amount||orig.date!==d.date||orig.trend!==d.trend;
    });
  },[modelingMode,modelDeals,deals]);

  // Confirm Changes: push modeled deals → Supabase pipeline_deals
  const applyChangesToPipeline=async()=>{
    if(!modelDeals) return;
    setApplyingChanges(true);
    try{
      if(sbClient){
        await sbClient.from("pipeline_deals").delete().neq("id",0);
        for(let i=0;i<modelDeals.length;i+=50){
          const batch=modelDeals.slice(i,i+50).map(d=>({
            account:d.account, date:d.date, amount:d.amount, trend:d.trend,
            status:d.status, sheet:d.sheet, notes:d.notes, category:d.category||"",
            win_pct:d.winPct!==undefined?d.winPct:0.40
          }));
          const{error}=await sbClient.from("pipeline_deals").insert(batch);
          if(error) throw error;
        }
      }
      setDeals(modelDeals.map(d=>({...d})));
      setDealsSource("supabase");
      showModelMsg(`Confirmed ${modifiedDeals.length} change${modifiedDeals.length>1?'s':''} to pipeline`,"success",4000);
      setShowApplyModal(false);
      exitModeling();
    }catch(err){
      showModelMsg("Error confirming changes: "+err.message,"error",5000);
    }
    setApplyingChanges(false);
  };

  // Update Sheet: push current pipeline deals → Google Sheet via Apps Script web app
  const pushToSheet=async()=>{
    if(!sheetWebAppUrl.trim()){showModelMsg("Enter your Apps Script web app URL first","error");return;}
    setPushingToSheet(true);
    try{
      // Send ALL current deals (whether in modeling mode or not, use the live deals)
      const source=modelingMode&&modelDeals?modelDeals:deals;
      const payload=source.map(d=>({
        account:d.account, date:d.date, amount:d.amount,
        trend:d.trend, category:d.category||""
      }));
      await fetch(sheetWebAppUrl.trim(),{
        method:'POST', mode:'no-cors',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({action:'update_deals',changes:payload})
      });
      showModelMsg(`Pushed ${payload.length} deals to Google Sheet`,"success",5000);
      setShowSheetPushModal(false);
    }catch(err){
      showModelMsg("Sheet push failed: "+err.message,"error",5000);
    }
    setPushingToSheet(false);
  };

  // ── Confidence / Win Probability ──
  const CONF_CYCLE=[{label:'Closed',pct:1.0,color:'#10B981'},{label:'85%',pct:0.85,color:'#3B82F6'},{label:'70%',pct:0.70,color:'#06B6D4'},{label:'60%',pct:0.60,color:'#8B5CF6'},{label:'40%',pct:0.40,color:'#F59E0B'},{label:'20%',pct:0.20,color:'#EF4444'},{label:'Pipe',pct:0.0,color:'#475569'}];
  const defaultConfIdx=(d)=>{
    // Use winPct from spreadsheet if available
    if(d.winPct!==undefined){
      const wp=d.winPct;
      // Find closest CONF_CYCLE entry by pct
      let bestIdx=6,bestDiff=Infinity;
      CONF_CYCLE.forEach((c,i)=>{const diff=Math.abs(c.pct-wp);if(diff<bestDiff){bestDiff=diff;bestIdx=i;}});
      return bestIdx;
    }
    if(d.status==='CLOSED!') return 0;
    if(d.status==='Commit') return 1;
    return 6; // default to Pipe
  };
  const [confOverrides,setConfOverrides]=useState({}); // {accountName: confCycleIndex}
  // Load confidence overrides from Supabase
  useEffect(()=>{
    if(!sbClient) return;
    sbClient.from("settings").select("*").eq("key","pipeline_confidence").single().then(({data})=>{
      if(data?.value) setConfOverrides(data.value);
    });
  },[sbClient]);
  const getConf=(d)=>{
    const key=d.account;
    if(confOverrides[key]!==undefined) return CONF_CYCLE[confOverrides[key]];
    return CONF_CYCLE[defaultConfIdx(d)];
  };
  const cycleConf=(d)=>{
    const key=d.account;
    setConfOverrides(prev=>{
      const cur=prev[key]!==undefined?prev[key]:defaultConfIdx(d);
      const next={...prev,[key]:(cur+1)%CONF_CYCLE.length};
      // Persist to Supabase
      if(sbClient) sbClient.from("settings").upsert({key:"pipeline_confidence",value:next},{onConflict:"key"}).then(()=>{});
      return next;
    });
  };

  const dealR=amt=>amt<150000?14:amt<350000?19:amt<600000?24:amt<1000000?30:amt<2000000?37:amt<5000000?44:52;
  const DEAL_TIERS=[{label:'< $150K',r:14},{label:'$150K–350K',r:19},{label:'$350K–600K',r:24},{label:'$600K–1M',r:30},{label:'$1M–2M',r:37},{label:'$2M–5M',r:44},{label:'> $5M',r:52}];
  const PAD={l:78,r:50,t:110,b:64};
  const fmtAmt=v=>v>=1e6?`$${(v/1e6).toFixed(1)}M`:v>=1000?`$${Math.round(v/1000)}K`:`$${Math.round(v)}`;
  const trendIcon=t=>t===1?'↑':t===3?'↓':t===4?'?':t===0?'·':'→';
  const statusColor=s=>s==='CLOSED!'?'#10B981':s==='Commit'?'#3B82F6':s==='Pipeline'?'#F59E0B':'#64748B';
  const trendColor=t=>t===1?'#10B981':t===3?'#EF4444':t===4?'#A78BFA':'#94A3B8';
  const catColor=c=>c==='Civ'?'#3B82F6':c==='SLED'?'#10B981':c==='DoD'?'#F59E0B':'#64748B';

  const computed=useMemo(()=>{
    const {w,h}=dims;
    const chartW=w-PAD.l-PAD.r;
    const chartH=h-PAD.t-PAD.b;
    const T0=new Date('2025-10-01').getTime();
    const T1=new Date('2027-04-01').getTime();
    const tRange=T1-T0;
    const LOG_LO=Math.log(50000), LOG_HI=Math.log(7000000);
    const logRange=LOG_HI-LOG_LO;
    const toX=ms=>PAD.l+(ms-T0)/tRange*chartW;
    const toY=amt=>PAD.t+(LOG_HI-Math.log(Math.max(amt,50000)))/logRange*chartH;
    const fromX=px=>{const ms=T0+(px-PAD.l)/chartW*tRange;return new Date(ms);};
    const fromY=py=>{const logAmt=LOG_HI-(py-PAD.t)/chartH*logRange;return Math.round(Math.exp(logAmt));};
    // Natural positions with per-dot radius
    let pts=filteredDisplay.map((d,i)=>{
      const r=dealR(d.amount);
      return {i, r,
        x:toX(new Date(d.date).getTime()), y:toY(d.amount),
        nx:toX(new Date(d.date).getTime()), ny:toY(d.amount),
      };
    });
    // Collision avoidance — iterative force simulation with variable radii
    // Sibling deals (same sheet + same date) are allowed to overlap ~40%
    for(let iter=0;iter<300;iter++){
      let anyMove=false;
      for(let a=0;a<pts.length;a++){
        for(let b=a+1;b<pts.length;b++){
          const da=filteredDisplay[a], db=filteredDisplay[b];
          const siblings=da.sheet&&db.sheet&&da.sheet===db.sheet&&da.date===db.date;
          const dx=pts[b].x-pts[a].x, dy=pts[b].y-pts[a].y;
          const dist=Math.sqrt(dx*dx+dy*dy);
          const minD=siblings?(pts[a].r+pts[b].r)*0.6+4:pts[a].r+pts[b].r+8;
          if(dist<minD&&dist>0.01){
            const push=(minD-dist)/2, ux=dx/dist, uy=dy/dist;
            const xw=siblings?0.45:0.15, xClamp=siblings?50:22;
            pts[a].x=Math.max(pts[a].nx-xClamp,Math.min(pts[a].nx+xClamp,pts[a].x-ux*push*xw));
            pts[a].y-=uy*push;
            pts[b].x=Math.max(pts[b].nx-xClamp,Math.min(pts[b].nx+xClamp,pts[b].x+ux*push*xw));
            pts[b].y+=uy*push;
            anyMove=true;
          }
        }
      }
      if(!anyMove) break;
    }
    // Clamp y to chart area (use each dot's own radius)
    pts.forEach(p=>{p.y=Math.max(PAD.t+p.r+2,Math.min(PAD.t+chartH-p.r-2,p.y));});
    // X axis months
    const months=[];
    let d=new Date('2025-10-01');
    const dEnd=new Date('2027-04-01');
    while(d<dEnd){
      const x=toX(d.getTime()), mo=d.getMonth();
      const isQtr=mo===0||mo===3||mo===6||mo===9;
      months.push({x, isQtr, qLabel:isQtr?`${mo===0?'Q1':mo===3?'Q2':mo===6?'Q3':'Q4'} ${d.getFullYear()}`:'',
        monthLabel:d.toLocaleString('en-US',{month:'short'})});
      d=new Date(d.getFullYear(),d.getMonth()+1,1);
    }
    // Y axis gridlines
    const yLines=[100000,250000,500000,1000000,2000000,5000000].map(a=>({
      y:toY(a), label:a>=1e6?`$${a/1e6}M`:`$${a/1000}K`
    }));
    const todayX=toX(new Date().getTime());
    return {pts,months,yLines,chartW,chartH,todayX,toX,toY,fromX,fromY};
  },[dims,pipelineTab,filteredDisplay]);

  const {pts,months,yLines,chartW,chartH,todayX,toX,toY,fromX,fromY}=computed;

  // ── Modeling drag handlers ──
  useEffect(()=>{
    if(!modelDrag||!modelingMode) return;
    const svgEl=contRef.current?.querySelector('svg');
    if(!svgEl) return;
    const toSvgCoords=(clientX,clientY)=>{
      const pt=svgEl.createSVGPoint();
      pt.x=clientX;pt.y=clientY;
      return pt.matrixTransform(svgEl.getScreenCTM().inverse());
    };
    const getQuarter=(dateStr)=>{
      const d=new Date(dateStr);
      const m=d.getMonth();
      const q=m<3?'1Q':m<6?'2Q':m<9?'3Q':'4Q';
      return q+' '+d.getFullYear();
    };
    const onMove=(e)=>{
      const svgCoord=toSvgCoords(e.clientX,e.clientY);
      const dx=svgCoord.x-modelDrag.startSvgX;
      const dy=svgCoord.y-modelDrag.startSvgY;
      // Compute new date from X
      const newDateObj=fromX(modelDrag.curX+dx);
      const newDateStr=newDateObj.toISOString().slice(0,10);
      // Compute new amount from Y
      const newAmt=Math.max(10000,fromY(modelDrag.curY+dy));
      // Compute delta
      const amtDelta=newAmt-modelDrag.origAmt;
      const amtPct=((newAmt/modelDrag.origAmt-1)*100).toFixed(1);
      const qtr=getQuarter(newDateStr);
      // Update model deals
      setModelDeals(prev=>{
        const next=[...prev];
        next[modelDrag.idx]={...next[modelDrag.idx],date:newDateStr,amount:newAmt};
        return next;
      });
      // Show tooltip
      setModelTooltip({
        x:svgCoord.x,y:svgCoord.y-40,
        amt:fmtAmt(newAmt),
        delta:amtDelta>=0?'+'+fmtAmt(amtDelta):'-'+fmtAmt(Math.abs(amtDelta)),
        pct:(amtDelta>=0?'+':'')+amtPct+'%',
        date:newDateStr,
        qtr,
        color:amtDelta>=0?'#10B981':'#EF4444'
      });
    };
    const onUp=()=>{
      setModelDrag(null);
      setTimeout(()=>setModelTooltip(null),1500);
    };
    window.addEventListener('mousemove',onMove);
    window.addEventListener('mouseup',onUp);
    return()=>{window.removeEventListener('mousemove',onMove);window.removeEventListener('mouseup',onUp);};
  },[modelDrag,modelingMode]);

  return (
    <div style={{flex:1,minHeight:0,overflow:'hidden',display:'flex',flexDirection:'column',padding:'4px 16px 4px'}}>
      {/* Legend */}
      <div style={{flexShrink:0,marginBottom:2,display:'flex',alignItems:'center',gap:10,flexWrap:'wrap',position:'relative'}}>
        {/* Pipeline / Modeling toggle */}
        <div style={{display:'flex',background:'#0F172A',borderRadius:8,padding:3,gap:2}}>
          <button onClick={()=>{if(modelingMode)exitModeling();}}
            style={{padding:'4px 14px',borderRadius:6,border:'none',fontSize:11,fontWeight:700,cursor:'pointer',fontFamily:'inherit',
              background:!modelingMode?'#3B82F6':'transparent',color:!modelingMode?'white':'#475569',transition:'all 0.15s'}}>
            Pipeline
          </button>
          <button onClick={()=>{if(!modelingMode)enterModeling();}}
            style={{padding:'4px 14px',borderRadius:6,border:'none',fontSize:11,fontWeight:700,cursor:'pointer',fontFamily:'inherit',
              background:modelingMode?'#A78BFA':'transparent',color:modelingMode?'white':'#475569',transition:'all 0.15s'}}>
            Modeling
          </button>
        </div>
        {modelingMode&&(
          <div style={{display:'flex',gap:4,alignItems:'center'}}>
            <button onClick={()=>setShowScenarioPanel(v=>!v)}
              style={{padding:'4px 10px',borderRadius:6,border:'1px solid #A78BFA',background:'transparent',
                color:'#A78BFA',fontSize:10,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>
              💾 Scenarios {scenarios.length>0?`(${scenarios.length})`:''}
            </button>
            <button onClick={()=>{setModelDeals(deals.map(d=>({...d})));setActiveScenario(null);setModelUndoStack([]);showModelMsg("Reset to live data","success");}}
              style={{padding:'4px 10px',borderRadius:6,border:'1px solid #334155',background:'transparent',
                color:'#64748B',fontSize:10,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>
              ↺ Reset
            </button>
            <button onClick={doUndo}
              style={{padding:'4px 10px',borderRadius:6,border:'1px solid #334155',background:'transparent',
                color:modelUndoStack.length>0?'#3B82F6':'#334155',fontSize:10,fontWeight:700,cursor:modelUndoStack.length>0?'pointer':'default',
                fontFamily:'inherit',opacity:modelUndoStack.length>0?1:0.4,pointerEvents:modelUndoStack.length>0?'auto':'none'}}>
              ⟲ Undo{modelUndoStack.length>0?` (${modelUndoStack.length})`:''}
            </button>
            <button onClick={()=>setShowApplyModal(true)}
              style={{padding:'4px 12px',borderRadius:6,border:'1px solid #10B981',background:'transparent',
                color:'#10B981',fontSize:10,fontWeight:700,cursor:'pointer',fontFamily:'inherit',
                opacity:modifiedDeals.length>0?1:0.4,pointerEvents:modifiedDeals.length>0?'auto':'none'}}>
              ✓ Confirm Changes{modifiedDeals.length>0?` (${modifiedDeals.length})`:''}
            </button>
            <button onClick={()=>setShowSheetPushModal(true)}
              style={{padding:'4px 12px',borderRadius:6,border:'1px solid #F59E0B',background:'transparent',
                color:'#F59E0B',fontSize:10,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>
              ↑ Update Sheet
            </button>
            {activeScenario&&<span style={{fontSize:10,color:'#A78BFA',fontWeight:600}}>📋 {activeScenario}</span>}
          </div>
        )}
        {modelingMode&&<span style={{fontSize:10,color:'#A78BFA',fontWeight:600,fontStyle:'italic'}}>Drag circles to model · Click arrows to cycle trend</span>}
        <div style={{display:'flex',gap:6,marginLeft:8,alignItems:'center'}}>
          {catTabs.map(tab=>{
            const tabCol=tab==="Total"?"#EF4444":catColor(tab);
            const isActive=pipelineTab===tab;
            return (
            <button key={tab} onClick={()=>setPipelineTab(tab)}
              title={tab}
              style={{display:'flex',alignItems:'center',gap:5,padding:'3px 8px',borderRadius:14,border:'none',
                background:isActive?'rgba(255,255,255,0.08)':'transparent',
                cursor:'pointer',transition:'all 0.15s'}}>
              <svg width={18} height={18}><circle cx={9} cy={9} r={7} fill={isActive?tabCol:'none'} stroke={tabCol} strokeWidth={2}/></svg>
              <span style={{fontSize:10,fontWeight:700,color:isActive?'#F8FAFC':'#64748B',letterSpacing:0.3}}>{tab}</span>
            </button>
            );
          })}
        </div>
        {!modelingMode&&<button onClick={()=>{const ans=prompt("Security Question: What is your mother's middle name?");if(!ans||ans.trim().toLowerCase()!=="elizabeth"){if(ans!==null)alert("Incorrect answer.");return;}setShowUpload(true);setUploadStatus("");setParsedDeals(null);setUploadError("");}}
          style={{padding:'4px 12px',borderRadius:6,border:'1px solid #10B981',background:'transparent',
            color:'#10B981',fontSize:10,fontWeight:700,cursor:'pointer',fontFamily:'inherit',letterSpacing:0.5,marginLeft:4}}
          title="Upload new spreadsheet data">
          ↑ Upload
        </button>}
        {!modelingMode&&dealsSource==="supabase"&&<span style={{fontSize:9,color:'#10B981',fontWeight:600}}>● Live from DB</span>}
        {!modelingMode&&dealsSource==="hardcoded"&&<span style={{fontSize:9,color:'#F59E0B',fontWeight:600}}>● Hardcoded data</span>}
        {dealsLoading&&<span style={{fontSize:9,color:'#64748B'}}>Loading...</span>}
        {/* Model message toast */}
        {modelMsg&&<div style={{position:'absolute',top:-2,left:'50%',transform:'translateX(-50%)',zIndex:20,
          background:modelMsg.type==='success'?'rgba(16,185,129,0.95)':'rgba(239,68,68,0.95)',
          color:'white',padding:'6px 16px',borderRadius:8,fontSize:12,fontWeight:600,boxShadow:'0 4px 16px rgba(0,0,0,0.3)',
          whiteSpace:'nowrap',animation:'voiceToastIn 0.2s ease-out'}}>{modelMsg.text}</div>}
        {/* Scenario panel */}
        {showScenarioPanel&&modelingMode&&(
          <div style={{position:'absolute',top:'100%',left:0,zIndex:30,background:'#1E293B',border:'1px solid #334155',
            borderRadius:12,padding:16,width:340,boxShadow:'0 12px 40px rgba(0,0,0,0.5)',marginTop:4}}>
            <div style={{fontSize:13,fontWeight:800,color:'#F8FAFC',marginBottom:12}}>💾 Saved Scenarios</div>
            {scenarios.length===0&&<div style={{fontSize:11,color:'#64748B',marginBottom:12}}>No saved scenarios yet.</div>}
            {scenarios.map(sc=>(
              <div key={sc.name} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 0',borderBottom:'1px solid #0F172A'}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:12,fontWeight:700,color:activeScenario===sc.name?'#A78BFA':'#E2E8F0'}}>{sc.name}</div>
                  <div style={{fontSize:9,color:'#64748B'}}>{sc.deals.length} deals · {new Date(sc.savedAt).toLocaleDateString()}</div>
                </div>
                <button onClick={()=>{loadScenario(sc);setShowScenarioPanel(false);}}
                  style={{padding:'4px 10px',borderRadius:6,border:'1px solid #334155',background:'#0F172A',color:'#3B82F6',fontSize:10,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>Load</button>
                <button onClick={()=>deleteScenario(sc.name)}
                  style={{padding:'4px 8px',borderRadius:6,border:'1px solid #334155',background:'#0F172A',color:'#EF4444',fontSize:10,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>✕</button>
              </div>
            ))}
            <div style={{display:'flex',gap:6,marginTop:12}}>
              <input value={scenarioName} onChange={e=>setScenarioName(e.target.value)} placeholder="Scenario name..."
                style={{flex:1,background:'#0F172A',border:'1px solid #334155',borderRadius:6,padding:'6px 10px',color:'#E2E8F0',fontSize:11,outline:'none',fontFamily:'inherit'}}
                onKeyDown={e=>{if(e.key==='Enter'&&scenarioName.trim()){saveScenario(scenarioName);setScenarioName("");setShowScenarioPanel(false);}}}/>
              <button onClick={()=>{if(scenarioName.trim()){saveScenario(scenarioName);setScenarioName("");setShowScenarioPanel(false);}}}
                disabled={!scenarioName.trim()}
                style={{padding:'6px 12px',borderRadius:6,border:'none',background:scenarioName.trim()?'#A78BFA':'#334155',color:'white',fontSize:11,fontWeight:700,cursor:scenarioName.trim()?'pointer':'not-allowed',fontFamily:'inherit'}}>
                Save Current
              </button>
            </div>
          </div>
        )}
        {/* ── Total + Adjusted with Pie Charts (both modes) ── */}
        {(()=>{
          const src=filteredDisplay;
          const catColors={'Civ':'#3B82F6','SLED':'#10B981','DoD':'#F59E0B','':'#64748B'};
          const totalByCat={};let grandTotal=0;
          src.forEach((d,i)=>{const cat=d.category||'';totalByCat[cat]=(totalByCat[cat]||0)+d.amount;grandTotal+=d.amount;});
          const adjByCat={};let grandAdj=0;
          src.forEach((d,i)=>{const cat=d.category||'';const conf=getConf(d);const adj=d.amount*conf.pct;adjByCat[cat]=(adjByCat[cat]||0)+adj;grandAdj+=adj;});
          const cats=['Civ','SLED','DoD'];
          const maxVal=Math.max(...cats.map(c=>totalByCat[c]||0),1);
          const barW=120;
          return (
            <div style={{marginLeft:'auto',display:'flex',flexDirection:'column',gap:2}}>
              <div style={{display:'flex',alignItems:'baseline',gap:8,marginBottom:2}}>
                <span style={{fontSize:10,fontWeight:700,color:'#94A3B8',letterSpacing:0.5}}>TOTAL</span>
                <span style={{fontSize:14,fontWeight:800,color:'#F8FAFC'}}>{fmtAmt(grandTotal)}</span>
                <span style={{fontSize:9,color:'#475569'}}>|</span>
                <span style={{fontSize:10,fontWeight:700,color:'#94A3B8',letterSpacing:0.5}}>RISK ADJ</span>
                <span style={{fontSize:14,fontWeight:800,color:'#A78BFA'}}>{fmtAmt(grandAdj)}</span>
              </div>
              {cats.map(cat=>{
                const tVal=totalByCat[cat]||0;
                const aVal=adjByCat[cat]||0;
                const tW=maxVal>0?(tVal/maxVal)*barW:0;
                const aW=maxVal>0?(aVal/maxVal)*barW:0;
                return (
                  <div key={cat} style={{display:'flex',alignItems:'center',gap:4,height:16}}>
                    <span style={{fontSize:9,fontWeight:700,color:'#94A3B8',width:28,textAlign:'right'}}>{cat}</span>
                    <div style={{width:barW,height:12,background:'rgba(30,41,59,0.6)',borderRadius:3,position:'relative',overflow:'hidden'}}>
                      <div style={{position:'absolute',top:0,left:0,width:tW,height:'100%',background:catColors[cat]||'#64748B',opacity:0.3,borderRadius:3}}/>
                      <div style={{position:'absolute',top:0,left:0,width:aW,height:'100%',background:catColors[cat]||'#64748B',borderRadius:3}}/>
                    </div>
                    <span style={{fontSize:9,fontWeight:600,color:catColors[cat]||'#94A3B8',minWidth:36,opacity:0.7}}>{tVal>0?fmtAmt(tVal):''}</span>
                    <span style={{fontSize:9,fontWeight:700,color:catColors[cat]||'#94A3B8',minWidth:36}}>{aVal>0?fmtAmt(aVal):''}</span>
                  </div>
                );
              })}
            </div>
          );
        })()}
      </div>
      {/* Chart */}
      <div ref={contRef} style={{flex:1,minHeight:0}}>
        <svg width="100%" height="100%" style={{overflow:'visible'}}>
          {/* Y gridlines + labels */}
          {yLines.map((yl,i)=>(
            <g key={i}>
              <line x1={PAD.l} y1={yl.y} x2={PAD.l+chartW} y2={yl.y} stroke="#334155" strokeWidth={1}/>
              <text x={PAD.l-8} y={yl.y+4} textAnchor="end" fontSize={11} fill="#F8FAFC" fontWeight="600" fontFamily="inherit">{yl.label}</text>
            </g>
          ))}
          {/* Axes */}
          <line x1={PAD.l} y1={PAD.t} x2={PAD.l} y2={PAD.t+chartH} stroke="#475569" strokeWidth={2}/>
          <line x1={PAD.l} y1={PAD.t+chartH} x2={PAD.l+chartW} y2={PAD.t+chartH} stroke="#475569" strokeWidth={2}/>
          {/* Quarter background bands with per-quarter breakdowns in boxes */}
          {(()=>{
            const qtrMonths=months.filter(m=>m.isQtr);
            const catList=[['Total','#EF4444'],['Civ','#3B82F6'],['SLED','#10B981'],['DoD','#F59E0B']];
            const qData={};
            filteredDisplay.forEach(d=>{
              const dt=new Date(d.date);const mo=dt.getMonth();
              const qKey=(mo<3?'Q1':mo<6?'Q2':mo<9?'Q3':'Q4')+' '+dt.getFullYear();
              if(!qData[qKey]) qData[qKey]={total:{},adj:{}};
              const cat=d.category||'';
              qData[qKey].total[cat]=(qData[qKey].total[cat]||0)+d.amount;
              qData[qKey].total['Total']=(qData[qKey].total['Total']||0)+d.amount;
              const conf=getConf(d);const adjAmt=d.amount*conf.pct;
              qData[qKey].adj[cat]=(qData[qKey].adj[cat]||0)+adjAmt;
              qData[qKey].adj['Total']=(qData[qKey].adj['Total']||0)+adjAmt;
            });
            return qtrMonths.map((m,qi)=>{
              const nextX=qtrMonths[qi+1]?qtrMonths[qi+1].x:(PAD.l+chartW);
              const bandW=nextX-m.x;
              if(bandW<=0) return null;
              const qKey=m.qLabel;
              const qd=qData[qKey]||{total:{},adj:{}};
              const cx=m.x+bandW/2;
              // Box dimensions
              const boxW=Math.min(bandW-8,220);
              const boxH=62;
              const boxX=cx-boxW/2;
              const boxY=PAD.t-boxH-8;
              // Category column positions inside box
              const colW=boxW/5;
              const labelX=boxX+colW*0.5;
              const cols=[boxX+colW*1.5, boxX+colW*2.5, boxX+colW*3.5, boxX+colW*4.5];
              return (
                <g key={'qband'+qi}>
                  <rect x={m.x} y={PAD.t} width={bandW} height={chartH}
                    fill={qi%2===0?'rgba(30,41,59,0.5)':'rgba(15,23,42,0.3)'} stroke="none"/>
                  {/* Info box background */}
                  <rect x={boxX} y={boxY} width={boxW} height={boxH} rx={6} ry={6}
                    fill="rgba(15,23,42,0.85)" stroke="rgba(71,85,105,0.5)" strokeWidth={1}/>
                  {/* Quarter label row — top of box */}
                  <text x={cx} y={boxY+15} textAnchor="middle" fontSize={13} fontWeight="800"
                    fill="#F8FAFC" fontFamily="inherit" letterSpacing="1">{m.qLabel}</text>
                  {/* Row labels */}
                  <text x={labelX} y={boxY+33} textAnchor="middle" fontSize={10} fontWeight="700" fill="#94A3B8" fontFamily="inherit">T</text>
                  <text x={labelX} y={boxY+50} textAnchor="middle" fontSize={10} fontWeight="700" fill="#94A3B8" fontFamily="inherit">RA</text>
                  {/* Category values */}
                  {catList.map(([cat,color],ci)=>{
                    const tVal=qd.total[cat]||0;
                    const aVal=qd.adj[cat]||0;
                    if(tVal===0&&cat!=='Total') return null;
                    return <g key={cat}>
                      <text x={cols[ci]} y={boxY+33} textAnchor="middle" fontSize={12} fontWeight="700"
                        fill={color} fontFamily="inherit">{fmtAmt(tVal)}</text>
                      <text x={cols[ci]} y={boxY+50} textAnchor="middle" fontSize={11} fontWeight="600"
                        fill={color} fontFamily="inherit" opacity={0.55}>{fmtAmt(aVal)}</text>
                    </g>;
                  })}
                </g>
              );
            });
          })()}
          {/* X axis month/quarter markers */}
          {months.map((m,i)=>{
            // For quarter labels, find next quarter x to center label in band
            let nextQtrX=PAD.l+chartW;
            if(m.isQtr){
              for(let j=i+1;j<months.length;j++){if(months[j].isQtr){nextQtrX=months[j].x;break;}}
            }
            return (
            <g key={i}>
              {m.isQtr
                ?<line x1={m.x} y1={PAD.t} x2={m.x} y2={PAD.t+chartH} stroke="#475569" strokeWidth={2.5}/>
                :<line x1={m.x} y1={PAD.t+chartH} x2={m.x} y2={PAD.t+chartH+5} stroke="#334155" strokeWidth={1}/>}
              {m.isQtr&&<text x={m.x+(nextQtrX-m.x)/2} y={PAD.t+chartH+36} textAnchor="middle" fontSize={11} fill="#94A3B8" fontWeight="800" fontFamily="inherit" letterSpacing="1">{m.qLabel}</text>}
              <text x={m.isQtr?m.x+4:m.x} y={PAD.t+chartH+16} textAnchor={m.isQtr?'start':'middle'} fontSize={11} fill="#F8FAFC" fontWeight="600" fontFamily="inherit">{m.monthLabel}</text>
            </g>
            );
          })}
          {/* Today marker */}
          {todayX>PAD.l&&todayX<PAD.l+chartW&&(
            <g>
              <line x1={todayX} y1={PAD.t} x2={todayX} y2={PAD.t+chartH} stroke="#F59E0B" strokeWidth={1.5} strokeDasharray="4,3" opacity={0.55}/>
              <text x={todayX+4} y={PAD.t+10} fontSize={8} fill="#F59E0B" opacity={0.8} fontFamily="inherit" fontWeight="600">TODAY</text>
            </g>
          )}
          {/* Connector lines from natural y to bumped y */}
          {pts.map((p,i)=>{
            if(Math.abs(p.y-p.ny)<4) return null;
            const col=catColor(filteredDisplay[i].category);
            return <line key={i} x1={p.x} y1={p.ny} x2={p.x} y2={p.y} stroke={col} strokeWidth={1} strokeDasharray="3,3" opacity={0.3}/>;
          })}
          {/* Deal dots + labels */}
          {pts.map((p,i)=>{
            const d=filteredDisplay[i];
            const r=p.r;
            const col=catColor(d.category);
            const isHov=hov===i;
            const isDragging=modelDrag&&modelDrag.idx===d._i;
            const labelBelow=p.y<PAD.t+chartH*0.42;
            const arrowSize=Math.round(8+r*0.28);
            // Check if this deal was modified from original (modeling mode)
            const origDeal=modelingMode&&deals[d._i];
            const isModified=modelingMode&&origDeal&&(origDeal.amount!==d.amount||origDeal.date!==d.date||origDeal.trend!==d.trend);
            const conf=getConf(d);
            const isPipe=conf.label==='Pipe';
            const fadeOpacity=isPipe?0.6:1;
            return (
              <g key={i} style={{cursor:modelingMode?'grab':'default',opacity:fadeOpacity}}
                onMouseEnter={()=>{if(!modelDrag)setHov(i);}}
                onMouseLeave={()=>{if(!modelDrag)setHov(null);}}
                onMouseDown={modelingMode?(e)=>{
                  e.preventDefault();
                  pushUndo();
                  const svgEl=contRef.current?.querySelector('svg');
                  if(!svgEl) return;
                  const svgPt=svgEl.createSVGPoint();
                  svgPt.x=e.clientX;svgPt.y=e.clientY;
                  const ctm=svgEl.getScreenCTM().inverse();
                  const svgCoord=svgPt.matrixTransform(ctm);
                  setModelDrag({idx:d._i,startSvgX:svgCoord.x,startSvgY:svgCoord.y,origDate:d.date,origAmt:d.amount,curX:p.x,curY:p.y});
                }:undefined}>
                {/* Modified indicator ring */}
                {isModified&&<circle cx={p.x} cy={p.y} r={r+5} fill="none" stroke="#A78BFA" strokeWidth={1.5} strokeDasharray="4,3" opacity={0.7}/>}
                {isHov&&<circle cx={p.x} cy={p.y} r={r+8} fill={col} opacity={0.15}/>}
                <circle cx={p.x} cy={p.y} r={r} fill={isDragging?"#1E293B":"#0F172A"} stroke={isDragging?"#A78BFA":col} strokeWidth={isHov||isDragging?3:isPipe?1.2:2.2}/>
                {/* Trend icon — clickable in modeling mode, with larger invisible hit target */}
                {modelingMode&&<circle cx={p.x} cy={p.y} r={Math.max(r*0.25,7)} fill="transparent"
                  style={{cursor:'pointer'}}
                  onMouseDown={(e)=>{e.stopPropagation();}}
                  onClick={(e)=>{e.stopPropagation();cycleTrend(d._i);}}/>}
                <text x={p.x} y={p.y+1} textAnchor="middle" dominantBaseline="middle" fontSize={arrowSize}
                  fill={trendColor(d.trend)} fontWeight="bold" fontFamily="inherit"
                  style={{cursor:modelingMode?'pointer':'inherit',pointerEvents:modelingMode?'none':'auto'}}>{trendIcon(d.trend)}</text>
                {/* Account name — always visible, subtle category-tinted */}
                {(()=>{
                  const mutedCatCol={'Civ':'#4A6178','SLED':'#4A7868','DoD':'#7A6A4A','':'#3D4D5C'};
                  const hovCatCol={'Civ':'#7EADD4','SLED':'#7ED4B0','DoD':'#D4A87E','':'#94A3B8'};
                  const nameCol=isModified?'#A78BFA':isHov?hovCatCol[d.category||'']:isPipe?'#1E293B':mutedCatCol[d.category||''];
                  return <text x={p.x} y={labelBelow?p.y+r+12:p.y-r-6}
                    textAnchor="middle" fontSize={isPipe?8:9} fontWeight={isPipe?400:400}
                    fill={nameCol}
                    dominantBaseline={labelBelow?'hanging':'auto'}
                    fontFamily="inherit">{d.account}</text>;
                })()}
                {/* Amount + Confidence — only on hover */}
                {(isHov||isDragging)&&(()=>{
                  const conf=getConf(d);
                  const amtY=labelBelow?p.y-r-6:p.y+r+12;
                  const amtLabel=fmtAmt(d.amount);
                  const confLabel=conf.label;
                  return (
                    <g>
                      <text x={p.x-2} y={amtY}
                        textAnchor="end" fontSize={10}
                        fill={isModified?'#A78BFA':col}
                        dominantBaseline={labelBelow?'auto':'hanging'}
                        fontWeight={700}
                        fontFamily="inherit">{amtLabel}</text>
                      <text x={p.x+2} y={amtY}
                        textAnchor="start" fontSize={10} fontWeight="700"
                        fill={conf.color} fontFamily="inherit"
                        dominantBaseline={labelBelow?'auto':'hanging'}
                        style={{cursor:'pointer'}}
                        onMouseDown={(e)=>{e.stopPropagation();}}
                        onClick={(e)=>{e.stopPropagation();cycleConf(d);}}>
                        {confLabel}
                      </text>
                    </g>
                  );
                })()}
                {/* Hover: show date + original if modified */}
                {isHov&&<text x={p.x} y={labelBelow?p.y+r+26:p.y-r-18}
                  textAnchor="middle" fontSize={9} fill={isModified?'#A78BFA':'#94A3B8'}
                  dominantBaseline={labelBelow?'hanging':'auto'}
                  fontFamily="inherit">{d.date}{isModified&&origDeal?' (was '+origDeal.date+')':''}</text>}
              </g>
            );
          })}
          {/* Modeling drag tooltip */}
          {modelTooltip&&(
            <g>
              <rect x={modelTooltip.x-90} y={modelTooltip.y-38} width={180} height={36} rx={8} fill="#1E293B" stroke={modelTooltip.color} strokeWidth={1.5} opacity={0.96}/>
              <text x={modelTooltip.x} y={modelTooltip.y-24} textAnchor="middle" fontSize={12} fontWeight="800" fill={modelTooltip.color} fontFamily="inherit">{modelTooltip.amt} ({modelTooltip.pct})</text>
              <text x={modelTooltip.x} y={modelTooltip.y-10} textAnchor="middle" fontSize={9} fill="#94A3B8" fontFamily="inherit">{modelTooltip.qtr} · {modelTooltip.date}</text>
            </g>
          )}
          {/* Modeling: quarter band highlights when dragging */}
          {modelingMode&&modelDrag&&months.filter(m=>m.isQtr).map((m,mi)=>{
            const nextQtr=months.filter(mm=>mm.isQtr)[mi+1];
            if(!nextQtr) return null;
            return <rect key={mi} x={m.x} y={PAD.t} width={nextQtr.x-m.x} height={chartH}
              fill={mi%2===0?'rgba(167,139,250,0.03)':'rgba(167,139,250,0.06)'} stroke="none"/>;
          })}
          {/* Axis labels */}
          <text transform={`rotate(-90,${PAD.l-54},${PAD.t+chartH/2})`} x={PAD.l-54} y={PAD.t+chartH/2}
            textAnchor="middle" fontSize={9} fill="#475569" fontWeight="600" fontFamily="inherit">DEAL SIZE</text>
          <text x={PAD.l+chartW/2} y={PAD.t+chartH+55} textAnchor="middle" fontSize={9} fill="#475569" fontWeight="600" fontFamily="inherit">CLOSE DATE</text>
          {/* Hover tooltip with Notes/Next Steps */}
          {hov!==null&&filteredDisplay[hov]&&filteredDisplay[hov].notes&&(()=>{
            const d=filteredDisplay[hov], p=pts[hov], r=p.r;
            const col=catColor(d.category);
            const tw=280, maxTH=180;
            // Position: prefer right of dot; flip left if near right edge; above/below based on y
            let tx=p.x+r+14, ty=p.y-20;
            if(tx+tw>dims.w-10) tx=p.x-r-tw-14;
            if(ty<PAD.t) ty=PAD.t+4;
            if(ty+maxTH>PAD.t+chartH) ty=PAD.t+chartH-maxTH-4;
            return (
              <foreignObject x={tx} y={ty} width={tw} height={maxTH} style={{pointerEvents:'none',overflow:'visible'}}>
                <div xmlns="http://www.w3.org/1999/xhtml" style={{
                  background:'#1E293B', border:`1px solid ${col}44`, borderRadius:10,
                  padding:12, maxHeight:maxTH, display:'flex', flexDirection:'column',
                  boxShadow:'0 8px 24px rgba(0,0,0,0.5)', fontFamily:'inherit',
                }}>
                  <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:6,flexShrink:0}}>
                    <div style={{width:8,height:8,borderRadius:'50%',background:col,flexShrink:0}}/>
                    <span style={{fontSize:12,fontWeight:700,color:'#F8FAFC'}}>{d.account}</span>
                    <span style={{fontSize:10,color:col,fontWeight:600,marginLeft:'auto'}}>{fmtAmt(d.amount)}</span>
                  </div>
                  <div style={{fontSize:9,color:'#64748B',fontWeight:600,letterSpacing:0.5,textTransform:'uppercase',marginBottom:4,flexShrink:0}}>Notes / Next Steps</div>
                  <div style={{fontSize:11,color:'#CBD5E1',lineHeight:1.55,overflowY:'auto',flex:1,paddingRight:4}}>{d.notes}</div>
                </div>
              </foreignObject>
            );
          })()}
        </svg>
      </div>
      {/* Confirm Changes Modal — pushes modeling edits to Supabase pipeline */}
      {showApplyModal&&modelingMode&&(
        <div className="modal-overlay" onClick={()=>setShowApplyModal(false)}>
          <div className="modal" style={{width:560,maxHeight:'85vh'}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:16,fontWeight:800,color:'#F8FAFC',marginBottom:4}}>✓ Confirm Changes to Pipeline</div>
            <div style={{fontSize:12,color:'#64748B',marginBottom:16,lineHeight:1.6}}>
              This will update {modifiedDeals.length} deal{modifiedDeals.length>1?'s':''} in your live pipeline database. Your spreadsheet will not be affected.
            </div>
            {/* Changes summary */}
            <div style={{maxHeight:280,overflowY:'auto',border:'1px solid #334155',borderRadius:8,marginBottom:16}}>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:11}}>
                <thead>
                  <tr style={{background:'#0F172A',position:'sticky',top:0}}>
                    <th style={{padding:'6px 10px',textAlign:'left',color:'#64748B',fontWeight:700,borderBottom:'1px solid #334155'}}>Account</th>
                    <th style={{padding:'6px 10px',textAlign:'right',color:'#64748B',fontWeight:700,borderBottom:'1px solid #334155'}}>Amount</th>
                    <th style={{padding:'6px 10px',textAlign:'center',color:'#64748B',fontWeight:700,borderBottom:'1px solid #334155'}}>Date</th>
                    <th style={{padding:'6px 10px',textAlign:'center',color:'#64748B',fontWeight:700,borderBottom:'1px solid #334155'}}>Trend</th>
                  </tr>
                </thead>
                <tbody>
                  {modifiedDeals.map((d,i)=>{
                    const orig=deals[d._origIdx];
                    const amtChanged=orig&&orig.amount!==d.amount;
                    const dateChanged=orig&&orig.date!==d.date;
                    const trendChanged=orig&&orig.trend!==d.trend;
                    return (
                      <tr key={i} style={{borderBottom:'1px solid #1E293B'}}>
                        <td style={{padding:'5px 10px',color:'#E2E8F0',fontWeight:600}}>{d.account}</td>
                        <td style={{padding:'5px 10px',textAlign:'right',color:amtChanged?'#A78BFA':'#64748B',fontWeight:amtChanged?700:400}}>
                          {amtChanged?<>{fmtAmt(orig.amount)} → <span style={{color:'#10B981'}}>{fmtAmt(d.amount)}</span></>:fmtAmt(d.amount)}
                        </td>
                        <td style={{padding:'5px 10px',textAlign:'center',color:dateChanged?'#A78BFA':'#64748B',fontSize:10}}>
                          {dateChanged?<>{orig.date} → <span style={{color:'#3B82F6'}}>{d.date}</span></>:d.date}
                        </td>
                        <td style={{padding:'5px 10px',textAlign:'center'}}>
                          {trendChanged
                            ?<><span style={{color:trendColor(orig.trend)}}>{trendIcon(orig.trend)}</span> → <span style={{color:trendColor(d.trend),fontWeight:700}}>{trendIcon(d.trend)}</span></>
                            :<span style={{color:trendColor(d.trend)}}>{trendIcon(d.trend)}</span>}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
            <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
              <button className="btn btn-ghost" onClick={()=>setShowApplyModal(false)}>Cancel</button>
              <button className="btn btn-primary" disabled={applyingChanges}
                onClick={applyChangesToPipeline}>
                {applyingChanges?'Confirming...':'Confirm Changes'}
              </button>
            </div>
          </div>
        </div>
      )}
      {/* Update Sheet Modal — pushes current pipeline data back to Google Sheet */}
      {showSheetPushModal&&(
        <div className="modal-overlay" onClick={()=>setShowSheetPushModal(false)}>
          <div className="modal" style={{width:500}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:16,fontWeight:800,color:'#F8FAFC',marginBottom:4}}>↑ Update Google Sheet</div>
            <div style={{fontSize:12,color:'#64748B',marginBottom:16,lineHeight:1.6}}>
              Push the current pipeline data back to your Google Sheet. This will update amounts, dates, and trend arrows for matching accounts.
            </div>
            <div style={{background:'#0F172A',border:'1px solid #1E293B',borderRadius:8,padding:12,marginBottom:16}}>
              <div style={{fontSize:11,fontWeight:700,color:'#94A3B8',marginBottom:8}}>Apps Script Web App URL</div>
              <div style={{fontSize:10,color:'#64748B',marginBottom:8,lineHeight:1.5}}>
                Deploy your Apps Script as a web app, then paste the URL here. This gets saved so you only need to do it once.
              </div>
              <input value={sheetWebAppUrl} onChange={e=>{setSheetWebAppUrl(e.target.value);localStorage.setItem("pm_sheet_webapp_url",e.target.value);}}
                placeholder="https://script.google.com/macros/s/.../exec"
                style={{width:'100%',background:'#1E293B',border:'1px solid #334155',borderRadius:6,padding:'7px 10px',color:'#E2E8F0',fontSize:11,outline:'none',fontFamily:'inherit'}}/>
            </div>
            <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
              <button className="btn btn-ghost" onClick={()=>setShowSheetPushModal(false)}>Cancel</button>
              <button className="btn btn-primary" disabled={pushingToSheet||!sheetWebAppUrl.trim()}
                onClick={pushToSheet}>
                {pushingToSheet?'Pushing...':'Push to Sheet'}
              </button>
            </div>
          </div>
        </div>
      )}
      {/* Upload Modal */}
      {showUpload&&(
        <div className="modal-overlay" onClick={()=>{if(uploadStatus!=="saving")setShowUpload(false);}}>
          <div className="modal" style={{width:620,maxHeight:'85vh'}} onClick={e=>e.stopPropagation()}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
              <span style={{fontSize:16,fontWeight:800}}>Upload Pipeline Spreadsheet</span>
              <button className="btn btn-ghost" onClick={()=>setShowUpload(false)} style={{padding:'4px 8px',fontSize:16,lineHeight:1}}>×</button>
            </div>
            {uploadStatus===""&&(
              <div>
                <div style={{border:'2px dashed #334155',borderRadius:12,padding:32,textAlign:'center',marginBottom:16,cursor:'pointer',transition:'border-color 0.15s'}}
                  onClick={()=>fileRef.current&&fileRef.current.click()}
                  onDragOver={e=>{e.preventDefault();e.currentTarget.style.borderColor='#3B82F6';}}
                  onDragLeave={e=>{e.currentTarget.style.borderColor='#334155';}}
                  onDrop={e=>{e.preventDefault();e.currentTarget.style.borderColor='#334155';const f=e.dataTransfer.files[0];if(f)parseSpreadsheet(f);}}>
                  <div style={{fontSize:32,marginBottom:8}}>📊</div>
                  <div style={{fontSize:14,fontWeight:700,marginBottom:4}}>Drop your Excel file here</div>
                  <div style={{fontSize:12,color:'#64748B'}}>or click to browse — supports .xlsx, .xls, .csv</div>
                </div>
                <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" style={{display:'none'}}
                  onChange={e=>{const f=e.target.files[0];if(f)parseSpreadsheet(f);}}/>
                <div style={{fontSize:11,color:'#64748B',lineHeight:1.6}}>
                  <strong style={{color:'#94A3B8'}}>Expected columns:</strong> A = Account Name, H = Deal Amount, K = Trend Arrow, O = Notes.
                  Dates are auto-detected from columns D–G. Each sheet tab becomes a filter category.
                </div>
              </div>
            )}
            {uploadStatus==="parsing"&&(
              <div style={{textAlign:'center',padding:32}}>
                <div style={{fontSize:24,marginBottom:8}}>⏳</div>
                <div style={{fontSize:14,color:'#94A3B8'}}>Parsing spreadsheet...</div>
              </div>
            )}
            {uploadStatus==="preview"&&parsedDeals&&(
              <div>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
                  <span style={{fontSize:13,fontWeight:700,color:'#10B981'}}>✓ Found {parsedDeals.length} deals</span>
                  <span style={{fontSize:11,color:'#64748B'}}>across {[...new Set(parsedDeals.map(d=>d.sheet))].join(", ")}</span>
                </div>
                <div style={{maxHeight:320,overflowY:'auto',border:'1px solid #334155',borderRadius:8,marginBottom:16}}>
                  <table style={{width:'100%',borderCollapse:'collapse',fontSize:11}}>
                    <thead>
                      <tr style={{background:'#0F172A',position:'sticky',top:0}}>
                        <th style={{padding:'8px 10px',textAlign:'left',color:'#64748B',fontWeight:700,borderBottom:'1px solid #334155'}}>Account</th>
                        <th style={{padding:'8px 10px',textAlign:'left',color:'#64748B',fontWeight:700,borderBottom:'1px solid #334155'}}>Sheet</th>
                        <th style={{padding:'8px 10px',textAlign:'right',color:'#64748B',fontWeight:700,borderBottom:'1px solid #334155'}}>Amount</th>
                        <th style={{padding:'8px 10px',textAlign:'center',color:'#64748B',fontWeight:700,borderBottom:'1px solid #334155'}}>Date</th>
                        <th style={{padding:'8px 10px',textAlign:'center',color:'#64748B',fontWeight:700,borderBottom:'1px solid #334155'}}>Trend</th>
                      </tr>
                    </thead>
                    <tbody>
                      {parsedDeals.map((d,i)=>(
                        <tr key={i} style={{borderBottom:'1px solid #1E293B'}}>
                          <td style={{padding:'6px 10px',color:'#E2E8F0',fontWeight:600}}>{d.account}</td>
                          <td style={{padding:'6px 10px',color:'#94A3B8'}}>{d.sheet}</td>
                          <td style={{padding:'6px 10px',textAlign:'right',color:'#3B82F6',fontWeight:600}}>{fmtAmt(d.amount)}</td>
                          <td style={{padding:'6px 10px',textAlign:'center',color:'#64748B'}}>{d.date}</td>
                          <td style={{padding:'6px 10px',textAlign:'center',fontSize:14}}>{trendIcon(d.trend)}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
                <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
                  <button className="btn btn-ghost" onClick={()=>{setUploadStatus("");setParsedDeals(null);}}>Back</button>
                  {sbClient
                    ?<button className="btn btn-primary" onClick={saveToSupabase}>Save {parsedDeals.length} Deals to Database</button>
                    :<button className="btn btn-primary" onClick={()=>{setDeals(parsedDeals);setDealsSource("uploaded");setShowUpload(false);setUploadStatus("");setParsedDeals(null);}}>Use Data (Session Only)</button>
                  }
                </div>
                {!sbClient&&<div style={{fontSize:10,color:'#F59E0B',marginTop:8}}>⚠ Supabase not connected — data will only persist for this browser session. Connect Supabase in Settings to save permanently.</div>}
              </div>
            )}
            {uploadStatus==="saving"&&(
              <div style={{textAlign:'center',padding:32}}>
                <div style={{fontSize:24,marginBottom:8}}>💾</div>
                <div style={{fontSize:14,color:'#94A3B8'}}>Saving {parsedDeals?parsedDeals.length:0} deals to database...</div>
              </div>
            )}
            {uploadStatus==="done"&&(
              <div style={{textAlign:'center',padding:32}}>
                <div style={{fontSize:32,marginBottom:8}}>✅</div>
                <div style={{fontSize:16,fontWeight:700,color:'#10B981'}}>Pipeline Updated!</div>
                <div style={{fontSize:12,color:'#64748B',marginTop:4}}>{deals.length} deals saved to Supabase</div>
              </div>
            )}
            {uploadStatus==="error"&&(
              <div>
                <div style={{padding:16,background:'rgba(239,68,68,0.1)',border:'1px solid rgba(239,68,68,0.3)',borderRadius:8,marginBottom:16}}>
                  <div style={{fontSize:12,color:'#EF4444',fontWeight:600}}>{uploadError}</div>
                </div>
                <button className="btn btn-ghost" onClick={()=>{setUploadStatus("");setUploadError("");}}>Try Again</button>
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const local=loadLocal();
  const [tasks,setTasks]=useState(local.tasks);
  const [team,setTeam]=useState(local.team);
  const [view,setView_]=useState("circles");
  const setView=v=>{setView_(v);if(v==="timeline"){setShowAll(true);setShowSidebar(false);}else{setShowSidebar(true);}};
  const [colorBy,setColorBy]=useState("type");
  const [filterT,setFilterT]=useState("All");
  const [filterTL,setFilterTL]=useState("All");
  const [filterC,setFilterC]=useState("All");
  const [selected,setSelected]=useState(null);
  const [showForm,setShowForm]=useState(false);
  const [editingId,setEditingId]=useState(null);
  const [form,setForm]=useState(BLANK);
  const [saveErr,setSaveErr]=useState("");
  const [nextId,setNextId]=useState(local.nextId);
  const [showAll,setShowAll]=useState(false);
  const [showDetails,setShowDetails]=useState(true);
  const [showSidebar,setShowSidebar]=useState(true);
  const [circlesHovId,setCirclesHovId]=useState(null);
  const dotPosRef=useRef({});
  const bodyRef=useRef(null);
  const [connLine,setConnLine]=useState(null);
  useEffect(()=>{
    if(!circlesHovId||view!=="circles"||!bodyRef.current){setConnLine(null);return;}
    const dotEl=bodyRef.current.querySelector(`[data-dot-id="${circlesHovId}"] circle`);
    const cardEl=bodyRef.current.querySelector(`[data-card-id="${circlesHovId}"]`);
    if(!dotEl||!cardEl){setConnLine(null);return;}
    const bodyRect=bodyRef.current.getBoundingClientRect();
    const dotRect=dotEl.getBoundingClientRect();

      const s=str.toLowerCase();
      let qi=0,score=0,lastIdx=-1,consecutiveBonus=0;
      for(let si=0;si<s.length&&qi<query.length;si++){
        if(s[si]===query[qi]){
          // Bonus for consecutive matches
          consecutiveBonus=(lastIdx===si-1)?consecutiveBonus+5:0;
          // Bonus for word boundary (start of string, after space/punctuation)
          const boundary=(si===0||/[\s\-_\/.,;:]/.test(s[si-1]))?10:0;
          // Penalty for distance between matches
          const gap=lastIdx>=0?Math.min(si-lastIdx-1,10):0;
          score+=1+consecutiveBonus+boundary-gap*0.3;
          lastIdx=si;
          qi++;
        }
      }
      return qi===query.length?score:-1; // -1 = no match
    };
    // Multi-word: each word must fuzzy-match, total score is sum
    const words=q.split(/\s+/);
    const fuzzyMatch=(str)=>{
      let total=0;
      for(const w of words){
        const s=fuzzyScore(w,str);
        if(s<0) return -1;
        total+=s;
      }
      return total;
    };

              <rect x="460" y="420" width="220" height="80" rx="16" fill="#1a2332" stroke="#CBD5E1" strokeWidth="2" filter="url(#archGlow)"/>
              <text x="570" y="447" textAnchor="middle" fontSize="26">🐙</text>
              <text x="570" y="467" textAnchor="middle" fontSize="13" fontWeight="800" fill="#E2E8F0">GitHub</text>
              <text x="570" y="482" textAnchor="middle" fontSize="9" fill="#94A3B8">tonyfranzonello/priority-map</text>
              <rect x="514" y="487" width="112" height="16" rx="8" fill="rgba(226,232,240,0.1)"/>
              <text x="570" y="498" textAnchor="middle" fontSize="8" fontWeight="700" fill="#CBD5E1" letterSpacing="0.8">CODE STORAGE</text>

              <rect x="460" y="555" width="220" height="85" rx="16" fill="#1a2332" stroke="#CBD5E1" strokeWidth="2" filter="url(#archGlow)"/>
              <text x="570" y="582" textAnchor="middle" fontSize="26">▲</text>
              <text x="570" y="602" textAnchor="middle" fontSize="13" fontWeight="800" fill="#E2E8F0">Vercel</text>
              <text x="570" y="617" textAnchor="middle" fontSize="9" fill="#94A3B8">Auto-deploys from GitHub</text>
              <text x="570" y="629" textAnchor="middle" fontSize="9" fill="#94A3B8">Live in ~60 seconds</text>
              <rect x="530" y="633" width="80" height="16" rx="8" fill="rgba(226,232,240,0.1)"/>
              <text x="570" y="644" textAnchor="middle" fontSize="8" fontWeight="700" fill="#CBD5E1" letterSpacing="0.8">HOSTING</text>

              <rect x="860" y="225" width="230" height="115" rx="16" fill="url(#appGradArch)" stroke="#3B82F6" strokeWidth="2.5" filter="url(#archGlow)"/>
              <text x="975" y="257" textAnchor="middle" fontSize="28">🗺️</text>
              <text x="975" y="280" textAnchor="middle" fontSize="14" fontWeight="800" fill="#E2E8F0">Priority Map App</text>
              <text x="975" y="296" textAnchor="middle" fontSize="9" fill="#94A3B8">priority-map-sigma.vercel.app</text>
              <text x="975" y="310" textAnchor="middle" fontSize="9" fill="#94A3B8">Rings, VxE, Diamond, Pipeline,</text>
              <text x="975" y="322" textAnchor="middle" fontSize="9" fill="#94A3B8">Timeline, Log, Buzz + more</text>
              <rect x="919" y="327" width="112" height="16" rx="8" fill="rgba(59,130,246,0.15)"/>
              <text x="975" y="338" textAnchor="middle" fontSize="8" fontWeight="700" fill="#3B82F6" letterSpacing="0.8">LIVE APPLICATION</text>

              <rect x="860" y="15" width="230" height="90" rx="16" fill="#1a2332" stroke="#EC4899" strokeWidth="2" filter="url(#archGlow)"/>
              <text x="975" y="42" textAnchor="middle" fontSize="26">👤</text>
              <text x="975" y="62" textAnchor="middle" fontSize="13" fontWeight="800" fill="#E2E8F0">You (Tony)</text>
              <text x="975" y="77" textAnchor="middle" fontSize="9" fill="#94A3B8">View app, drag tasks, manage</text>
              <text x="975" y="89" textAnchor="middle" fontSize="9" fill="#94A3B8">pipeline, upload spreadsheets</text>
              <rect x="940" y="93" width="70" height="16" rx="8" fill="rgba(236,72,153,0.15)"/>
              <text x="975" y="104" textAnchor="middle" fontSize="8" fontWeight="700" fill="#EC4899" letterSpacing="0.8">END USER</text>
            </svg>

            {/* Flow sections */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20,marginBottom:24}}>
              <div style={{background:"#1E293B",border:"1px solid #334155",borderRadius:14,padding:"20px 24px"}}>
                <div style={{fontSize:14,fontWeight:800,color:"#F8FAFC",marginBottom:14}}>Flow 1: Pipeline Data Sync</div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  {["Update Spreadsheet","Apps Script Runs","Data Hits Supabase","App Shows Live Data"].map((s,i)=>(
                    <div key={i} style={{flex:"1 1 120px",padding:"10px 12px",background:"#0F172A",border:"1px solid #334155",borderRadius:8,textAlign:"center"}}>
                      <div style={{width:20,height:20,borderRadius:"50%",background:"#10B981",color:"white",fontSize:10,fontWeight:800,display:"inline-flex",alignItems:"center",justifyContent:"center",marginBottom:4}}>{i+1}</div>
                      <div style={{fontSize:11,fontWeight:700,color:"#E2E8F0"}}>{s}</div>
                    </div>
                  ))}
                </div>
              </div>
              <div style={{background:"#1E293B",border:"1px solid #334155",borderRadius:14,padding:"20px 24px"}}>
                <div style={{fontSize:14,fontWeight:800,color:"#F8FAFC",marginBottom:14}}>Flow 2: App Code Updates</div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  {["Claude Builds","index.html Saved","Upload to GitHub","Vercel Deploys"].map((s,i)=>(
                    <div key={i} style={{flex:"1 1 120px",padding:"10px 12px",background:"#0F172A",border:"1px solid #334155",borderRadius:8,textAlign:"center"}}>
                      <div style={{width:20,height:20,borderRadius:"50%",background:"#3B82F6",color:"white",fontSize:10,fontWeight:800,display:"inline-flex",alignItems:"center",justifyContent:"center",marginBottom:4}}>{i+1}</div>
                      <div style={{fontSize:11,fontWeight:700,color:"#E2E8F0"}}>{s}</div>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            {/* Legend grid */}
            <div style={{background:"#1E293B",border:"1px solid #334155",borderRadius:14,padding:"20px 24px"}}>
              <div style={{fontSize:14,fontWeight:800,color:"#F8FAFC",marginBottom:14}}>What Each Piece Does</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
                {[
                  {color:"#34A853",name:"Google Sheets",desc:"Your deal spreadsheet on corporate Google Drive. Source of truth for pipeline data."},
                  {color:"#FBBC04",name:"Apps Script",desc:"Reads all rows, pushes deal data to Supabase via HTTP. Runs on edit or timer."},
                  {color:"#A78BFA",name:"Claude (Cowork)",desc:"The AI builder. Writes React code and outputs a single index.html file."},
                  {color:"#6366F1",name:"Local Files",desc:"The index.html in Downloads — ~260KB single file containing all app code."},
                  {color:"#10B981",name:"Supabase",desc:"Cloud PostgreSQL. Stores tasks, pipeline deals, meetings, and settings."},
                  {color:"#CBD5E1",name:"GitHub + Vercel",desc:"GitHub stores code. Vercel auto-deploys on push — live in ~60 seconds."},
                  {color:"#3B82F6",name:"Priority Map App",desc:"The live web app with Rings, VxE, Diamond, Pipeline, Timeline, Log, and Buzz."},
                  {color:"#EC4899",name:"You (Tony)",desc:"Visit the live URL, drag tasks, manage pipeline, upload spreadsheets."}
                ].map(item=>(
                  <div key={item.name} style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                    <div style={{width:10,height:10,borderRadius:"50%",background:item.color,flexShrink:0,marginTop:3}}/>
                    <div>
                      <div style={{fontSize:12,fontWeight:700,color:"#E2E8F0",marginBottom:2}}>{item.name}</div>
                      <div style={{fontSize:11,color:"#94A3B8",lineHeight:1.5}}>{item.desc}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      )}

      {showSbModal&&(
        <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)setShowSbModal(false);}}>
          <div className="modal" style={{width:480}}>
            <div style={{fontSize:16,fontWeight:800,color:"#F8FAFC",marginBottom:4}}>☁ Cloud Sync — Supabase</div>
            <div style={{fontSize:12,color:"#64748B",marginBottom:18,lineHeight:1.6}}>
              Connect to your Supabase project so tasks and meeting summaries sync in real time.<br/>
              <a href="https://supabase.com" target="_blank" style={{color:"#3B82F6",textDecoration:"none"}}>supabase.com</a> → New project → Settings → API.
            </div>
            {sbError&&<div style={{background:"rgba(239,68,68,0.12)",border:"1px solid #EF4444",borderRadius:8,padding:"8px 12px",fontSize:12,color:"#EF4444",marginBottom:14}}>{sbError}</div>}
            <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:20}}>
              <div className="field">
                <label>Project URL</label>
                <input value={sbUrlDraft} onChange={e=>setSbUrlDraft(e.target.value)} placeholder="https://xxxxxxxxxxxx.supabase.co"/>
              </div>
              <div className="field">
                <label>Anon / Public Key</label>
                <input value={sbKeyDraft} onChange={e=>setSbKeyDraft(e.target.value)} placeholder="eyJh..."/>
              </div>
            </div>
            <div style={{background:"#0F172A",border:"1px solid #1E293B",borderRadius:8,padding:"10px 14px",fontSize:11,color:"#475569",marginBottom:20,lineHeight:1.7}}>
              <div style={{color:"#64748B",fontWeight:700,marginBottom:4}}>SQL to create the tasks &amp; meetings tables in Supabase:</div>
              <pre style={{margin:0,fontFamily:"monospace",fontSize:10,color:"#94A3B8",whiteSpace:"pre-wrap"}}>{`create table tasks (
  id bigserial primary key,
  name text not null,
  importance int default 5,
  urgency int default 2,
  type text default 'Administrative',
  revenue_type text default '',
  timeline text default 'Short Term',
  category text default 'External',
  owner_primary text default 'None',
  owner_secondary text default 'None',
  due_date text default '',
  notes text default '',
  created_at timestamptz default now()
);
-- Enable real-time:
alter publication supabase_realtime add table tasks;

create table meetings (
  id bigserial primary key,
  meeting_date text not null,
  title text not null,
  bullets jsonb not null default '[]',
  sort_order int default 0,
  created_at timestamptz default now(),
  updated_at timestamptz default now()
);
create index idx_meetings_date on meetings(meeting_date);
alter publication supabase_realtime add table meetings;

create table pipeline_deals (
  id bigserial primary key,
  account text not null,
  date text not null,
  amount numeric default 0,
  trend int default 1,
  status text default '',
  sheet text default '',
  notes text default '',
  created_at timestamptz default now()
);
create index idx_pipeline_deals_sheet on pipeline_deals(sheet);

create table task_snapshots (
  id bigserial primary key,
  snapshot jsonb not null,
  created_by text default '',
  created_at timestamptz default now()
);

create table settings (
  key text primary key,
  value jsonb
);

create table allowed_emails (
  email text primary key,
  added_at timestamptz default now()
);`}</pre>
            </div>
            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
              {sbStatus==="connected"&&<button className="btn btn-danger" onClick={()=>{setSbUrl("");setSbKey("");localStorage.removeItem(SB_URL_KEY);localStorage.removeItem(SB_KEY_KEY);sbClientRef.current=null;setSbStatus("idle");setSbError("");setShowSbModal(false);setTasks(TASKS_INIT);}}>Disconnect</button>}
              <button className="btn btn-ghost" onClick={()=>setShowSbModal(false)}>Cancel</button>
              <button className="btn btn-primary" onClick={()=>{
                setSbError("");
                const u=sbUrlDraft.trim(), k=sbKeyDraft.trim();
                if(!u||!k){setSbError("Both fields are required.");return;}
                localStorage.setItem(SB_URL_KEY,u); localStorage.setItem(SB_KEY_KEY,k);
                setSbUrl(u); setSbKey(k); setShowSbModal(false);
              }}>Connect</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
